
<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="灵知 · 流式输出 · 支持公式渲染">

<meta name="theme-color" content="#8b5cf6">

<link rel="icon" type="image/webp" href="Z.webp">

<link rel="apple-touch-icon" href="icon-192.webp">

<title>灵知</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="apple-mobile-web-app-title" content="灵知">

<meta name="mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" id="katex-css">

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" id="katex-js"></script>

<link rel="stylesheet" href="css/styles.css?v=1.3.2">

</head>

<body>


<div class="chat-app">


<header class="chat-header">

<button type="button" class="chat-menu-btn" id="chatMenuBtn" title="查看聊天记录" aria-label="查看聊天记录">

<span></span><span></span>

</button>

<div class="chat-header-title">

<h2>灵知</h2>

</div>

<div class="chat-header-actions">

<button type="button" class="chat-header-btn" id="chatAutoPlayBtn" title="播放/暂停语音" aria-label="播放/暂停语音">

<span class="auto-play-icon" aria-hidden="true">🔊</span>

</button>

<button type="button" class="chat-header-btn chat-header-new-btn" id="chatNewBtn" title="新话题" aria-label="新话题">

<span class="chat-plus-icon"></span>

</button>

<button type="button" class="chat-header-btn" id="chatThemeBtn" title="切换深色/浅色模式" aria-label="切换主题">

<span class="theme-icon-light" aria-hidden="true">🌙</span>

<span class="theme-icon-dark" aria-hidden="true">☀</span>

</button>

</div>

</header>


<main class="chat-messages" id="chatMessages" role="log" aria-live="polite" aria-label="聊天消息"></main>


<footer class="chat-input-area">

<textarea

class="chat-input"

id="chatInput"

placeholder="输入你的问题……"

rows="1"

maxlength="2000"

aria-label="消息输入框"

></textarea>

<button type="button" class="chat-send-btn" id="chatSendBtn" title="发送" aria-label="发送">→</button>

</footer>


</div>


<!-- 会话列表侧栏 -->

<div class="chat-sidebar-overlay" id="chatSidebarOverlay"></div>

<aside class="chat-sidebar" id="chatSidebar" aria-label="聊天会话列表">

<div class="chat-sidebar-header">

<span class="chat-sidebar-title">聊天记录</span>

<button type="button" class="chat-sidebar-close" id="chatSidebarClose" aria-label="关闭">×</button>

</div>

<button type="button" class="chat-sidebar-new" id="chatSidebarNewBtn">✚ 新建话题</button>

<button type="button" class="chat-sidebar-refresh" id="chatSidebarRefreshBtn" aria-label="刷新">🔄</button>

<div class="chat-sidebar-list" id="chatSidebarList"></div>

<div class="chat-sidebar-footer">

<button type="button" class="chat-sidebar-user-btn" id="authUserBtn">

<span class="user-avatar">👤</span>

<span class="user-name" id="authUserName">未登录</span>

</button>

<div class="user-menu" id="userMenu">
<button type="button" class="user-menu-item" id="userMenuAbout">
<span class="user-menu-icon">ℹ️</span>关于
</button>
<div class="user-menu-divider"></div>
<button type="button" class="user-menu-item" id="userMenuImageGen">
<span class="user-menu-icon">🎨</span>生图
</button>
<div class="user-menu-divider"></div>
<button type="button" class="user-menu-item user-menu-danger" id="userMenuLogout">
<span class="user-menu-icon">🚪</span>退出
</button>
</div>

</div>

</aside>


<!-- 确认弹窗 -->

<div class="chat-confirm-overlay" id="chatConfirmOverlay" role="alertdialog" aria-modal="true" aria-labelledby="chatConfirmTitle">

<div class="chat-confirm-modal">

<div class="chat-confirm-title" id="chatConfirmTitle">确认清空聊天记录？</div>

<div class="chat-confirm-warn" id="chatConfirmWarn">此操作不可恢复</div>

<div class="chat-confirm-btns">

<button type="button" class="chat-confirm-cancel" id="chatConfirmCancel">取消</button>

<button type="button" class="chat-confirm-ok" id="chatConfirmOk">确认</button>

</div>

</div>

</div>


<!-- 关于弹窗 -->

<div class="about-overlay" id="aboutOverlay" role="alertdialog" aria-modal="true" aria-labelledby="aboutTitle">

<div class="about-modal">

<button type="button" class="about-close" id="aboutCloseBtn" aria-label="关闭">×</button>

<div class="about-icon">✨</div>

<div class="about-title" id="aboutTitle">灵知</div>

<div class="about-version"><span>版本</span><span id="aboutVersion">1.3.2</span></div>

<div class="about-desc" id="aboutDesc">基于大语言模型的智能对话助手，支持数学公式渲染、语音播报、多会话管理等功能。</div>

<div class="about-info">
<div class="about-info-row">
<span class="about-info-label">开发者</span>
<span class="about-info-value">Stone</span>
</div>
<div class="about-info-row">
<span class="about-info-label">模型</span>
<span class="about-info-value" id="aboutModel">Powered by Sapiens AI</span>
</div>
</div>

<button type="button" class="about-ok-btn" id="aboutOkBtn">知道了</button>

</div>

</div>


<!-- 登录/注册弹窗 -->

<div class="auth-overlay" id="authOverlay" role="alertdialog" aria-modal="true">

<div class="auth-modal">

<button type="button" class="auth-close" id="authCloseBtn" aria-label="关闭">×</button>

<div class="auth-title" id="authTitle">登录</div>

<div class="auth-form">

<div class="auth-field" id="authNicknameField" style="display:none;">

<label>昵称</label>

<input type="text" id="authNickname" placeholder="请输入昵称" maxlength="20">

</div>

<div class="auth-field">

<label>邮箱</label>

<input type="email" id="authEmail" placeholder="请输入邮箱">

</div>

<div class="auth-field">

<label>密码</label>

<input type="password" id="authPassword" placeholder="请输入密码（至少6位）">

</div>

<div class="auth-error" id="authError"></div>

<button type="button" class="auth-submit-btn" id="authSubmitBtn">登录</button>

<div class="auth-switch">

<span id="authSwitchText">还没有账号？</span>

<button type="button" class="auth-switch-btn" id="authSwitchBtn">去注册</button>

</div>

</div>

</div>

</div>


<!-- JS 模块 -->

<script type="module" src="js/app.js?v=1.3.2"></script>


<!-- PWA Service Worker -->

<script>

if ('serviceWorker' in navigator) {

window.addEventListener('load', function () {

navigator.serviceWorker

.register('./sw.js', { scope: './' })

.then(function (reg) {

console.log('[PWA] Service Worker 已注册，作用域：', reg.scope);

reg.addEventListener('updatefound', function () {

var installing = reg.installing;

if (!installing) return;

installing.addEventListener('statechange', function () {

if (installing.state === 'installed' && navigator.serviceWorker.controller) {

console.log('[PWA] 有新版本可用，下次打开页面时生效');

}

});

});

})

.catch(function (err) {

console.warn('[PWA] Service Worker 注册失败：', err);

});

});

}


// PWA 安装提示

var deferredPrompt = null;

window.addEventListener('beforeinstallprompt', function (event) {

event.preventDefault();

deferredPrompt = event;

console.log('[PWA] 可以安装应用了，点击地址栏图标或分享菜单中的「添加到主屏幕」');

});

window.addEventListener('appinstalled', function () {

console.log('[PWA] 应用已安装成功');

deferredPrompt = null;

});

</script>

</body>

</html>
