<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="灵知 · 流式输出 · 支持公式渲染">
<meta name="theme-color" content="#8b5cf6">
<link rel="icon" type="image/webp" href="Z.webp">
<link rel="apple-touch-icon" href="icon-192.webp">
<title>灵知</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="灵知">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" id="katex-css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" id="katex-js"></script>
<style>
  /* ========== 设计令牌 ========== */
  :root {
    --c-primary: #7c3aed;
    --c-primary-light: #8b5cf6;
    --c-primary-soft: #ede9fe;
    --c-accent: #ec4899;
    --c-text: #0f172a;
    --c-muted: #6b7280;
    --c-bg: linear-gradient(135deg, #faf5ff 0%, #fff7ed 50%, #fdf2f8 100%);
    --c-surface: #fff;
    --c-surface-2: #faf5ff;
    --c-border: #e2e8f0;
    --c-danger: #ef4444;
    --c-danger-dark: #dc2626;
    --c-scrollbar: #d1d5db;
    --c-scrollbar-hover: #9ca3af;
    --header-grad: linear-gradient(to bottom, #f3f0ff, var(--c-surface-2));
    --btn-grad: linear-gradient(135deg, var(--c-primary-light), var(--c-accent));
    --header-btn-hover: rgba(0, 0, 0, 0.06);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
    --shadow-md: 0 6px 20px rgba(124, 58, 237, 0.12);
    --shadow-lg: 0 12px 32px rgba(139, 92, 246, 0.25);
    --radius-bubble: 18px;
    --radius-btn: 22px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* ========== 暗色模式 ========== */
  @media (prefers-color-scheme: dark) {
    :root {
      --c-text: #f3f4f6;
      --c-muted: #9ca3af;
      --c-bg: #0b0a12;
      --c-surface: #1a1826;
      --c-surface-2: #14121e;
      --c-border: #2d2a3e;
      --c-primary-soft: #2d1b4e;
      --c-scrollbar: #4b5563;
      --c-scrollbar-hover: #6b7280;
      --header-grad: linear-gradient(to bottom, #1f1b2e, var(--c-surface-2));
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.6);
      --header-btn-hover: rgba(255, 255, 255, 0.08);
    }
    /* 深色模式下用户气泡用柔和深紫底配白字 */
    .message.user .msg-bubble {
      background: #3a2b5a;
      color: #fff;
    }
    /* 深色模式下 AI 气泡底色与边框更柔和 */
    .message.ai .msg-bubble {
      background: var(--c-surface);
      color: var(--c-text);
      border: 1px solid var(--c-border);
    }
    /* 深色模式下顶部淡入渐变也用深色系 */
    .chat-messages {
      background:
        linear-gradient(
          to bottom,
          rgba(31, 27, 46, 0.6) 0%,
          rgba(31, 27, 46, 0) 24px
        ),
        var(--c-surface-2);
    }
    /* 深色模式下焦点提示色也调整为更柔和的紫 */
    :focus-visible { outline: 2px solid var(--c-primary-light); outline-offset: 2px; }
    /* 输入栏在深色模式下不额外加 outline */
    .chat-input:focus { outline: none; }
    .chat-input:focus-visible { outline: none; }
  }

  /* 手动切换深色：通过 body.is-dark 覆盖相同的 CSS 变量 + 气泡样式（与 prefers-color-scheme: dark 效果一致） */
  body.is-dark {
    --c-text: #f3f4f6;
    --c-muted: #9ca3af;
    --c-bg: #0b0a12;
    --c-surface: #1a1826;
    --c-surface-2: #14121e;
    --c-border: #2d2a3e;
    --c-primary-soft: #2d1b4e;
    --c-scrollbar: #4b5563;
    --c-scrollbar-hover: #6b7280;
    --header-grad: linear-gradient(to bottom, #1f1b2e, #14121e);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
    --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.5);
    --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.6);
    --header-btn-hover: rgba(255, 255, 255, 0.08);
    color-scheme: dark;
  }
  body.is-dark .message.user .msg-bubble { background: #3a2b5a; color: #fff; }
  body.is-dark .message.ai .msg-bubble {
    background: var(--c-surface);
    color: var(--c-text);
    border: 1px solid var(--c-border);
  }
  body.is-dark .chat-messages {
    background:
      linear-gradient(
        to bottom,
        rgba(31, 27, 46, 0.6) 0%,
        rgba(31, 27, 46, 0) 24px
      ),
      var(--c-surface-2);
  }
  body.is-dark :focus-visible { outline: 2px solid var(--c-primary-light); outline-offset: 2px; }
  body.is-dark .chat-input:focus { outline: none; }
  body.is-dark .chat-input:focus-visible { outline: none; }

  /* 主题切换按钮：根据 body.is-dark 显示不同图标 */
  #chatThemeBtn .theme-icon-light { display: inline; }
  #chatThemeBtn .theme-icon-dark { display: none; }
  body.is-dark #chatThemeBtn .theme-icon-light { display: none; }
  body.is-dark #chatThemeBtn .theme-icon-dark { display: inline; }

  /* ========== 重置 ========== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  html { scroll-behavior: smooth; }
  :focus-visible { outline: 2px solid var(--c-primary-light); outline-offset: 2px; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.75;
    word-break: break-word;
    overflow-wrap: break-word;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  /* ========== 全屏聊天容器 ========== */
  .chat-app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 820px;
    margin: 0 auto;
    background: var(--c-surface);
    box-shadow: 0 0 40px rgba(124, 58, 237, 0.08);
  }

  /* ========== 顶部标题栏 ========== */
  .chat-header {
    background: var(--header-grad);
    color: var(--c-text);
    padding: 5px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    box-shadow: none;
    z-index: 10;
    border-bottom: none;
    position: relative;
  }
  .chat-menu-btn {
    background: transparent;
    border: none;
    width: 30px;
    height: 30px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 4px;
    flex-shrink: 0;
    transition: background 0.2s;
    padding: 0 7px;
  }
  .chat-menu-btn span {
    display: block;
    height: 2px;
    background: var(--c-text);
    border-radius: 2px;
  }
  .chat-menu-btn span:first-child { width: 16px; }
  .chat-menu-btn span:last-child { width: 10px; }
  .chat-menu-btn:hover { background: var(--header-btn-hover); }
  .chat-header-title {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }
  .chat-header h2 {
    font-size: 0.95rem;
    font-weight: bold;
    letter-spacing: 1px;
    margin: 0;
    color: var(--c-text);
  }
  .chat-header-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }
  .chat-header-btn {
    background: transparent;
    border: none;
    color: var(--c-text);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
  }
  .chat-header-btn:hover {
    background: var(--header-btn-hover);
  }
  .chat-header-new-btn {
    position: relative;
  }
  .chat-header-new-btn .chat-plus-icon {
    width: 20px;
    height: 20px;
    border: 2px solid var(--c-text);
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-header-new-btn .chat-plus-icon::before,
  .chat-header-new-btn .chat-plus-icon::after {
    content: "";
    position: absolute;
    background: var(--c-text);
    border-radius: 2px;
  }
  .chat-header-new-btn .chat-plus-icon::before {
    width: 8px;
    height: 2px;
  }
  .chat-header-new-btn .chat-plus-icon::after {
    width: 2px;
    height: 8px;
  }

  /* ========== 消息列表 ========== */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background:
      linear-gradient(
        to bottom,
        rgba(243, 240, 255, 0.2) 0%,
        rgba(243, 240, 255, 0) 24px
      ),
      var(--c-surface-2);
    overscroll-behavior: contain;
    touch-action: pan-y;
    width: 100%;
    /* 限制重绘/重排范围，提升滚动性能 */
    contain: content;
    /* Firefox 滚动条 */
    scrollbar-width: thin;
    scrollbar-color: var(--c-scrollbar) transparent;
  }
  /* WebKit 滚动条 */
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--c-scrollbar); border-radius: 3px; }
  .chat-messages::-webkit-scrollbar-thumb:hover { background: var(--c-scrollbar-hover); }

  .message {
    display: flex;
    max-width: 100%;
    width: 100%;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user { justify-content: flex-end; }
  .message.ai { justify-content: flex-start; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius-bubble);
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 100%;
    white-space: normal;
    overflow-wrap: break-word;
    box-shadow: var(--shadow-sm);
    position: relative;
    box-sizing: border-box;
    text-align: left;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-user-drag: none;
    /* 限制重绘范围：每个气泡独立，不影响其他内容 */
    contain: layout paint;
  }
  .message.user .msg-bubble {
    background: var(--c-primary-soft);
    color: var(--c-primary);
    border-bottom-right-radius: 4px;
    width: auto;
    max-width: 85%;
  }
  .message.ai .msg-bubble {
    background: var(--c-surface);
    color: var(--c-text);
    border: 1px solid var(--c-border);
    border-bottom-left-radius: 4px;
    width: 100%;
  }
  /* 文本选择模式：恢复系统文字选框，便于自由拖选复制 */
  .msg-bubble.is-text-select-mode {
    user-select: text;
    -webkit-user-select: text;
    -webkit-touch-callout: default;
    outline: 2px dashed var(--c-primary);
    outline-offset: 2px;
  }

  /* ========== 长按气泡弹出菜单 ========== */
  .msg-action-menu {
    position: fixed;
    background: var(--c-surface);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    padding: 6px;
    z-index: 2000;
    min-width: 140px;
    animation: menuPop 0.2s ease;
  }
  @keyframes menuPop {
    from { opacity: 0; transform: scale(0.85) translateY(4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .msg-action-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.95rem;
    color: var(--c-text);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .msg-action-menu-item:hover {
    background: var(--c-primary-soft);
  }
  .msg-action-menu-item .icon {
    font-size: 1.1rem;
    line-height: 1;
  }
  .msg-action-menu-divider {
    height: 1px;
    background: var(--c-border);
    margin: 2px 6px;
  }

  /* ========== KaTeX 公式渲染 ========== */
  .katex-block {
    display: block;
    margin: 4px 0;
    padding: 0;
    text-align: center;
    line-height: 1.2;
    width: 100%;
    box-sizing: border-box;
    overflow-x: auto;
    overflow-y: hidden;
    font-size: 0.96em;
  }
  .katex-block .katex { white-space: normal; font-size: 1em; }
  .katex-block .katex-display { margin: 0; }
  .katex-block .katex-display > .katex { white-space: normal; text-align: center; }
  /* 压缩 KaTeX 内部上下间距 */
  .katex-display { margin: 0 !important; padding: 0 !important; }
  .katex { line-height: 1.2; }
  /* 行内公式跟随文本大小 */
  .msg-bubble > .katex { font-size: 0.96em; }

  /* ========== 公式降级显示 ========== */
  .math-fallback {
    background: var(--c-surface-2);
    padding: 1px 4px;
    border-radius: 4px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.85em;
    color: var(--c-primary);
  }

  /* ========== 代码块 ========== */
  .code-block {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 8px;
    padding: 12px 14px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    -webkit-overflow-scrolling: touch;
  }
  .code-block code {
    background: none;
    padding: 0;
    color: inherit;
    font-size: inherit;
    white-space: pre;
  }
  .code-inline {
    background: var(--c-surface-2);
    color: var(--c-primary);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.85em;
  }

  /* ========== 输入指示器 ========== */
  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 0 0 0 8px;
    vertical-align: middle;
  }
  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--c-primary-light);
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
  }
  .typing-dot:nth-child(1) { animation-delay: 0s; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ========== 输入区 ========== */
  .chat-input-area {
    padding: 12px 16px;
    padding-bottom: calc(12px + var(--safe-bottom));
    background: var(--c-surface);
    border-top: 1px solid var(--c-border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--c-border);
    border-radius: var(--radius-btn);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    font-family: inherit;
    line-height: 1.5;
    color: var(--c-text);
    background: var(--c-surface);
  }
  .chat-input:focus { border-color: var(--c-primary); outline: none; }
  .chat-input:focus-visible { outline: none; }
  .chat-send-btn {
    width: 44px;
    height: 44px;
    background: var(--btn-grad);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, opacity 0.2s, background 0.2s;
  }
  .chat-send-btn:hover:not(:disabled) { transform: scale(1.05); }
  .chat-send-btn:active:not(:disabled) { transform: scale(0.95); }
  .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .chat-send-btn.is-stop {
    background: linear-gradient(135deg, var(--c-danger), var(--c-danger-dark));
  }

  /* ========== 空状态提示 ========== */
  .chat-empty-tip {
    text-align: center;
    color: var(--c-muted);
    font-size: 0.92rem;
    padding: 50px 20px;
    line-height: 2;
  }
  .chat-empty-tip .big {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 12px;
  }

  /* ========== 相关问题提示 ========== */
  .followup-container {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--c-border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .followup-title {
    font-size: 0.78rem;
    color: var(--c-muted);
    margin-bottom: 2px;
  }
  .followup-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 12px;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--c-primary);
    background: var(--c-primary-soft);
    border: 1px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, background 0.2s, border-color 0.2s;
    word-break: break-word;
  }
  .followup-item:hover {
    transform: translateY(-1px);
    border-color: var(--c-primary);
  }
  .followup-item:active {
    transform: translateY(0);
  }
  .followup-item::before {
    content: "💡";
    display: inline-block;
    margin-right: 6px;
    font-size: 0.85em;
    opacity: 0.85;
  }
  body.is-dark .followup-item {
    background: rgba(139, 92, 246, 0.15);
  }
  body.is-dark .followup-item:hover {
    background: rgba(139, 92, 246, 0.25);
  }

  /* ========== 会话侧栏 ========== */
  .chat-sidebar-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 1199;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s, visibility 0.25s;
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
  }
  .chat-sidebar-overlay.show { opacity: 1; visibility: visible; }

  .chat-sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    max-width: 85vw;
    background: var(--c-surface);
    z-index: 1200;
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 24px rgba(0, 0, 0, 0.12);
  }
  .chat-sidebar.open { transform: translateX(0); }

  .chat-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    background: var(--header-grad);
    color: #fff;
    flex-shrink: 0;
  }
  .chat-sidebar-title { font-size: 1rem; font-weight: 700; }
  .chat-sidebar-close {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: #fff;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.2s;
  }
  .chat-sidebar-close:hover { background: rgba(255, 255, 255, 0.35); }

  .chat-sidebar-new {
    margin: 12px 14px 8px;
    padding: 10px 14px;
    border: 2px dashed var(--c-primary);
    background: var(--c-primary-soft);
    color: var(--c-primary);
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    font-family: inherit;
  }
  .chat-sidebar-new:hover {
    background: var(--c-primary);
    color: #fff;
  }

  .chat-sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 12px;
    -webkit-overflow-scrolling: touch;
  }
  .chat-sidebar-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 12px;
    margin-bottom: 4px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .chat-sidebar-item:hover { background: var(--c-surface-2); }
  .chat-sidebar-item.active { background: var(--c-primary-soft); }
