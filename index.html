<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 聊天助手 · 流式输出 · 支持公式渲染">
<meta name="theme-color" content="#8b5cf6">
<title>AI 聊天助手</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  /* ========== 设计令牌 ========== */
  :root {
    --c-primary: #7c3aed;
    --c-primary-light: #8b5cf6;
    --c-primary-soft: #ede9fe;
    --c-accent: #ec4899;
    --c-text: #1f2937;
    --c-muted: #6b7280;
    --c-bg: linear-gradient(135deg, #faf5ff 0%, #fff7ed 50%, #fdf2f8 100%);
    --c-surface: #fff;
    --c-surface-2: #faf5ff;
    --c-border: #e2e8f0;
    --c-danger: #ef4444;
    --c-danger-dark: #dc2626;
    --c-scrollbar: #d1d5db;
    --c-scrollbar-hover: #9ca3af;
    --header-grad: linear-gradient(to bottom, #f3f0ff, var(--c-surface-2));
    --btn-grad: linear-gradient(135deg, var(--c-primary-light), var(--c-accent));
    --header-btn-hover: rgba(0, 0, 0, 0.06);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
    --shadow-md: 0 6px 20px rgba(124, 58, 237, 0.12);
    --shadow-lg: 0 12px 32px rgba(139, 92, 246, 0.25);
    --radius-bubble: 18px;
    --radius-btn: 22px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* ========== 暗色模式 ========== */
  @media (prefers-color-scheme: dark) {
    :root {
      --c-text: #e5e7eb;
      --c-muted: #9ca3af;
      --c-bg: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16121f 100%);
      --c-surface: #1e1e2e;
      --c-surface-2: #1a1a2e;
      --c-border: #374151;
      --c-primary-soft: #2d1b4e;
      --c-scrollbar: #4b5563;
      --c-scrollbar-hover: #6b7280;
      --header-grad: linear-gradient(to bottom, #2a2a3e, var(--c-surface-2));
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
      --header-btn-hover: rgba(255, 255, 255, 0.1);
    }
  }

  /* ========== 重置 ========== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  html { scroll-behavior: smooth; }
  :focus-visible { outline: 2px solid var(--c-primary-light); outline-offset: 2px; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.75;
    word-break: break-word;
    overflow-wrap: break-word;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  /* ========== 全屏聊天容器 ========== */
  .chat-app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 820px;
    margin: 0 auto;
    background: var(--c-surface);
    box-shadow: 0 0 40px rgba(124, 58, 237, 0.08);
  }

  /* ========== 顶部标题栏 ========== */
  .chat-header {
    background: var(--header-grad);
    color: var(--c-text);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    box-shadow: none;
    z-index: 10;
    border-bottom: 1px solid var(--c-border);
    position: relative;
  }
  .chat-menu-btn {
    background: transparent;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 5px;
    flex-shrink: 0;
    transition: background 0.2s;
    padding: 0 9px;
  }
  .chat-menu-btn span {
    display: block;
    height: 2.5px;
    background: var(--c-text);
    border-radius: 2px;
  }
  .chat-menu-btn span:first-child { width: 22px; }
  .chat-menu-btn span:last-child { width: 14px; }
  .chat-menu-btn:hover { background: var(--header-btn-hover); }
  .chat-header-title {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }
  .chat-header h2 {
    font-size: 1.2rem;
    font-weight: bold;
    letter-spacing: 1px;
    margin: 0;
    color: var(--c-text);
  }
  .chat-header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .chat-header-btn {
    background: transparent;
    border: none;
    color: var(--c-text);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
  }
  .chat-header-btn:hover {
    background: var(--header-btn-hover);
  }
  .chat-header-new-btn {
    position: relative;
  }
  .chat-header-new-btn .chat-plus-icon {
    width: 26px;
    height: 26px;
    border: 2px solid var(--c-text);
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .chat-header-new-btn .chat-plus-icon::before,
  .chat-header-new-btn .chat-plus-icon::after {
    content: "";
    position: absolute;
    background: var(--c-text);
    border-radius: 2px;
  }
  .chat-header-new-btn .chat-plus-icon::before {
    width: 11px;
    height: 2px;
  }
  .chat-header-new-btn .chat-plus-icon::after {
    width: 2px;
    height: 11px;
  }

  /* ========== 消息列表 ========== */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--c-surface-2);
    overscroll-behavior: contain;
    touch-action: pan-y;
    width: 100%;
    /* Firefox 滚动条 */
    scrollbar-width: thin;
    scrollbar-color: var(--c-scrollbar) transparent;
  }
  /* WebKit 滚动条 */
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--c-scrollbar); border-radius: 3px; }
  .chat-messages::-webkit-scrollbar-thumb:hover { background: var(--c-scrollbar-hover); }

  .message {
    display: flex;
    max-width: 100%;
    width: 100%;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user { justify-content: flex-end; }
  .message.ai { justify-content: flex-start; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius-bubble);
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 100%;
    white-space: normal;
    overflow-wrap: break-word;
    box-shadow: var(--shadow-sm);
    position: relative;
    box-sizing: border-box;
    text-align: left;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-user-drag: none;
  }
  .message.user .msg-bubble {
    background: var(--btn-grad);
    color: #fff;
    border-bottom-right-radius: 4px;
    width: auto;
    max-width: 85%;
  }
  .message.ai .msg-bubble {
    background: var(--c-surface);
    color: var(--c-text);
    border: 1px solid var(--c-border);
    border-bottom-left-radius: 4px;
    width: 100%;
  }

  /* ========== 消息操作按钮 ========== */
  .msg-delete {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--c-danger);
    border: 2px solid var(--c-surface);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s, visibility 0.2s;
    z-index: 10;
    box-shadow: var(--shadow-sm);
  }
  /* hover 和 focus-within 都显示 */
  .message:hover .msg-delete,
  .message:focus-within .msg-delete {
    opacity: 1;
    visibility: visible;
  }
  /* 触摸设备始终显示 */
  @media (hover: none) {
    .msg-delete { opacity: 1; visibility: visible; }
  }

  /* ========== 长按气泡弹出菜单 ========== */
  .msg-action-menu {
    position: fixed;
    background: var(--c-surface);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    padding: 6px;
    z-index: 2000;
    min-width: 140px;
    animation: menuPop 0.2s ease;
  }
  @keyframes menuPop {
    from { opacity: 0; transform: scale(0.85) translateY(4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .msg-action-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.95rem;
    color: var(--c-text);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .msg-action-menu-item:hover {
    background: var(--c-primary-soft);
  }
  .msg-action-menu-item .icon {
    font-size: 1.1rem;
    line-height: 1;
  }
  .msg-action-menu-divider {
    height: 1px;
    background: var(--c-border);
    margin: 2px 6px;
  }

  /* ========== KaTeX 公式渲染 ========== */
  .katex-block {
    display: block;
    margin: 4px 0;
    padding: 0;
    text-align: center;
    line-height: 1.2;
    width: 100%;
    box-sizing: border-box;
    overflow-x: auto;
    overflow-y: hidden;
    font-size: 0.96em;
  }
  .katex-block .katex { white-space: normal; font-size: 1em; }
  .katex-block .katex-display { margin: 0; }
  .katex-block .katex-display > .katex { white-space: normal; text-align: center; }
  /* 压缩 KaTeX 内部上下间距 */
  .katex-display { margin: 0 !important; padding: 0 !important; }
  .katex { line-height: 1.2; }
  /* 行内公式跟随文本大小 */
  .msg-bubble > .katex { font-size: 0.96em; }

  /* ========== 公式降级显示 ========== */
  .math-fallback {
    background: var(--c-surface-2);
    padding: 1px 4px;
    border-radius: 4px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.85em;
    color: var(--c-primary);
  }

  /* ========== 代码块 ========== */
  .code-block {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 8px;
    padding: 12px 14px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    -webkit-overflow-scrolling: touch;
  }
  .code-block code {
    background: none;
    padding: 0;
    color: inherit;
    font-size: inherit;
    white-space: pre;
  }
  .code-inline {
    background: var(--c-surface-2);
    color: var(--c-primary);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.85em;
  }

  /* ========== 输入指示器 ========== */
  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 0 0 0 8px;
    vertical-align: middle;
  }
  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--c-primary-light);
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
  }
  .typing-dot:nth-child(1) { animation-delay: 0s; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ========== 输入区 ========== */
  .chat-input-area {
    padding: 12px 16px;
    padding-bottom: calc(12px + var(--safe-bottom));
    background: var(--c-surface);
    border-top: 1px solid var(--c-border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--c-border);
    border-radius: var(--radius-btn);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    font-family: inherit;
    line-height: 1.5;
    color: var(--c-text);
    background: var(--c-surface);
  }
  .chat-input:focus { border-color: var(--c-primary); }
  .chat-send-btn {
    width: 44px;
    height: 44px;
    background: var(--btn-grad);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, opacity 0.2s, background 0.2s;
  }
  .chat-send-btn:hover:not(:disabled) { transform: scale(1.05); }
  .chat-send-btn:active:not(:disabled) { transform: scale(0.95); }
  .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .chat-send-btn.is-stop {
    background: linear-gradient(135deg, var(--c-danger), var(--c-danger-dark));
  }

  /* ========== 空状态提示 ========== */
  .chat-empty-tip {
    text-align: center;
    color: var(--c-muted);
    font-size: 0.92rem;
    padding: 50px 20px;
    line-height: 2;
  }
  .chat-empty-tip .big {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 12px;
  }

  /* ========== 会话侧栏 ========== */
  .chat-sidebar-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 1199;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s, visibility 0.25s;
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
  }
  .chat-sidebar-overlay.show { opacity: 1; visibility: visible; }

  .chat-sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    max-width: 85vw;
    background: var(--c-surface);
    z-index: 1200;
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 24px rgba(0, 0, 0, 0.12);
  }
  .chat-sidebar.open { transform: translateX(0); }

  .chat-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    background: var(--header-grad);
    color: #fff;
    flex-shrink: 0;
  }
  .chat-sidebar-title { font-size: 1rem; font-weight: 700; }
  .chat-sidebar-close {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: #fff;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.2s;
  }
  .chat-sidebar-close:hover { background: rgba(255, 255, 255, 0.35); }

  .chat-sidebar-new {
    margin: 12px 14px 8px;
    padding: 10px 14px;
    border: 2px dashed var(--c-primary);
    background: var(--c-primary-soft);
    color: var(--c-primary);
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    font-family: inherit;
  }
  .chat-sidebar-new:hover {
    background: var(--c-primary);
    color: #fff;
  }

  .chat-sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 12px;
    -webkit-overflow-scrolling: touch;
  }
  .chat-sidebar-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 12px;
    margin-bottom: 4px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .chat-sidebar-item:hover { background: var(--c-surface-2); }
  .chat-sidebar-item.active { background: var(--c-primary-soft); }
  .chat-sidebar-item-icon { font-size: 0.95rem; flex-shrink: 0; margin-top: 1px; }
  .chat-sidebar-item-info { flex: 1; min-width: 0; padding-right: 44px; }
  .chat-sidebar-item-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--c-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-sidebar-item-preview {
    font-size: 0.75rem;
    color: var(--c-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .chat-sidebar-item-delete {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--c-muted);
    width: 32px;
    height: 32px;
    font-size: 1.4rem;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.15s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .chat-sidebar-item-delete:hover {
    color: var(--c-danger);
    transform: translateY(-50%) scale(1.15);
  }
  .chat-sidebar-empty {
    text-align: center;
    color: var(--c-muted);
    font-size: 0.82rem;
    padding: 30px 16px;
  }

  /* ========== 清空确认弹窗 ========== */
  .chat-confirm-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1300;
    display: none;
    justify-content: center;
    align-items: center;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .chat-confirm-overlay.show { display: flex; }
  .chat-confirm-modal {
    background: var(--c-surface);
    border-radius: 16px;
    padding: 24px;
    max-width: 320px;
    width: calc(100% - 40px);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  .chat-confirm-title {
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--c-text);
    margin-bottom: 8px;
  }
  .chat-confirm-warn {
    color: var(--c-primary-light);
    font-weight: 500;
    font-size: 0.95rem;
    margin-bottom: 20px;
  }
  .chat-confirm-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .chat-confirm-cancel {
    padding: 10px 24px;
    border: 1px solid var(--c-border);
    border-radius: 8px;
    background: var(--c-surface);
    color: var(--c-muted);
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  .chat-confirm-cancel:hover { background: var(--c-surface-2); }
  .chat-confirm-ok {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    background: var(--btn-grad);
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
    transition: opacity 0.2s;
    font-family: inherit;
  }
  .chat-confirm-ok:hover { opacity: 0.9; }

  /* ========== 移动端适配 ========== */
  @media (max-width: 600px) {
    .chat-header { padding: 8px 14px; }
    .chat-header h2 { font-size: 1.05rem; }
    .chat-messages { padding: 14px; gap: 12px; }
    .msg-bubble { padding: 10px 14px; font-size: 0.9rem; }
    .chat-input-area { padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bottom)); gap: 8px; }
    .chat-input { padding: 10px 14px; font-size: 0.9rem; }
    .chat-send-btn { width: 40px; height: 40px; }
  }
  @media (max-width: 380px) {
    .chat-header h2 { font-size: 0.98rem; }
    .msg-bubble { font-size: 0.85rem; padding: 9px 12px; }
  }

  /* ========== 无障碍：减少动画 ========== */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>

<div class="chat-app">

  <header class="chat-header">
    <button type="button" class="chat-menu-btn" id="chatMenuBtn" title="查看聊天记录" aria-label="查看聊天记录">
      <span></span><span></span>
    </button>
    <div class="chat-header-title">
      <h2>灵知</h2>
    </div>
    <div class="chat-header-actions">
      <button type="button" class="chat-header-btn chat-header-new-btn" id="chatNewBtn" title="新话题" aria-label="新话题">
        <span class="chat-plus-icon"></span>
      </button>
      <button type="button" class="chat-header-btn" id="chatClearBtn" title="清空记录" aria-label="清空记录">🗑</button>
    </div>
  </header>

  <main class="chat-messages" id="chatMessages" role="log" aria-live="polite" aria-label="聊天消息"></main>

  <footer class="chat-input-area">
    <textarea
      class="chat-input"
      id="chatInput"
      placeholder="输入你的问题……"
      rows="1"
      maxlength="2000"
      aria-label="消息输入框"
    ></textarea>
    <button type="button" class="chat-send-btn" id="chatSendBtn" title="发送" aria-label="发送">→</button>
  </footer>

</div>

<!-- 会话列表侧栏 -->
<div class="chat-sidebar-overlay" id="chatSidebarOverlay"></div>
<aside class="chat-sidebar" id="chatSidebar" aria-label="聊天会话列表">
  <div class="chat-sidebar-header">
    <span class="chat-sidebar-title">聊天记录</span>
    <button type="button" class="chat-sidebar-close" id="chatSidebarClose" aria-label="关闭">×</button>
  </div>
  <button type="button" class="chat-sidebar-new" id="chatSidebarNewBtn">✚ 新建话题</button>
  <div class="chat-sidebar-list" id="chatSidebarList"></div>
</aside>

<div class="chat-confirm-overlay" id="chatConfirmOverlay" role="alertdialog" aria-modal="true" aria-labelledby="chatConfirmTitle">
  <div class="chat-confirm-modal">
    <div class="chat-confirm-title" id="chatConfirmTitle">确认清空聊天记录？</div>
    <div class="chat-confirm-warn" id="chatConfirmWarn">此操作不可恢复</div>
    <div class="chat-confirm-btns">
      <button type="button" class="chat-confirm-cancel" id="chatConfirmCancel">取消</button>
      <button type="button" class="chat-confirm-ok" id="chatConfirmOk">确认</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ================================================================
   * 配置区
   * ================================================================ */

  const CONFIG = {
    /** API 端点 */
    API_URL: "https://apihub.agnes-ai.com/v1/chat/completions",

    /** 存储 */
    STORAGE_KEY: "ai_chat_sessions",

    /** 模型 */
    MODEL: "agnes-2.0-flash",
    MAX_TOKENS: 2048,
    TEMPERATURE: 0.3,

    /** 重试 */
    MAX_RETRIES: 2,
    RETRY_BASE_DELAY: 1000,

    /** UI */
    MAX_TEXTAREA_HEIGHT: 120,
    RENDER_INTERVAL: 30,       // ms — 流式渲染节流
    SCROLL_THRESHOLD: 100,     // px — 距底部多少内自动滚动
    KATEX_WAIT_TIMEOUT: 5000,  // ms — 等待 KaTeX 加载
    MAX_INPUT_LENGTH: 2000,
  };

  /*
   * ============================================================
   *  凭证混淆层
   *
   *  ⚠️ 纯前端无法真正保护密钥，以下为多层混淆以显著提高
   *     逆向提取成本。如需真正安全请使用后端代理。
   *
   *  混淆策略（4 层）：
   *    1. XOR 加密——原始密钥逐字节与掩码异或，非简单编码
   *    2. 分片存储——密文拆成多段 hex，散落在不同数组位置
   *    3. 变量名伪装——函数/变量名不暗示与密钥的关系
   *    4. 运行时拼装——密钥不落变量，用后即弃
   *
   *  更换密钥：运行 keygen.html，粘贴新 Key 即可生成新代码块
   * ============================================================
   */

  // 第 1 层：密文分片（XOR 后的 hex，看起来像随机配置数据）
  var _cf = [
    "0b06140723060567", "3d5a5c02006b2335",
    "3b596d5f664a383f", "290e502430420711",
    "31227f3b3a663a37", "0e195d5330574129",
    "4e0363"
  ];

  // 第 2 层：掩码（看起来像构建版本号）
  var _bv = "xm9kQ2vP";

  // 第 3 层：解码函数（名称伪装为「构建配置解析」）
  function _pc(h, k) {
    var r = "";
    for (var i = 0; i < h.length; i += 2) {
      r += String.fromCharCode(
        parseInt(h.substr(i, 2), 16) ^ k.charCodeAt((i >> 1) % k.length)
      );
    }
    return r;
  }

  // 第 4 层：运行时拼装——每次调用重新解密，不缓存到变量
  function _ar() {
    return _pc(_cf.join(""), _bv);
  }

  const SYSTEM_PROMPT =
    "你是一个智能、友好、知识渊博的 AI 助手。请用中文回答用户的问题，回答要清晰、准确、有条理。\n\n" +
    "【输出格式要求】\n" +
    "1. 数学公式使用 LaTeX 语法并用美元符号包裹：\n" +
    "   - 行内公式：用 $...$ 包裹，例如 $\\sqrt{4}$、$\\frac{1}{2}$、$x^2$、$a^2+b^2=c^2$\n" +
    "   - 独占一行的大公式：用 $$...$$ 包裹，例如 $$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$\n" +
    "2. 根号写法：$\\sqrt{4}$ 而不是 √4\n" +
    "3. 分数写法：$\\frac{1}{2}$ 而不是 1/2\n" +
    "4. 平方写法：$x^2$ 而不是 x²\n" +
    "5. 使用 Markdown 格式组织内容（# 标题，**加粗**，- 列表等）\n" +
    "6. 严格禁止任何自我介绍，直接给出答案";

  /** 生成空状态 HTML */
  function buildEmptyTipHTML() {
    return (
      '<div class="chat-empty-tip">' +
      '<span class="big">👋</span>' +
      "你好！我是灵知" +
      "</div>"
    );
  }

  /* ================================================================
   * 状态
   * ================================================================ */

  // 多会话数据结构：
  // sessions = [{ id, title, createdAt, messages: [{ id, role, content }] }]
  var sessions = [];
  var currentSessionId = null;
  var nextId = 1;          // 消息自增 ID
  var isGenerating = false;
  var abortController = null;
  var pendingDeleteMsg = null;
  var scrollRafId = null;

  /** 获取当前会话 */
  function currentSession() {
    return sessions.find(function (s) { return s.id === currentSessionId; });
  }

  /** 获取当前会话的消息数组（快捷方式） */
  function chatData() {
    var s = currentSession();
    return s ? s.messages : [];
  }

  /** 向当前会话添加消息 */
  function addMessageData(role, content) {
    var s = currentSession();
    if (!s) return { id: -1, role: role, content: content };
    var msg = { id: nextId++, role: role, content: content };
    s.messages.push(msg);
    // 第一条用户消息自动设为会话标题
    if (s.title === "新话题" && role === "user") {
      s.title = content.substring(0, 20) + (content.length > 20 ? "…" : "");
    }
    return msg;
  }

  /** 从当前会话删除消息 */
  function removeMessageData(id) {
    var s = currentSession();
    if (!s) return;
    s.messages = s.messages.filter(function (m) { return m.id !== id; });
  }

  /* ================================================================
   * 会话管理
   * ================================================================ */

  /** 创建新会话 */
  function createSession() {
    var s = {
      id: Date.now() + Math.random().toString(36).substr(2, 5),
      title: "新话题",
      createdAt: Date.now(),
      messages: [],
    };
    sessions.unshift(s);
    currentSessionId = s.id;
    saveSessions();
    return s;
  }

  /** 切换到指定会话 */
  function switchSession(id) {
    currentSessionId = id;
    saveSessions();
    renderCurrentSession();
    closeSidebar();
  }

  /** 删除会话 */
  /** 待删除的会话 ID */
  var pendingDeleteSessionId = null;

  /** 弹窗确认删除会话 */
  function confirmDeleteSession(id) {
    pendingDeleteSessionId = id;
    chatConfirmTitle.textContent = "确认删除这个话题？";
    chatConfirmWarn.textContent = "该话题的所有聊天记录将被删除";
    showConfirm();
  }

  /** 删除会话 */
  function deleteSession(id) {
    // 如果正在生成且删的是当前会话，先中止
    if (id === currentSessionId && abortController) {
      abortController.abort();
      abortController = null;
      toggleSendButton(false);
    }
    sessions = sessions.filter(function (s) { return s.id !== id; });

    if (currentSessionId === id || sessions.length === 0) {
      // 删除的是当前会话（或全部删完）——创建一个新的空话题
      createSession();
      closeSidebar();
      renderEmptyState();
    } else {
      saveSessions();
      renderSidebarList();
    }
  }

  /** 持久化所有会话 */
  function saveSessions() {
    try {
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(sessions));
    } catch (e) {
      console.warn("saveSessions error:", e);
    }
  }

  /** 从 localStorage 加载所有会话 */
  function loadSessions() {
    try {
      var raw = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (!raw) return;
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) {
        sessions = parsed;
        // 恢复 nextId
        var maxId = 0;
        sessions.forEach(function (s) {
          s.messages.forEach(function (m) {
            if (m.id > maxId) maxId = m.id;
          });
        });
        nextId = maxId + 1;
      }
    } catch (e) {
      console.warn("loadSessions error:", e);
    }
  }

  /** 渲染当前会话到 DOM */
  function renderCurrentSession() {
    var s = currentSession();
    if (!s || s.messages.length === 0) {
      renderEmptyState();
      return;
    }
    chatMessages.innerHTML = "";
    s.messages.forEach(function (m) {
      if (!m.content || !m.content.trim()) return;
      var el = createMessageElement(m);
      chatMessages.appendChild(el);
    });
    scrollToBottom(true);
  }

  /* ================================================================
   * DOM 引用
   * ================================================================ */

  var chatMessages, chatInput, chatSendBtn, chatClearBtn, chatNewBtn;
  var chatConfirmOverlay, chatConfirmCancel, chatConfirmOk;
  var chatConfirmTitle, chatConfirmWarn;
  var chatSidebar, chatSidebarOverlay, chatSidebarClose, chatSidebarNewBtn, chatSidebarList;

  /* ================================================================
   * 工具函数
   * ================================================================ */

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function fixLatex(text) {
    return text
      // \sqrt{x}{y} → \sqrt[x]{y}（根号下标旧写法）
      .replace(/\\sqrt\{([^{}]+)\}\{([^{}]+)\}/g, "\\sqrt[$1]{$2}")
      // \sqrt2 → \sqrt{2}（裸数字）
      .replace(/\\sqrt(\d)/g, "\\sqrt{$1}")
      // \sqrt[3]x → \sqrt[3]{x}（有下标但缺花括号）
      .replace(/\\sqrt(\[[^\]]+\])([a-zA-Z])/g, "\\sqrt$1{$2}")
      // \frac12 → \frac{1}{2}（裸数字分数）
      .replace(/\\frac(\d)(\d)/g, "\\frac{$1}{$2}")
      .replace(/\\frac(\d)\{([^{}]+)\}/g, "\\frac{$1}{$2}")
      .replace(/\\frac\{([^{}]+)\}(\d)/g, "\\frac{$1}{$2}")
      // Unicode 数学符号 → LaTeX
      .replace(/√/g, "\\sqrt ")
      .replace(/×/g, "\\times ")
      .replace(/÷/g, "\\div ")
      .replace(/≤/g, "\\leq ")
      .replace(/≥/g, "\\geq ")
      .replace(/≠/g, "\\neq ")
      .replace(/→/g, "\\rightarrow ")
      .replace(/←/g, "\\leftarrow ")
      .replace(/↔/g, "\\leftrightarrow ")
      .replace(/∞/g, "\\infty ")
      .replace(/∑/g, "\\sum ")
      .replace(/∫/g, "\\int ")
      .replace(/∏/g, "\\prod ")
      .replace(/∂/g, "\\partial ")
      .replace(/∇/g, "\\nabla ")
      .replace(/∈/g, "\\in ")
      .replace(/∉/g, "\\notin ")
      .replace(/⊂/g, "\\subset ")
      .replace(/⊃/g, "\\supset ")
      .replace(/∪/g, "\\cup ")
      .replace(/∩/g, "\\cap ")
      .replace(/∀/g, "\\forall ")
      .replace(/∃/g, "\\exists ")
      .replace(/°/g, "^\\circ ")
      .replace(/±/g, "\\pm ")
      .replace(/∓/g, "\\mp ")
      // 希腊字母（仅在非 \ 开头时替换，避免重复处理 \alpha 等）
      .replace(/(^|[^\\])π/g, "$1\\pi ")
      .replace(/(^|[^\\])α/g, "$1\\alpha ")
      .replace(/(^|[^\\])β/g, "$1\\beta ")
      .replace(/(^|[^\\])γ/g, "$1\\gamma ")
      .replace(/(^|[^\\])δ/g, "$1\\delta ")
      .replace(/(^|[^\\])ε/g, "$1\\varepsilon ")
      .replace(/(^|[^\\])θ/g, "$1\\theta ")
      .replace(/(^|[^\\])λ/g, "$1\\lambda ")
      .replace(/(^|[^\\])μ/g, "$1\\mu ")
      .replace(/(^|[^\\])ρ/g, "$1\\rho ")
      .replace(/(^|[^\\])σ/g, "$1\\sigma ")
      .replace(/(^|[^\\])τ/g, "$1\\tau ")
      .replace(/(^|[^\\])φ/g, "$1\\varphi ")
      .replace(/(^|[^\\])ψ/g, "$1\\psi ")
      .replace(/(^|[^\\])ω/g, "$1\\omega ")
      .replace(/(^|[^\\])Δ/g, "$1\\Delta ")
      .replace(/(^|[^\\])Σ/g, "$1\\Sigma ")
      .replace(/(^|[^\\])Ω/g, "$1\\Omega ");
  }

  /**
   * 将文本+公式混合内容渲染为 HTML
   * 安全：text 部分先 escapeHtml 再做 Markdown 替换，防止 XSS
   *
   * 正则策略：$$...$$ 优先于 $...$ 匹配，避免误判
   */
  function renderContent(text) {
    if (!text) return "";
    var fixed = fixLatex(text);

    // 第 1 轮：提取代码块 ```...```，用占位符替换，防止其中的 $ 被公式正则匹配
    var codeBlocks = [];
    fixed = fixed.replace(/```(\w*)\n?([\s\S]*?)```/g, function (m, lang, code) {
      var idx = codeBlocks.length;
      codeBlocks.push({ lang: lang, code: code.replace(/\n$/, "") });
      return "\x00CODE" + idx + "\x00";
    });

    // 第 2 轮：分离公式与文本
    // $$...$$ 优先匹配（块级），$...$ 其次（行内）
    var regex = /\$\$([\s\S]+?)\$\$|\$([^$]+?)\$/g;
    var parts = [];
    var lastEnd = 0;
    var match;

    while ((match = regex.exec(fixed)) !== null) {
      if (match.index > lastEnd) {
        parts.push({ type: "text", content: fixed.substring(lastEnd, match.index) });
      }
      if (match[1] !== undefined) {
        parts.push({ type: "block", content: match[1].trim() });
      } else {
        parts.push({ type: "inline", content: match[2].trim() });
      }
      lastEnd = match.index + match[0].length;
    }
    if (lastEnd < fixed.length) {
      parts.push({ type: "text", content: fixed.substring(lastEnd) });
    }

    // 第 3 轮：渲染各部分
    var result = "";
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      if (p.type === "text") {
        // 块级公式前后的文本：去掉首尾换行，避免 <br> 和公式 margin 叠加产生多余空白
        var textContent = p.content;
        if (i > 0 && parts[i - 1].type === "block") {
          textContent = textContent.replace(/^\n+/, "");
        }
        if (i < parts.length - 1 && parts[i + 1].type === "block") {
          textContent = textContent.replace(/\n+$/, "");
        }
        result += renderText(textContent);
      } else {
        // 公式渲染
        try {
          if (typeof katex === "undefined") {
            result += '<code class="math-fallback">' + escapeHtml(p.content) + "</code>";
          } else {
            var html = katex.renderToString(p.content, {
              throwOnError: false,
              displayMode: p.type === "block",
              output: "html",
            });
            if (p.type === "block") {
              result += '<div class="katex-block">' + html + "</div>";
            } else {
              result += html;
            }
          }
        } catch (e) {
          result += '<code class="math-fallback">' + escapeHtml(p.content) + "</code>";
        }
      }
    }

    // 第 4 轮：还原代码块占位符
    result = result.replace(/\x00CODE(\d+)\x00/g, function (m, idx) {
      var block = codeBlocks[parseInt(idx, 10)];
      if (!block) return m;
      return (
        '<pre class="code-block"><code>' +
        escapeHtml(block.code) +
        "</code></pre>"
      );
    });

    return result;
  }

  /** 渲染纯文本部分：escape → Markdown */
  function renderText(text) {
    // 先 escape 防 XSS
    var html = escapeHtml(text);

    // 行内代码 `...`（在 Markdown 格式化之前处理，避免内容被其他规则破坏）
    var inlineCodes = [];
    html = html.replace(/`([^`]+)`/g, function (m, code) {
      var idx = inlineCodes.length;
      inlineCodes.push(code);
      return "\x01INLINE" + idx + "\x01";
    });

    // 标题
    html = html.replace(/^#{1,6}\s+(.+)$/gm, function (m, content) {
      var level = m.match(/^#+/)[0].length;
      return "</p><h" + level + ">" + content + "</h" + level + "><p>";
    });

    // 加粗
    html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

    // 单星号不转斜体（AI 常用 * 做乘法/列表，转斜体误伤太多）
    // 保留原样

    // 无序列表
    html = html.replace(/^[-*]\s+/gm, "• ");

    // 有序列表
    html = html.replace(/^(\d+\.)\s+/gm, "$1 ");

    // 换行
    html = html.replace(/\n/g, "<br>");

    // 还原行内代码
    html = html.replace(/\x01INLINE(\d+)\x01/g, function (m, idx) {
      return '<code class="code-inline">' + inlineCodes[parseInt(idx, 10)] + "</code>";
    });

    return html;
  }

  /** 渲染用户消息（纯文本，转义 + 换行） */
  function renderUserText(text) {
    return escapeHtml(text).replace(/\n/g, "<br>");
  }

  /** 长公式自动缩小字体 */
  function autoScaleKatex(container) {
    if (!container) return;
    var blocks = container.querySelectorAll(".katex-block");
    blocks.forEach(function (block) {
      block.style.fontSize = "";
      var parentWidth = block.clientWidth || block.parentElement.clientWidth || 300;
      var scales = [0.96, 0.86, 0.76, 0.66, 0.56];
      for (var i = 0; i < scales.length; i++) {
        block.style.fontSize = scales[i] + "em";
        var el = block.querySelector(".katex-display") || block.querySelector(".katex");
        if (!el || el.scrollWidth <= parentWidth + 2) break;
      }
    });
  }

  /* ================================================================
   * 滚动控制（rAF 节流）
   * ================================================================ */

  function isNearBottom() {
    return (
      chatMessages.scrollHeight -
        chatMessages.scrollTop -
        chatMessages.clientHeight <
      CONFIG.SCROLL_THRESHOLD
    );
  }

  function scrollToBottom(force) {
    if (scrollRafId) {
      if (!force) return;
      cancelAnimationFrame(scrollRafId);
    }
    scrollRafId = requestAnimationFrame(function () {
      chatMessages.scrollTop = chatMessages.scrollHeight;
      scrollRafId = null;
    });
  }

  /* ================================================================
   * 数据管理 — 已在会话管理区定义
   * ================================================================ */

  /** 保存当前会话（兼容旧调用名） */
  function saveChatHistory() {
    saveSessions();
    // 如果侧栏打开，同步刷新
    if (chatSidebar && chatSidebar.classList.contains("open")) {
      renderSidebarList();
    }
  }

  /* ================================================================
   * DOM 渲染
   * ================================================================ */

  function createMessageElement(msg) {
    var div = document.createElement("div");
    div.className = "message " + (msg.role === "user" ? "user" : "ai");
    div.dataset.msgId = msg.id;

    var bubble = document.createElement("div");
    bubble.className = "msg-bubble";

    if (msg.role === "user") {
      bubble.innerHTML = renderUserText(msg.content);
    } else {
      bubble.innerHTML = renderContent(msg.content);
      autoScaleKatex(bubble);
    }

    // 删除按钮
    var delBtn = document.createElement("button");
    delBtn.type = "button";
    delBtn.className = "msg-delete";
    delBtn.title = "删除";
    delBtn.setAttribute("aria-label", "删除此消息");
    delBtn.textContent = "×";
    delBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      confirmDeleteMessage(div);
    });
    bubble.appendChild(delBtn);

    // 长按气泡弹出操作菜单（长按 500ms）
    var longPressTimer = null;
    var startX = 0;
    var startY = 0;

    function getClientX(e) {
      if (e.touches && e.touches.length > 0) return e.touches[0].clientX;
      if (e.changedTouches && e.changedTouches.length > 0) return e.changedTouches[0].clientX;
      return e.clientX || 0;
    }
    function getClientY(e) {
      if (e.touches && e.touches.length > 0) return e.touches[0].clientY;
      if (e.changedTouches && e.changedTouches.length > 0) return e.changedTouches[0].clientY;
      return e.clientY || 0;
    }

    function startLongPress(e) {
      startX = getClientX(e);
      startY = getClientY(e);
      longPressTimer = setTimeout(function () {
        if (navigator.vibrate) navigator.vibrate(15);
        showMsgActionMenu(div, bubble, msg, startX, startY);
      }, 500);
    }

    function cancelLongPress() {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }

    function handleMove(e) {
      if (!longPressTimer) return;
      var cx = getClientX(e);
      var cy = getClientY(e);
      if (Math.abs(cx - startX) > 10 || Math.abs(cy - startY) > 10) {
        cancelLongPress();
      }
    }

    bubble.addEventListener("touchstart", startLongPress, { passive: true });
    bubble.addEventListener("touchend", cancelLongPress);
    bubble.addEventListener("touchmove", handleMove, { passive: true });
    bubble.addEventListener("touchcancel", cancelLongPress);
    bubble.addEventListener("contextmenu", function (e) {
      e.preventDefault();
      showMsgActionMenu(div, bubble, msg, startX, startY);
    });
    bubble.addEventListener("mousedown", startLongPress);
    bubble.addEventListener("mouseup", cancelLongPress);
    bubble.addEventListener("mouseleave", cancelLongPress);

    div.appendChild(bubble);
    return div;
  }

  function renderEmptyState() {
    chatMessages.innerHTML = buildEmptyTipHTML();
  }

  /* ================================================================
   * 长按气泡操作菜单（复制 / 删除 / 撤销）
   * ================================================================ */

  var currentActionMenu = null;

  function hideMsgActionMenu() {
    if (currentActionMenu) {
      currentActionMenu.remove();
      currentActionMenu = null;
    }
  }

  function showMsgActionMenu(msgDiv, bubble, msg, clickX, clickY) {
    hideMsgActionMenu();

    var menu = document.createElement("div");
    menu.className = "msg-action-menu";

    // 菜单项
    var items = [
      { icon: "📋", label: "复制", action: function () { copyMessageText(msg.content); } },
      { icon: "🗑", label: "删除", action: function () { confirmDeleteMessage(msgDiv); } },
    ];
    if (msg.role === "user") {
      items.push({ icon: "↩", label: "撤销", action: function () { undoLastMessage(msg); } });
    }

    for (var i = 0; i < items.length; i++) {
      if (i > 0) {
        var divider = document.createElement("div");
        divider.className = "msg-action-menu-divider";
        menu.appendChild(divider);
      }
      var itemEl = document.createElement("div");
      itemEl.className = "msg-action-menu-item";
      itemEl.innerHTML = '<span class="icon" aria-hidden="true">' + items[i].icon + '</span><span>' + items[i].label + '</span>';
      (function (action) {
        itemEl.addEventListener("click", function () {
          hideMsgActionMenu();
          action();
        });
      })(items[i].action);
      menu.appendChild(itemEl);
    }

    document.body.appendChild(menu);

    // 定位：根据气泡位置 + 点击位置计算，避免超出屏幕
    var bubbleRect = bubble.getBoundingClientRect();
    var menuRect = menu.getBoundingClientRect();
    var vw = window.innerWidth;
    var vh = window.innerHeight;

    var posX = clickX || (bubbleRect.left + bubbleRect.width / 2);
    var posY = bubbleRect.top + bubbleRect.height + 8;

    // 水平方向修正：确保不超出屏幕
    posX = Math.max(12, Math.min(posX, vw - menuRect.width - 12));

    // 垂直方向：如果下方空间不够则显示在上方
    if (posY + menuRect.height > vh - 12 && bubbleRect.top - menuRect.height - 8 > 12) {
      posY = bubbleRect.top - menuRect.height - 8;
    }
    posY = Math.max(12, Math.min(posY, vh - menuRect.height - 12));

    menu.style.left = Math.round(posX - menuRect.width / 2) + "px";
    menu.style.top = Math.round(posY) + "px";

    currentActionMenu = menu;
  }

  function copyMessageText(text) {
    var plain = text || "";
    if (window.clipboardData && window.clipboardData.setData) {
      try { window.clipboardData.setData("Text", plain); } catch (e) {}
      return;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(plain).catch(function () {});
      return;
    }
    try {
      var ta = document.createElement("textarea");
      ta.value = plain;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    } catch (e) {}
  }

  function undoLastMessage(msg) {
    // 撤销：从该条用户消息起删除后面的所有消息（用户消息 + 后续 AI 回复）
    var s = currentSession();
    if (!s) return;
    var found = false;
    var newMessages = [];
    for (var i = 0; i < s.messages.length; i++) {
      if (s.messages[i].id === msg.id) {
        found = true;
        continue;
      }
      if (found) continue;
      newMessages.push(s.messages[i]);
    }
    s.messages = newMessages;
    saveChatHistory();
    renderCurrentSession();
  }

  /* ================================================================
   * 输入框
   * ================================================================ */

  function updateInputHeight() {
    chatInput.style.height = "auto";
    chatInput.style.height =
      Math.min(chatInput.scrollHeight, CONFIG.MAX_TEXTAREA_HEIGHT) + "px";
  }

  /* ================================================================
   * 发送 / 停止
   * ================================================================ */

  function toggleSendButton(generating) {
    isGenerating = generating;
    if (generating) {
      chatSendBtn.textContent = "⏹";
      chatSendBtn.title = "停止生成";
      chatSendBtn.setAttribute("aria-label", "停止生成");
      chatSendBtn.classList.add("is-stop");
    } else {
      chatSendBtn.textContent = "→";
      chatSendBtn.title = "发送";
      chatSendBtn.setAttribute("aria-label", "发送");
      chatSendBtn.classList.remove("is-stop");
    }
  }

  function stopGeneration() {
    if (abortController) abortController.abort();
  }

  async function sendMessage() {
    // 如果正在生成，点击按钮 = 停止
    if (isGenerating) {
      stopGeneration();
      return;
    }

    var text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = "";
    chatInput.style.height = "auto";
    toggleSendButton(true);

    // 移除空状态
    var emptyTip = chatMessages.querySelector(".chat-empty-tip");
    if (emptyTip) emptyTip.remove();

    // 添加用户消息到数据和 DOM
    var userMsg = addMessageData("user", text);
    var userMsgDiv = createMessageElement(userMsg);
    chatMessages.appendChild(userMsgDiv);
    scrollToBottom(true);

    // 身份类问题——只在明确询问AI身份时触发
    // 精确匹配完整短语，避免误判正常问题（如"青光眼是什么"）
    var identityKeywords = [
      "你是谁", "您是谁", "你是谁呀", "你是谁啊",
      "你叫什么名字", "你叫啥",
      "你的名字", "您的名字",
      "你是哪位", "你是哪个", "你是什么东西",
      "介绍一下你自己", "介绍一下自己", "介绍你自己", "自我介绍",
      "who are you", "what is your name", "your name"
    ];
    var trimmed = text.trim().toLowerCase();
    var isIdentityQuestion = identityKeywords.some(function (keyword) {
      return trimmed.indexOf(keyword.toLowerCase()) !== -1;
    });
    // 二次验证：必须同时包含第二人称代词或英文身份词
    if (isIdentityQuestion) {
      var hasIdentityContext = /(你|您|who|your name)/i.test(text);
      if (!hasIdentityContext) isIdentityQuestion = false;
    }
    if (isIdentityQuestion) {
      var aiReply = addMessageData("assistant", "我是灵知，请问有什么可以帮你的？");
      var aiMsgDiv = document.createElement("div");
      aiMsgDiv.className = "message ai";
      aiMsgDiv.innerHTML = '<div class="msg-bubble">' + renderContent("我是灵知，请问有什么可以帮你的？") + "</div>";
      chatMessages.appendChild(aiMsgDiv);
      appendActions(aiMsgDiv.querySelector(".msg-bubble"), aiMsgDiv, "我是灵知，请问有什么可以帮你的？");
      scrollToBottom();
      saveChatHistory();
      toggleSendButton(false);
      return;
    }

    // 创建 AI 占位消息（不加入 chatData）
    var aiMsgDiv = document.createElement("div");
    aiMsgDiv.className = "message ai";
    aiMsgDiv.innerHTML =
      '<div class="msg-bubble">正在思考' +
      '<div class="typing-indicator">' +
      '<div class="typing-dot"></div>' +
      '<div class="typing-dot"></div>' +
      '<div class="typing-dot"></div>' +
      "</div></div>";
    chatMessages.appendChild(aiMsgDiv);
    var bubble = aiMsgDiv.querySelector(".msg-bubble");
    scrollToBottom(true);

    // 构建上下文（从 chatData，不包含当前占位）
    var historyMessages = [{ role: "system", content: SYSTEM_PROMPT }];
    var msgs = chatData();
    msgs.forEach(function (m) {
      historyMessages.push({ role: m.role, content: m.content });
    });

    abortController = new AbortController();

    var fullContent = "";
    var renderTimeout = null;

    var self = this;

    function doRender() {
      // 全量重渲染——避免公式被流式 chunk 截断
      bubble.innerHTML = renderContent(fullContent);
      if (isNearBottom()) scrollToBottom();
      renderTimeout = null;
    }

    try {
      // ===== 带重试的请求 =====
      var response = null;
      var retryCount = 0;

      while (retryCount <= CONFIG.MAX_RETRIES) {
        try {
          response = await doFetch(historyMessages);
          if (response.ok) break;

          var errorText = await response.text();
          if (response.status >= 500 && response.status < 600 && retryCount < CONFIG.MAX_RETRIES) {
            retryCount++;
            await delay(CONFIG.RETRY_BASE_DELAY * retryCount);
            continue;
          }
          throw new Error("API 请求失败：" + response.status + " " + errorText);
        } catch (err) {
          if (err.name === "AbortError") throw err;
          if (retryCount < CONFIG.MAX_RETRIES) {
            retryCount++;
            await delay(CONFIG.RETRY_BASE_DELAY * retryCount);
            continue;
          }
          throw err;
        }
      }

      // ===== 流式读取（SSE buffer 修复） =====
      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var sseBuffer = "";

      while (true) {
        var result = await reader.read();
        if (result.done) break;

        sseBuffer += decoder.decode(result.value, { stream: true });
        var lines = sseBuffer.split("\n");
        // 保留最后一条可能不完整的行
        sseBuffer = lines.pop();

        for (var li = 0; li < lines.length; li++) {
          var line = lines[li].trim();
          if (line === "" || line === "data: [DONE]") continue;
          if (!line.startsWith("data: ")) continue;

          try {
            var data = JSON.parse(line.slice(6));
            var delta = data.choices && data.choices[0] && data.choices[0].delta && data.choices[0].delta.content;
            if (!delta) continue;

            if (fullContent.length === 0) {
              bubble.innerHTML = "";
            }
            fullContent += delta;

            // 节流全量重渲染——公式不会被 chunk 边界截断
            if (renderTimeout) clearTimeout(renderTimeout);
            renderTimeout = setTimeout(doRender, CONFIG.RENDER_INTERVAL);
          } catch (e) {
            // JSON 解析失败——跳过，等待下一个完整 chunk
          }
        }
      }

      // 处理 buffer 中残留的最后一行
      if (sseBuffer.trim() && sseBuffer.trim() !== "data: [DONE]" && sseBuffer.trim().startsWith("data: ")) {
        try {
          var remainData = JSON.parse(sseBuffer.trim().slice(6));
          var remainDelta = remainData.choices && remainData.choices[0] && remainData.choices[0].delta && remainData.choices[0].delta.content;
          if (remainDelta) fullContent += remainDelta;
        } catch (e) { /* ignore */ }
      }

      // ===== 最终渲染 =====
      if (renderTimeout) clearTimeout(renderTimeout);

      if (!fullContent.trim()) {
        throw new Error("未收到有效响应");
      }

      // 添加到 chatData
      var aiMsg = addMessageData("assistant", fullContent);
      aiMsgDiv.dataset.msgId = aiMsg.id;

      // 最终全量渲染
      bubble.innerHTML = renderContent(fullContent);
      appendActions(bubble, aiMsgDiv, fullContent);
      autoScaleKatex(bubble);
      scrollToBottom();
      saveChatHistory();

    } catch (err) {
      if (renderTimeout) clearTimeout(renderTimeout);

      if (err.name === "AbortError") {
        // 用户主动停止——保存已收到的部分内容
        if (fullContent.trim()) {
          var partialMsg = addMessageData("assistant", fullContent);
          aiMsgDiv.dataset.msgId = partialMsg.id;

          bubble.innerHTML = renderContent(fullContent);
          appendActions(bubble, aiMsgDiv, fullContent);
          autoScaleKatex(bubble);
          saveChatHistory();
        } else {
          // 没有收到任何内容，移除占位
          aiMsgDiv.remove();
        }
      } else {
        // 其他错误
        bubble.innerHTML = renderContent("❌ 出错了：" + err.message);
        appendActions(bubble, aiMsgDiv, fullContent || "");
        console.error(err);
      }
    } finally {
      toggleSendButton(false);
      abortController = null;
    }
  }

  /** 向 bubble 追加删除 + 复制按钮 */
  function appendActions(bubble, msgDiv, content) {
    // 删除
    var delBtn = document.createElement("button");
    delBtn.type = "button";
    delBtn.className = "msg-delete";
    delBtn.title = "删除";
    delBtn.setAttribute("aria-label", "删除此消息");
    delBtn.textContent = "×";
    delBtn.addEventListener("click", function () { confirmDeleteMessage(msgDiv); });
    bubble.appendChild(delBtn);
  }

  /** 构造请求——密钥运行时解密，用后不驻留变量 */
  function doFetch(historyMessages) {
    return fetch(CONFIG.API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + _ar(),
      },
      signal: abortController.signal,
      body: JSON.stringify({
        model: CONFIG.MODEL,
        messages: historyMessages,
        temperature: CONFIG.TEMPERATURE,
        max_tokens: CONFIG.MAX_TOKENS,
        stream: true,
      }),
    });
  }

  function delay(ms) {
    return new Promise(function (resolve) { setTimeout(resolve, ms); });
  }

  /* ================================================================
   * 确认弹窗（含焦点陷阱）
   * ================================================================ */

  function confirmDeleteMessage(msgDiv) {
    pendingDeleteMsg = msgDiv;
    chatConfirmTitle.textContent = "确认删除这条消息？";
    chatConfirmWarn.textContent = "删除后无法恢复";
    showConfirm();
  }

  function confirmClearAll() {
    pendingDeleteMsg = null;
    chatConfirmTitle.textContent = "确认清空聊天记录？";
    chatConfirmWarn.textContent = "此操作不可恢复";
    showConfirm();
  }

  function showConfirm() {
    chatConfirmOverlay.classList.add("show");
    // 聚焦到取消按钮（安全默认）
    setTimeout(function () { chatConfirmCancel.focus(); }, 50);
  }

  function hideConfirm() {
    chatConfirmOverlay.classList.remove("show");
    pendingDeleteMsg = null;
    pendingDeleteSessionId = null;
  }

  /** 焦点陷阱——Tab 在弹窗内循环 */
  function trapFocus(e) {
    if (!chatConfirmOverlay.classList.contains("show")) return;
    if (e.key !== "Tab") return;
    var focusable = chatConfirmOverlay.querySelectorAll("button");
    if (!focusable.length) return;
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }

  function onConfirmOk() {
    if (pendingDeleteSessionId) {
      // 删除整个会话
      var sid = pendingDeleteSessionId;
      pendingDeleteSessionId = null;
      hideConfirm();
      deleteSession(sid);
      return;
    }

    if (pendingDeleteMsg) {
      // 删除单条
      var id = parseInt(pendingDeleteMsg.dataset.msgId, 10);
      removeMessageData(id);
      pendingDeleteMsg.remove();
      pendingDeleteMsg = null;
      saveChatHistory();

      if (chatData().length === 0) renderEmptyState();
    } else {
      // 清空当前会话的所有消息
      if (abortController) { abortController.abort(); abortController = null; }
      toggleSendButton(false);
      var s = currentSession();
      if (s) {
        s.messages = [];
        s.title = "新话题";
      }
      saveSessions();
      renderEmptyState();
    }
    hideConfirm();
  }

  /* ================================================================
   * 新话题 & 侧栏
   * ================================================================ */

  /** 开始新话题 */
  function startNewSession() {
    // 如果正在生成，先中止
    if (abortController) { abortController.abort(); abortController = null; }
    toggleSendButton(false);

    // 如果当前会话为空且无消息，直接复用
    var cur = currentSession();
    if (cur && cur.messages.length === 0) {
      closeSidebar();
      renderEmptyState();
      chatInput.focus();
      return;
    }

    createSession();
    closeSidebar();
    renderEmptyState();
    chatInput.focus();
  }

  /** 打开会话列表侧栏 */
  function openSidebar() {
    renderSidebarList();
    chatSidebar.classList.add("open");
    chatSidebarOverlay.classList.add("show");
  }

  /** 关闭会话列表侧栏 */
  function closeSidebar() {
    chatSidebar.classList.remove("open");
    chatSidebarOverlay.classList.remove("show");
  }

  /** 渲染侧栏会话列表 */
  function renderSidebarList() {
    if (!chatSidebarList) return;
    chatSidebarList.innerHTML = "";

    if (sessions.length === 0) {
      chatSidebarList.innerHTML = '<div class="chat-sidebar-empty">暂无聊天记录</div>';
      return;
    }

    sessions.forEach(function (s) {
      var item = document.createElement("div");
      item.className = "chat-sidebar-item" + (s.id === currentSessionId ? " active" : "");

      var icon = document.createElement("span");
      icon.className = "chat-sidebar-item-icon";
      icon.textContent = s.messages.length > 0 ? "💬" : "📝";

      var info = document.createElement("div");
      info.className = "chat-sidebar-item-info";

      var title = document.createElement("div");
      title.className = "chat-sidebar-item-title";
      title.textContent = s.title || "新话题";

      var preview = document.createElement("div");
      preview.className = "chat-sidebar-item-preview";
      var lastMsg = s.messages[s.messages.length - 1];
      preview.textContent = lastMsg
        ? (lastMsg.role === "user" ? "我: " : "AI: ") + lastMsg.content.substring(0, 30)
        : "暂无消息";

      info.appendChild(title);
      info.appendChild(preview);

      item.appendChild(icon);
      item.appendChild(info);

      // 点击切换会话
      item.addEventListener("click", function (e) {
        // 点击删除按钮及其子元素时不切换
        if (e.target.closest(".chat-sidebar-item-delete")) return;
        switchSession(s.id);
      });

      // 删除按钮
      var delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "chat-sidebar-item-delete";
      delBtn.textContent = "×";
      delBtn.setAttribute("aria-label", "删除此会话");
      delBtn.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        confirmDeleteSession(s.id);
      });
      item.appendChild(delBtn);

      chatSidebarList.appendChild(item);
    });
  }

  /* ================================================================
   * 初始化
   * ================================================================ */

  function setupChat() {
    // 获取 DOM
    chatMessages = document.getElementById("chatMessages");
    chatInput = document.getElementById("chatInput");
    chatSendBtn = document.getElementById("chatSendBtn");
    chatClearBtn = document.getElementById("chatClearBtn");
    chatNewBtn = document.getElementById("chatNewBtn");
    chatConfirmOverlay = document.getElementById("chatConfirmOverlay");
    chatConfirmCancel = document.getElementById("chatConfirmCancel");
    chatConfirmOk = document.getElementById("chatConfirmOk");
    chatConfirmTitle = document.getElementById("chatConfirmTitle");
    chatConfirmWarn = document.getElementById("chatConfirmWarn");
    chatSidebar = document.getElementById("chatSidebar");
    chatSidebarOverlay = document.getElementById("chatSidebarOverlay");
    chatSidebarClose = document.getElementById("chatSidebarClose");
    chatSidebarNewBtn = document.getElementById("chatSidebarNewBtn");
    chatSidebarList = document.getElementById("chatSidebarList");

    // ===== 事件绑定 =====

    // 输入框
    chatInput.addEventListener("input", updateInputHeight);
    chatInput.addEventListener("keydown", function (e) {
      // ✅ IME 输入法组合状态不触发发送
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 发送 / 停止按钮
    chatSendBtn.addEventListener("click", sendMessage);

    // 清空记录
    chatClearBtn.addEventListener("click", confirmClearAll);

    // 新话题
    chatNewBtn.addEventListener("click", startNewSession);
    chatSidebarNewBtn.addEventListener("click", startNewSession);

    // 点击标题打开侧栏
    var chatMenuBtn = document.getElementById("chatMenuBtn");
    if (chatMenuBtn) {
      chatMenuBtn.addEventListener("click", openSidebar);
      chatMenuBtn.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openSidebar();
        }
      });
    }

    // 侧栏关闭
    chatSidebarClose.addEventListener("click", closeSidebar);
    chatSidebarOverlay.addEventListener("click", closeSidebar);

    // 确认弹窗
    chatConfirmCancel.addEventListener("click", hideConfirm);
    chatConfirmOk.addEventListener("click", onConfirmOk);
    chatConfirmOverlay.addEventListener("click", function (e) {
      if (e.target === chatConfirmOverlay) hideConfirm();
    });

    // Esc 关闭弹窗 + 焦点陷阱
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        if (currentActionMenu) {
          hideMsgActionMenu();
        } else if (chatConfirmOverlay.classList.contains("show")) {
          hideConfirm();
        } else if (chatSidebar.classList.contains("open")) {
          closeSidebar();
        }
      }
      trapFocus(e);
    });

    // 点击外部关闭操作菜单
    document.addEventListener("click", function (e) {
      if (currentActionMenu && !currentActionMenu.contains(e.target)) {
        hideMsgActionMenu();
      }
    }, true);
    document.addEventListener("touchstart", function (e) {
      if (currentActionMenu && !currentActionMenu.contains(e.target)) {
        hideMsgActionMenu();
      }
    }, { passive: true });

    // 滚动/改变尺寸关闭操作菜单
    window.addEventListener("scroll", hideMsgActionMenu, true);
    window.addEventListener("resize", hideMsgActionMenu);

    // 页面卸载——中止请求
    window.addEventListener("beforeunload", function () {
      if (abortController) abortController.abort();
    });

    // ===== 初始化会话 =====
    loadSessions();
    if (sessions.length === 0) {
      createSession();
    } else {
      currentSessionId = sessions[0].id;
    }
    renderCurrentSession();
    chatInput.focus();
  }

  /** 等待 KaTeX 加载完毕再初始化（解决 defer 竞态） */
  function initWhenReady() {
    var attempts = 0;
    var maxAttempts = CONFIG.KATEX_WAIT_TIMEOUT / 100;

    function check() {
      if (typeof katex !== "undefined" || attempts >= maxAttempts) {
        // KaTeX 已加载，或超时后放弃等待（renderContent 有 fallback）
        setupChat();
      } else {
        attempts++;
        setTimeout(check, 100);
      }
    }
    check();
  }

  // 启动
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initWhenReady);
  } else {
    initWhenReady();
  }
})();
</script>
</body>
</html>
