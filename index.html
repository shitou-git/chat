<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 聊天助手 · 流式输出 · 支持公式渲染">
<meta name="theme-color" content="#8b5cf6">
<title>AI 聊天助手</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  /* ========== 设计令牌 ========== */
  :root {
    --c-primary: #7c3aed;
    --c-primary-light: #8b5cf6;
    --c-primary-soft: #ede9fe;
    --c-accent: #ec4899;
    --c-text: #1f2937;
    --c-muted: #6b7280;
    --c-bg: linear-gradient(135deg, #faf5ff 0%, #fff7ed 50%, #fdf2f8 100%);
    --c-surface: #fff;
    --c-surface-2: #faf5ff;
    --c-border: #e2e8f0;
    --c-danger: #ef4444;
    --c-danger-dark: #dc2626;
    --c-scrollbar: #d1d5db;
    --c-scrollbar-hover: #9ca3af;
    --header-grad: linear-gradient(135deg, var(--c-primary-light), var(--c-accent));
    --btn-grad: linear-gradient(135deg, var(--c-primary-light), var(--c-accent));
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
    --shadow-md: 0 6px 20px rgba(124, 58, 237, 0.12);
    --shadow-lg: 0 12px 32px rgba(139, 92, 246, 0.25);
    --radius-bubble: 18px;
    --radius-btn: 22px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* ========== 暗色模式（系统偏好 OR 手动类 is-dark 双触发） ========== */
  @media (prefers-color-scheme: dark) {
    :root {
      --c-text: #e5e7eb;
      --c-muted: #9ca3af;
      --c-bg: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16121f 100%);
      --c-surface: #1e1e2e;
      --c-surface-2: #1a1a2e;
      --c-border: #374151;
      --c-primary-soft: #2d1b4e;
      --c-scrollbar: #4b5563;
      --c-scrollbar-hover: #6b7280;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
    }
  }

  /* 手动切换暗色：通过 body.is-dark 覆盖主题变量 */
  body.is-dark {
    --c-text: #e5e7eb;
    --c-muted: #9ca3af;
    --c-bg: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16121f 100%);
    --c-surface: #1e1e2e;
    --c-surface-2: #1a1a2e;
    --c-border: #374151;
    --c-primary-soft: #2d1b4e;
    --c-scrollbar: #4b5563;
    --c-scrollbar-hover: #6b7280;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
    color-scheme: dark;
  }

  /* 主题切换按钮：根据 body.is-dark 显示不同图标 */
  #chatThemeBtn .theme-icon-light { display: inline; }
  #chatThemeBtn .theme-icon-dark { display: none; }
  body.is-dark #chatThemeBtn .theme-icon-light { display: none; }
  body.is-dark #chatThemeBtn .theme-icon-dark { display: inline; }

  /* ========== 重置 ========== */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  html { scroll-behavior: smooth; }
  :focus-visible { outline: 2px solid var(--c-primary-light); outline-offset: 2px; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.75;
    word-break: break-word;
    overflow-wrap: break-word;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  /* ========== 全屏聊天容器 ========== */
  .chat-app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 820px;
    margin: 0 auto;
    background: var(--c-surface);
    box-shadow: 0 0 40px rgba(124, 58, 237, 0.08);
  }

  /* ========== 顶部标题栏 ========== */
  .chat-header {
    background: var(--header-grad);
    color: #fff;
    padding: 16px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(139, 92, 246, 0.25);
    z-index: 10;
  }
  .chat-header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
    cursor: pointer;
    border-radius: 8px;
    padding: 4px 8px;
    margin: -4px -8px;
    transition: background 0.2s;
  }
  .chat-header-title:hover { background: rgba(255, 255, 255, 0.15); }
  .chat-header h2 {
    font-size: 1.15rem;
    font-weight: bold;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-header-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .chat-header-btn {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: #fff;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .chat-header-btn:hover { background: rgba(255, 255, 255, 0.35); }

  /* ========== 消息列表 ========== */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--c-surface-2);
    overscroll-behavior: contain;
    touch-action: pan-y;
    width: 100%;
    /* Firefox 滚动条 */
    scrollbar-width: thin;
    scrollbar-color: var(--c-scrollbar) transparent;
  }
  /* WebKit 滚动条 */
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--c-scrollbar); border-radius: 3px; }
  .chat-messages::-webkit-scrollbar-thumb:hover { background: var(--c-scrollbar-hover); }

  .message {
    display: flex;
    max-width: 100%;
    width: 100%;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user { justify-content: flex-end; }
  .message.ai { justify-content: flex-start; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius-bubble);
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 100%;
    white-space: normal;
    overflow-wrap: break-word;
    box-shadow: var(--shadow-sm);
    position: relative;
    box-sizing: border-box;
    text-align: left;
    user-select: text;
    -webkit-user-select: text;
    -webkit-touch-callout: default;
  }
  .message.user .msg-bubble {
    background: var(--btn-grad);
    color: #fff;
    border-bottom-right-radius: 4px;
    width: auto;
    max-width: 85%;
  }
  .message.ai .msg-bubble {
    background: var(--c-surface);
    color: var(--c-text);
    border: 1px solid var(--c-border);
    border-bottom-left-radius: 4px;
    width: 100%;
  }

  /* ========== 消息操作按钮 ========== */
  .msg-delete {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--c-danger);
    border: 2px solid var(--c-surface);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s, visibility 0.2s;
    z-index: 10;
    box-shadow: var(--shadow-sm);
  }
  /* hover 和 focus-within 都显示 */
  .message:hover .msg-delete,
  .message:focus-within .msg-delete {
    opacity: 1;
    visibility: visible;
  }
  /* 触摸设备始终显示 */
  @media (hover: none) {
    .msg-delete { opacity: 1; visibility: visible; }
  }

  /* ========== 长按交互菜单 ========== */
  .msg-action-overlay {
    position: fixed;
    inset: 0;
    background: transparent;
    z-index: 998;
  }
  .msg-action-menu {
    position: fixed;
    z-index: 999;
    background: var(--c-surface);
    color: var(--c-text);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    padding: 4px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
    min-width: 120px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 0.9rem;
    animation: menuIn 0.15s ease;
  }
  @keyframes menuIn {
    from { opacity: 0; transform: scale(0.94); }
    to   { opacity: 1; transform: scale(1); }
  }
  .msg-action-menu button {
    background: transparent;
    color: inherit;
    border: none;
    text-align: left;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: inherit;
    line-height: 1.4;
  }
  .msg-action-menu button:hover,
  .msg-action-menu button:focus {
    background: var(--c-surface-2);
    outline: none;
  }
  .msg-action-menu .is-danger { color: var(--c-danger); }
  /* 气泡在长按时禁用系统菜单/文本选中 */
  .msg-bubble.has-longpress {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ========== KaTeX 公式渲染 ========== */
  .katex-block {
    display: block;
    margin: 4px 0;
    padding: 0;
    text-align: center;
    line-height: 1.2;
    width: 100%;
    box-sizing: border-box;
    overflow-x: auto;
    overflow-y: hidden;
    font-size: 0.96em;
  }
  .katex-block .katex { white-space: normal; font-size: 1em; }
  .katex-block .katex-display { margin: 0; }
  .katex-block .katex-display > .katex { white-space: normal; text-align: center; }
  /* 压缩 KaTeX 内部上下间距 */
  .katex-display { margin: 0 !important; padding: 0 !important; }
  .katex { line-height: 1.2; }
  /* 行内公式跟随文本大小 */
  .msg-bubble > .katex { font-size: 0.96em; }

  /* ========== 公式降级显示 ========== */
  .math-fallback {
    background: var(--c-surface-2);
    padding: 1px 4px;
    border-radius: 4px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.85em;
    color: var(--c-primary);
  }

  /* ========== 代码块 ========== */
  .code-block {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 8px;
    padding: 12px 14px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    -webkit-overflow-scrolling: touch;
  }
  .code-block code {
    background: none;
    padding: 0;
    color: inherit;
    font-size: inherit;
    white-space: pre;
  }
  .code-inline {
    background: var(--c-surface-2);
    color: var(--c-primary);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.85em;
  }

  /* ========== 输入指示器 ========== */
  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 0 0 0 8px;
    vertical-align: middle;
  }
  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--c-primary-light);
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
  }
  .typing-dot:nth-child(1) { animation-delay: 0s; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ========== 输入区 ========== */
  .chat-input-area {
    padding: 12px 16px;
    padding-bottom: calc(12px + var(--safe-bottom));
    background: var(--c-surface);
    border-top: 1px solid var(--c-border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--c-border);
    border-radius: var(--radius-btn);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    font-family: inherit;
    line-height: 1.5;
    color: var(--c-text);
    background: var(--c-surface);
  }
  .chat-input:focus { border-color: var(--c-primary); }
  .chat-send-btn {
    width: 44px;
    height: 44px;
    background: var(--btn-grad);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, opacity 0.2s, background 0.2s;
  }
  .chat-send-btn:hover:not(:disabled) { transform: scale(1.05); }
  .chat-send-btn:active:not(:disabled) { transform: scale(0.95); }
  .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .chat-send-btn.is-stop {
    background: linear-gradient(135deg, var(--c-danger), var(--c-danger-dark));
  }

  /* ========== 空状态提示 ========== */
  .chat-empty-tip {
    text-align: center;
    color: var(--c-muted);
    font-size: 0.92rem;
    padding: 50px 20px;
    line-height: 2;
  }
  .chat-empty-tip .big {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 12px;
  }
  .chat-empty-tip .suggestions {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  .chat-empty-tip .suggestion {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 16px;
    padding: 8px 16px;
    font-size: 0.85rem;
    color: var(--c-primary);
    cursor: pointer;
    transition: all 0.2s;
    max-width: 90%;
  }
  .chat-empty-tip .suggestion:hover {
    background: var(--c-primary-soft);
    border-color: var(--c-primary);
    transform: translateY(-1px);
  }

  /* ========== 会话侧栏 ========== */
  .chat-sidebar-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 1199;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s, visibility 0.25s;
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
  }
  .chat-sidebar-overlay.show { opacity: 1; visibility: visible; }

  .chat-sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    max-width: 85vw;
    background: var(--c-surface);
    z-index: 1200;
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 24px rgba(0, 0, 0, 0.12);
  }
  .chat-sidebar.open { transform: translateX(0); }

  .chat-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    background: var(--header-grad);
    color: #fff;
    flex-shrink: 0;
  }
  .chat-sidebar-title { font-size: 1rem; font-weight: 700; }
  .chat-sidebar-close {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: #fff;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.2s;
  }
  .chat-sidebar-close:hover { background: rgba(255, 255, 255, 0.35); }

  .chat-sidebar-new {
    margin: 12px 14px 8px;
    padding: 10px 14px;
    border: 2px dashed var(--c-primary);
    background: var(--c-primary-soft);
    color: var(--c-primary);
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    font-family: inherit;
  }
  .chat-sidebar-new:hover {
    background: var(--c-primary);
    color: #fff;
  }

  .chat-sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 12px;
    -webkit-overflow-scrolling: touch;
  }
  .chat-sidebar-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 12px;
    margin-bottom: 4px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .chat-sidebar-item:hover { background: var(--c-surface-2); }
  .chat-sidebar-item.active { background: var(--c-primary-soft); }
  .chat-sidebar-item-icon { font-size: 0.95rem; flex-shrink: 0; margin-top: 1px; }
  .chat-sidebar-item-info { flex: 1; min-width: 0; }
  .chat-sidebar-item-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--c-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-sidebar-item-preview {
    font-size: 0.75rem;
    color: var(--c-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .chat-sidebar-item-delete {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--c-muted);
    width: 24px; height: 24px;
    border-radius: 50%;
    font-size: 0.85rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .chat-sidebar-item:hover .chat-sidebar-item-delete { opacity: 1; }
  /* 触摸设备始终显示删除按钮 */
  @media (hover: none) {
    .chat-sidebar-item-delete { opacity: 0.6; }
  }
  .chat-sidebar-item-delete:hover { color: var(--c-danger); background: rgba(239, 68, 68, 0.1); }
  .chat-sidebar-empty {
    text-align: center;
    color: var(--c-muted);
    font-size: 0.82rem;
    padding: 30px 16px;
  }

  /* ========== 清空确认弹窗 ========== */
  .chat-confirm-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1300;
    display: none;
    justify-content: center;
    align-items: center;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .chat-confirm-overlay.show { display: flex; }
  .chat-confirm-modal {
    background: var(--c-surface);
    border-radius: 16px;
    padding: 24px;
    max-width: 320px;
    width: calc(100% - 40px);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  .chat-confirm-title {
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--c-text);
    margin-bottom: 8px;
  }
  .chat-confirm-warn {
    color: var(--c-primary-light);
    font-weight: 500;
    font-size: 0.95rem;
    margin-bottom: 20px;
  }
  .chat-confirm-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .chat-confirm-cancel {
    padding: 10px 24px;
    border: 1px solid var(--c-border);
    border-radius: 8px;
    background: var(--c-surface);
    color: var(--c-muted);
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  .chat-confirm-cancel:hover { background: var(--c-surface-2); }
  .chat-confirm-ok {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    background: var(--btn-grad);
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
    transition: opacity 0.2s;
    font-family: inherit;
  }
  .chat-confirm-ok:hover { opacity: 0.9; }

  /* ========== 移动端适配 ========== */
  @media (max-width: 600px) {
    .chat-header { padding: 14px 16px; }
    .chat-header h2 { font-size: 1.05rem; }
    .chat-messages { padding: 14px; gap: 12px; }
    .msg-bubble { padding: 10px 14px; font-size: 0.9rem; }
    .chat-input-area { padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bottom)); gap: 8px; }

<script>
(function () {
  "use strict";

  /* ================================================================
   * 配置区
   * ================================================================ */

  const CONFIG = {

  /*

   *  ⚠️ 纯前端无法真正保护密钥，以下为多层混淆以显著提高

   *  混淆策略（4 层）：

   *    2. 分片存储——密文拆成多段 hex，散落在不同数组位置
   *    3. 变量名伪装——函数/变量名不暗示与密钥的关系
   *    4. 运行时拼装——密钥不落变量，用后即弃
   *
   *  更换密钥：运行 keygen.html，粘贴新 Key 即可生成新代码块
   * ============================================================
   */

  // 第 1 层：密文分片（XOR 后的 hex，看起来像随机配置数据）
  var _cf = [
    "0b06140723060567", "3d5a5c02006b2335",
    "3b596d5f664a383f", "290e502430420711",
    "31227f3b3a663a37", "0e195d5330574129",
    "4e0363"
  ];

  // 第 2 层：掩码（看起来像构建版本号）
  var _bv = "xm9kQ2vP";

  // 第 3 层：解码函数（名称伪装为「构建配置解析」）
  function _pc(h, k) {
    var r = "";
    for (var i = 0; i < h.length; i += 2) {
      r += String.fromCharCode(
        parseInt(h.substr(i, 2), 16) ^ k.charCodeAt((i >> 1) % k.length)
      );
    }
    return r;
  }

  // 第 4 层：运行时拼装——每次调用重新解密，不缓存到变量
  function _ar() {
    return _pc(_cf.join(""), _bv);
  }

  const SYSTEM_PROMPT =
    "你是一个智能、友好、知识渊博的 AI 助手。请用中文回答用户的问题，回答要清晰、准确、有条理。\n\n" +

    { icon: "🔗", text: "什么是图论中的欧拉路径？哥尼斯堡七桥问题是怎么回事？" },
    { icon: "💡", text: "用数学归纳法证明 $1+2+3+\\cdots+n = \\frac{n(n+1)}{2}$" },
    { icon: "🚀", text: "二次函数 $y = ax^2 + bx + c$ 的顶点坐标怎么推导？" },
    { icon: "🌊", text: "什么是极限？用 $\\lim_{n \\to \\infty} \\frac{1}{n} = 0$ 解释" },
    { icon: "🎨", text: "分形几何是什么？用科赫雪花的周长和面积说明" },
    { icon: "🔑", text: "RSA 加密的数学原理是什么？费马小定理怎么起作用？" },
    { icon: "🧠", text: "什么是反证法？用「根号 2 是无理数」的证明来说明" },
    { icon: "🏆", text: "一个袋中有 5 红 3 白球，随机取 3 个，至少取到 2 个红球的概率？" },
    { icon: "⚡", text: "等差数列求和公式 $S_n = \\frac{n(a_1+a_n)}{2}$ 怎么推导？" },
    { icon: "🌟", text: "什么是勾股数组？请列出 5 组并说明生成方法" },
    { icon: "📝", text: "解不等式 $|2x - 3| < 5$，并解释绝对值不等式的解法" },
    { icon: "🔍", text: "什么是梅森素数？为什么 $2^p - 1$ 形式的数特别？" },
    { icon: "🧲", text: "向量和标量的区别是什么？用物理例子说明点积的几何意义" },
    { icon: "🎲", text: "蒙提霍尔问题：换门后赢的概率真的是 2/3 吗？请解释" },
  ];

  /** 从题库中随机抽取 n 条不重复的提示 */
  function pickRandomPrompts(arr, n) {
    var copy = arr.slice();
    var result = [];
    for (var i = 0; i < n && copy.length > 0; i++) {
      var idx = Math.floor(Math.random() * copy.length);
      result.push(copy.splice(idx, 1)[0]);
    }
    return result;
  }

  /** 生成空状态 HTML（每次随机 3 条奥数提示） */
  function buildEmptyTipHTML() {
    var picks = pickRandomPrompts(MATH_OLYMPIAD_PROMPTS, 3);
    var suggestionHTML = picks.map(function (p) {
      var prompt = p.icon + " " + p.text;
      return (
        '<div class="suggestion" data-prompt="' +
        escapeHtml(p.text) +
        '" tabindex="0" role="button">' +
        escapeHtml(prompt) +
        "</div>"
      );
    }).join("");
    return (
      '<div class="chat-empty-tip">' +
      '<span class="big">👋</span>' +
      "你好！我是你的 AI 聊天助手。<br>" +
      "有什么问题需要我帮你解答吗？" +
      '<div class="suggestions">' +
      suggestionHTML +
      "</div>" +
      "</div>"
    );
  }

  /* ================================================================
   * 状态
   * ================================================================ */

  // 多会话数据结构：
  // sessions = [{ id, title, createdAt, messages: [{ id, role, content }] }]
  var sessions = [];
  var currentSessionId = null;
  var nextId = 1;          // 消息自增 ID
  var isGenerating = false;
  var abortController = null;
  var pendingDeleteMsg = null;
  var scrollRafId = null;

  /** 获取当前会话 */
  function currentSession() {
    return sessions.find(function (s) { return s.id === currentSessionId; });
  }

  /** 获取当前会话的消息数组（快捷方式） */
  function chatData() {
    var s = currentSession();
    return s ? s.messages : [];
  }

  /** 向当前会话添加消息 */
  function addMessageData(role, content) {
    var s = currentSession();
    if (!s) return { id: -1, role: role, content: content };
    var msg = { id: nextId++, role: role, content: content };
    s.messages.push(msg);
    // 第一条用户消息自动设为会话标题
    if (s.title === "新话题" && role === "user") {
      s.title = content.substring(0, 20) + (content.length > 20 ? "…" : "");
    }
    return msg;
  }

  /** 从当前会话删除消息 */
  function removeMessageData(id) {
    var s = currentSession();
    if (!s) return;
    s.messages = s.messages.filter(function (m) { return m.id !== id; });
  }

  /* ================================================================
   * 会话管理
   * ================================================================ */

  /** 创建新会话 */
  function createSession() {
    var s = {
      id: Date.now() + Math.random().toString(36).substr(2, 5),
      title: "新话题",
      createdAt: Date.now(),
      messages: [],
    };
    sessions.unshift(s);
    currentSessionId = s.id;
    saveSessions();
    return s;
  }

  /** 切换到指定会话 */
  function switchSession(id) {
    currentSessionId = id;
    saveSessions();
    renderCurrentSession();
    closeSidebar();
  }

  /** 删除会话 */
  /** 待删除的会话 ID */
  var pendingDeleteSessionId = null;

  /** 弹窗确认删除会话 */
  function confirmDeleteSession(id) {
    pendingDeleteSessionId = id;
    chatConfirmTitle.textContent = "确认删除这个话题？";
    chatConfirmWarn.textContent = "该话题的所有聊天记录将被删除";
    showConfirm();
  }

  /** 删除会话 */
  function deleteSession(id) {
    // 如果正在生成且删的是当前会话，先中止
    if (id === currentSessionId && abortController) {
      abortController.abort();
      abortController = null;
      toggleSendButton(false);
    }
    sessions = sessions.filter(function (s) { return s.id !== id; });

    if (currentSessionId === id || sessions.length === 0) {
      // 删除的是当前会话（或全部删完）——创建一个新的空话题
      createSession();
      closeSidebar();
      renderEmptyState();
    } else {
      saveSessions();
      renderSidebarList();
    }
  }

  /** 持久化所有会话 */
  function saveSessions() {
    try {
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(sessions));
    } catch (e) {
      console.warn("saveSessions error:", e);
    }
  }

  /** 从 localStorage 加载所有会话 */
  function loadSessions() {
    try {
      var raw = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (!raw) return;
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) {
        sessions = parsed;
        // 恢复 nextId
        var maxId = 0;
        sessions.forEach(function (s) {
          s.messages.forEach(function (m) {
            if (m.id > maxId) maxId = m.id;
          });
        });
        nextId = maxId + 1;
      }
    } catch (e) {
      console.warn("loadSessions error:", e);
    }
  }

  /** 渲染当前会话到 DOM */
  function renderCurrentSession() {
    var s = currentSession();
    if (!s || s.messages.length === 0) {
      renderEmptyState();
      return;
    }
    chatMessages.innerHTML = "";
    s.messages.forEach(function (m) {
      if (!m.content || !m.content.trim()) return;
      var el = createMessageElement(m);
      chatMessages.appendChild(el);
    });
    scrollToBottom(true);
  }

  /* ================================================================
   * DOM 引用
   * ================================================================ */

  var chatMessages, chatInput, chatSendBtn, chatClearBtn, chatNewBtn, chatThemeBtn;
  var chatConfirmOverlay, chatConfirmCancel, chatConfirmOk;
  var chatConfirmTitle, chatConfirmWarn;
  var chatSidebar, chatSidebarOverlay, chatSidebarClose, chatSidebarNewBtn, chatSidebarList;

  /* ================================================================
   * 工具函数
   * ================================================================ */

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function fixLatex(text) {
    return text
      // \sqrt{x}{y} → \sqrt[x]{y}（根号下标旧写法）
      .replace(/\\sqrt\{([^{}]+)\}\{([^{}]+)\}/g, "\\sqrt[$1]{$2}")
      // \sqrt2 → \sqrt{2}（裸数字）
      .replace(/\\sqrt(\d)/g, "\\sqrt{$1}")
      // \sqrt[3]x → \sqrt[3]{x}（有下标但缺花括号）
      .replace(/\\sqrt(\[[^\]]+\])([a-zA-Z])/g, "\\sqrt$1{$2}")
      // \frac12 → \frac{1}{2}（裸数字分数）
      .replace(/\\frac(\d)(\d)/g, "\\frac{$1}{$2}")
      .replace(/\\frac(\d)\{([^{}]+)\}/g, "\\frac{$1}{$2}")
      .replace(/\\frac\{([^{}]+)\}(\d)/g, "\\frac{$1}{$2}")
      // Unicode 数学符号 → LaTeX
      .replace(/√/g, "\\sqrt ")
      .replace(/×/g, "\\times ")
      .replace(/÷/g, "\\div ")
      .replace(/≤/g, "\\leq ")
      .replace(/≥/g, "\\geq ")
      .replace(/≠/g, "\\neq ")
      .replace(/→/g, "\\rightarrow ")
      .replace(/←/g, "\\leftarrow ")
      .replace(/↔/g, "\\leftrightarrow ")
      .replace(/∞/g, "\\infty ")
      .replace(/∑/g, "\\sum ")
      .replace(/∫/g, "\\int ")
      .replace(/∏/g, "\\prod ")
      .replace(/∂/g, "\\partial ")
      .replace(/∇/g, "\\nabla ")
      .replace(/∈/g, "\\in ")
      .replace(/∉/g, "\\notin ")
      .replace(/⊂/g, "\\subset ")
      .replace(/⊃/g, "\\supset ")
      .replace(/∪/g, "\\cup ")
      .replace(/∩/g, "\\cap ")
      .replace(/∀/g, "\\forall ")
      .replace(/∃/g, "\\exists ")
      .replace(/°/g, "^\\circ ")
      .replace(/±/g, "\\pm ")
      .replace(/∓/g, "\\mp ")
      // 希腊字母（仅在非 \ 开头时替换，避免重复处理 \alpha 等）
      .replace(/(^|[^\\])π/g, "$1\\pi ")
      .replace(/(^|[^\\])α/g, "$1\\alpha ")
      .replace(/(^|[^\\])β/g, "$1\\beta ")
      .replace(/(^|[^\\])γ/g, "$1\\gamma ")
      .replace(/(^|[^\\])δ/g, "$1\\delta ")
      .replace(/(^|[^\\])ε/g, "$1\\varepsilon ")
      .replace(/(^|[^\\])θ/g, "$1\\theta ")
      .replace(/(^|[^\\])λ/g, "$1\\lambda ")
      .replace(/(^|[^\\])μ/g, "$1\\mu ")
      .replace(/(^|[^\\])ρ/g, "$1\\rho ")
      .replace(/(^|[^\\])σ/g, "$1\\sigma ")
      .replace(/(^|[^\\])τ/g, "$1\\tau ")
      .replace(/(^|[^\\])φ/g, "$1\\varphi ")
      .replace(/(^|[^\\])ψ/g, "$1\\psi ")
      .replace(/(^|[^\\])ω/g, "$1\\omega ")
      .replace(/(^|[^\\])Δ/g, "$1\\Delta ")
      .replace(/(^|[^\\])Σ/g, "$1\\Sigma ")
      .replace(/(^|[^\\])Ω/g, "$1\\Omega ");
  }

  /**
   * 将文本+公式混合内容渲染为 HTML
   * 安全：text 部分先 escapeHtml 再做 Markdown 替换，防止 XSS
   *
   * 正则策略：$$...$$ 优先于 $...$ 匹配，避免误判
   */
  function renderContent(text) {
    if (!text) return "";
    var fixed = fixLatex(text);

    // 第 1 轮：提取代码块 ```...```，用占位符替换，防止其中的 $ 被公式正则匹配
    var codeBlocks = [];
    fixed = fixed.replace(/```(\w*)\n?([\s\S]*?)```/g, function (m, lang, code) {
      var idx = codeBlocks.length;
      codeBlocks.push({ lang: lang, code: code.replace(/\n$/, "") });
      return "\x00CODE" + idx + "\x00";
    });

    // 第 2 轮：分离公式与文本
    // $$...$$ 优先匹配（块级），$...$ 其次（行内）
    var regex = /\$\$([\s\S]+?)\$\$|\$([^$]+?)\$/g;
    var parts = [];
    var lastEnd = 0;
    var match;

    while ((match = regex.exec(fixed)) !== null) {
      if (match.index > lastEnd) {
        parts.push({ type: "text", content: fixed.substring(lastEnd, match.index) });
      }
      if (match[1] !== undefined) {
        parts.push({ type: "block", content: match[1].trim() });
      } else {
        parts.push({ type: "inline", content: match[2].trim() });
      }
      lastEnd = match.index + match[0].length;
    }
    if (lastEnd < fixed.length) {
      parts.push({ type: "text", content: fixed.substring(lastEnd) });
    }

    // 第 3 轮：渲染各部分
    var result = "";
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      if (p.type === "text") {
        // 块级公式前后的文本：去掉首尾换行，避免 <br> 和公式 margin 叠加产生多余空白
        var textContent = p.content;
        if (i > 0 && parts[i - 1].type === "block") {
          textContent = textContent.replace(/^\n+/, "");
        }
        if (i < parts.length - 1 && parts[i + 1].type === "block") {
          textContent = textContent.replace(/\n+$/, "");
        }
        result += renderText(textContent);
      } else {
        // 公式渲染
        try {
          if (typeof katex === "undefined") {
            result += '<code class="math-fallback">' + escapeHtml(p.content) + "</code>";
          } else {
            var html = katex.renderToString(p.content, {
              throwOnError: false,
              displayMode: p.type === "block",
              output: "html",
            });
            if (p.type === "block") {
              result += '<div class="katex-block">' + html + "</div>";
            } else {
              result += html;
            }
          }
        } catch (e) {
          result += '<code class="math-fallback">' + escapeHtml(p.content) + "</code>";
        }
      }
    }

    // 第 4 轮：还原代码块占位符
    result = result.replace(/\x00CODE(\d+)\x00/g, function (m, idx) {
      var block = codeBlocks[parseInt(idx, 10)];
      if (!block) return m;
      return (
        '<pre class="code-block"><code>' +
        escapeHtml(block.code) +
        "</code></pre>"
      );
    });

    return result;
  }

  /** 渲染纯文本部分：escape → Markdown */
  function renderText(text) {
    // 先 escape 防 XSS
    var html = escapeHtml(text);

    // 行内代码 `...`（在 Markdown 格式化之前处理，避免内容被其他规则破坏）
    var inlineCodes = [];
    html = html.replace(/`([^`]+)`/g, function (m, code) {
      var idx = inlineCodes.length;
      inlineCodes.push(code);
      return "\x01INLINE" + idx + "\x01";
    });

    // 标题
    html = html.replace(/^#{1,6}\s+(.+)$/gm, function (m, content) {
      var level = m.match(/^#+/)[0].length;
      return "</p><h" + level + ">" + content + "</h" + level + "><p>";
    });

    // 加粗
    html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

    // 单星号不转斜体（AI 常用 * 做乘法/列表，转斜体误伤太多）
    // 保留原样

    // 无序列表
    html = html.replace(/^[-*]\s+/gm, "• ");

    // 有序列表
    html = html.replace(/^(\d+\.)\s+/gm, "$1 ");

    // 换行
    html = html.replace(/\n/g, "<br>");

    // 还原行内代码
    html = html.replace(/\x01INLINE(\d+)\x01/g, function (m, idx) {
      return '<code class="code-inline">' + inlineCodes[parseInt(idx, 10)] + "</code>";
    });

    return html;
  }

  /** 渲染用户消息（纯文本，转义 + 换行） */
  function renderUserText(text) {
    return escapeHtml(text).replace(/\n/g, "<br>");
  }

  /** 长公式自动缩小字体 */
  function autoScaleKatex(container) {
    if (!container) return;
    var blocks = container.querySelectorAll(".katex-block");
    blocks.forEach(function (block) {
      block.style.fontSize = "";
      var parentWidth = block.clientWidth || block.parentElement.clientWidth || 300;
      var scales = [0.96, 0.86, 0.76, 0.66, 0.56];
      for (var i = 0; i < scales.length; i++) {
        block.style.fontSize = scales[i] + "em";
        var el = block.querySelector(".katex-display") || block.querySelector(".katex");
        if (!el || el.scrollWidth <= parentWidth + 2) break;
      }
    });
  }

  /* ================================================================
   * 滚动控制（rAF 节流）
   * ================================================================ */

  function isNearBottom() {
    return (
      chatMessages.scrollHeight -
        chatMessages.scrollTop -
        chatMessages.clientHeight <
      CONFIG.SCROLL_THRESHOLD
    );
  }

  function scrollToBottom(force) {
    if (scrollRafId) {
      if (!force) return;
      cancelAnimationFrame(scrollRafId);
    }
    scrollRafId = requestAnimationFrame(function () {
      chatMessages.scrollTop = chatMessages.scrollHeight;
      scrollRafId = null;
    });
  }

  /* ================================================================
   * 数据管理 — 已在会话管理区定义
   * ================================================================ */

  /** 保存当前会话（兼容旧调用名） */
  function saveChatHistory() {
    saveSessions();
    // 如果侧栏打开，同步刷新
    if (chatSidebar && chatSidebar.classList.contains("open")) {
      renderSidebarList();
    }
  }

  /* ================================================================
   * DOM 渲染
   * ================================================================ */

  function createMessageElement(msg) {
    var div = document.createElement("div");
    div.className = "message " + (msg.role === "user" ? "user" : "ai");
    div.dataset.msgId = msg.id;

    var bubble = document.createElement("div");
    bubble.className = "msg-bubble";

    if (msg.role === "user") {
      bubble.innerHTML = renderUserText(msg.content);
    } else {
      bubble.innerHTML = renderContent(msg.content);
      autoScaleKatex(bubble);
    }

    // 删除按钮
    var delBtn = document.createElement("button");
    delBtn.type = "button";
    delBtn.className = "msg-delete";
    delBtn.title = "删除";
    delBtn.setAttribute("aria-label", "删除此消息");
    delBtn.textContent = "×";
    delBtn.addEventListener("click", function () { confirmDeleteMessage(div); });
    bubble.appendChild(delBtn);

    // 绑定长按交互菜单
    attachLongPressToBubble(bubble, div, msg.content);

    div.appendChild(bubble);
    return div;
  }

  function renderEmptyState() {
    chatMessages.innerHTML = buildEmptyTipHTML();
    bindSuggestions();
  }

  function bindSuggestions() {
    var btns = chatMessages.querySelectorAll(".suggestion");
    btns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        var prompt = btn.getAttribute("data-prompt");
        if (prompt) {
          chatInput.value = prompt;
          updateInputHeight();
          sendMessage();
        }
      });
      btn.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          btn.click();
        }
      });
    });
  }

  /* ================================================================
   * 输入框
   * ================================================================ */

  function updateInputHeight() {
    chatInput.style.height = "auto";
    chatInput.style.height =
      Math.min(chatInput.scrollHeight, CONFIG.MAX_TEXTAREA_HEIGHT) + "px";
  }

  /* ================================================================
   * 发送 / 停止
   * ================================================================ */

  function toggleSendButton(generating) {
    isGenerating = generating;
    if (generating) {
      chatSendBtn.textContent = "⏹";
      chatSendBtn.title = "停止生成";
      chatSendBtn.setAttribute("aria-label", "停止生成");
      chatSendBtn.classList.add("is-stop");
    } else {
      chatSendBtn.textContent = "→";
      chatSendBtn.title = "发送";
      chatSendBtn.setAttribute("aria-label", "发送");
      chatSendBtn.classList.remove("is-stop");
    }
  }

  function stopGeneration() {
    if (abortController) abortController.abort();
  }

  async function sendMessage() {
    // 如果正在生成，点击按钮 = 停止
    if (isGenerating) {
      stopGeneration();
      return;
    }

    var text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = "";
    chatInput.style.height = "auto";
    toggleSendButton(true);

    // 移除空状态
    var emptyTip = chatMessages.querySelector(".chat-empty-tip");
    if (emptyTip) emptyTip.remove();

    // 添加用户消息到数据和 DOM
    var userMsg = addMessageData("user", text);
    var userMsgDiv = createMessageElement(userMsg);
    chatMessages.appendChild(userMsgDiv);
    scrollToBottom(true);

    // 创建 AI 占位消息（不加入 chatData）
    var aiMsgDiv = document.createElement("div");
    aiMsgDiv.className = "message ai";
    aiMsgDiv.innerHTML =
      '<div class="msg-bubble">正在思考' +
      '<div class="typing-indicator">' +
      '<div class="typing-dot"></div>' +
      '<div class="typing-dot"></div>' +
      '<div class="typing-dot"></div>' +
      "</div></div>";
    chatMessages.appendChild(aiMsgDiv);
    var bubble = aiMsgDiv.querySelector(".msg-bubble");
    scrollToBottom(true);

    // 构建上下文（从 chatData，不包含当前占位）
    var historyMessages = [{ role: "system", content: SYSTEM_PROMPT }];
    var msgs = chatData();
    msgs.forEach(function (m) {
      historyMessages.push({ role: m.role, content: m.content });
    });

    abortController = new AbortController();

    // ===== 流式渲染状态 =====
    var fullContent = "";            // 完整累积文本
    var appendedLen = 0;             // 已追加到 DOM 的字符位置（fullContent 中）
    var pendingTail = "";            // 上次增量渲染后残留的未配对 $ 片段
    var appendTimeout = null;        // 节流定时器
    var hasClearedPlaceholder = false;
    var AUTO_SCROLL_LINE_LIMIT = 12; // 前 N 行跟随滚动
    var APPEND_INTERVAL_MS = 30;     // DOM 增量更新频率

    // 估算行数（按换行符）
    function estimateLineCount(text) {
      if (!text) return 0;
      var m = text.match(/\n/g);
      return (m ? m.length : 0) + 1;
    }

    // 扫描字符串中已闭合的公式：$$...$$ 和 $...$
    // 返回 [{type: 'block'|'inline'|'text', content: string, end: int}]，按出现顺序
    // 扫描到文本末尾未闭合的 $ 或 $$，保留为 tail
    function tokenizeIncremental(text) {
      var tokens = [];
      var pos = 0;
      var len = text.length;
      while (pos < len) {
        // 优先匹配 $$...$$
        if (text.substr(pos, 2) === "$$") {
          var endIdx = text.indexOf("$$", pos + 2);
          if (endIdx !== -1) {
            var formula = text.substring(pos + 2, endIdx).trim();
            tokens.push({ type: "block", content: formula });
            pos = endIdx + 2;
            continue;
          } else {
            // 末尾未配对 $$，作为 tail 返回（文本中保留）
            break;
          }
        }
        // 其次匹配 $...$
        if (text.charAt(pos) === "$") {
          var endIdx2 = text.indexOf("$", pos + 1);
          if (endIdx2 !== -1 && endIdx2 > pos + 1) {
            var formula2 = text.substring(pos + 1, endIdx2).trim();
            tokens.push({ type: "inline", content: formula2 });
            pos = endIdx2 + 1;
            continue;
          } else {
            // 末尾未配对 $，作为 tail
            break;
          }
        }
        // 普通文本：前进到下一个 $ 或末尾
        var nextDollar = text.indexOf("$", pos);
        var segEnd = (nextDollar === -1) ? len : nextDollar;
        if (segEnd <= pos) segEnd = pos + 1;
        tokens.push({ type: "text", content: text.substring(pos, segEnd) });
        pos = segEnd;
      }
      var tail = (pos < len) ? text.substring(pos) : "";
      return { tokens: tokens, tail: tail };
    }

    // 增量 DOM 追加：把新文本渲染成节点（公式用 KaTeX，文本用转义的 textNode + <br>）
    // 只 appendChild 到 bubble，不销毁已存在的内容
    function flushAppend(newText) {
      if (!newText) return;

      if (!hasClearedPlaceholder) {
        bubble.innerHTML = "";
        hasClearedPlaceholder = true;
      }

      var result = tokenizeIncremental(newText);
      var tokens = result.tokens;
      var hasKatex = typeof katex !== "undefined";
      var frag = document.createDocumentFragment();

      for (var i = 0; i < tokens.length; i++) {
        var t = tokens[i];
        if (t.type === "text") {
          // 文本：转义后按换行拆成 textNode + <br>
          var lines = t.content.split("\n");
          for (var j = 0; j < lines.length; j++) {
            if (lines[j].length > 0) {
              frag.appendChild(document.createTextNode(lines[j]));
            }
            // 除了最后一段，其他换行都加 <br>
            if (j < lines.length - 1) {
              var br = document.createElement("br");
              frag.appendChild(br);
            }
          }
        } else if (t.type === "inline") {
          try {
            if (hasKatex) {
              var span = document.createElement("span");
              span.className = "katex-inline";
              span.innerHTML = katex.renderToString(t.content, { throwOnError: false, output: "html" });
              frag.appendChild(span);
            } else {
              frag.appendChild(document.createTextNode("$" + t.content + "$"));
            }
          } catch (e) {
            frag.appendChild(document.createTextNode("$" + t.content + "$"));
          }
        } else if (t.type === "block") {
          try {
            if (hasKatex) {
              var div = document.createElement("div");
              div.className = "katex-block";
              div.innerHTML = katex.renderToString(t.content, { throwOnError: false, displayMode: true, output: "html" });
              frag.appendChild(div);
            } else {
              var plain = document.createElement("div");
              plain.className = "katex-block";
              plain.textContent = "$$" + t.content + "$$";
              frag.appendChild(plain);
            }
          } catch (e) {
            var plain2 = document.createElement("div");
            plain2.className = "katex-block";
            plain2.textContent = "$$" + t.content + "$$";
            frag.appendChild(plain2);
          }
        }
      }
      bubble.appendChild(frag);
      pendingTail = result.tail;
    }

    // 计划一次增量渲染（带节流，避免每个 token 都改 DOM）
    function scheduleAppend() {
      if (appendTimeout) return;
      appendTimeout = setTimeout(function () {
        appendTimeout = null;
        var newText = fullContent.substring(appendedLen);
        // 上次残留 + 本次新文本
        var combined = pendingTail + newText;
        if (combined.length > 0) {
          flushAppend(combined);
          appendedLen = fullContent.length - pendingTail.length;
          // 前 N 行跟随滚动；之后停止跟随，交给用户
          if (estimateLineCount(fullContent) <= AUTO_SCROLL_LINE_LIMIT) {
            scrollToBottom(true);
          }
        }
      }, APPEND_INTERVAL_MS);
    }

    try {
      // ===== 带重试的请求 =====
      var response = null;
      var retryCount = 0;

      while (retryCount <= CONFIG.MAX_RETRIES) {
        try {
          response = await doFetch(historyMessages);
          if (response.ok) break;

          var errorText = await response.text();
          if (response.status >= 500 && response.status < 600 && retryCount < CONFIG.MAX_RETRIES) {
            retryCount++;
            await delay(CONFIG.RETRY_BASE_DELAY * retryCount);
            continue;
          }
          throw new Error("API 请求失败：" + response.status + " " + errorText);
        } catch (err) {
          if (err.name === "AbortError") throw err;
          if (retryCount < CONFIG.MAX_RETRIES) {
            retryCount++;
            await delay(CONFIG.RETRY_BASE_DELAY * retryCount);
            continue;
          }
          throw err;
        }
      }

      // ===== SSE 流读取 =====
      var reader = response.body.getReader();
      var decoder = new TextDecoder("utf-8", { fatal: false });
      var sseBuffer = "";

      while (true) {
        var result = await reader.read();
        if (result.done) break;

        sseBuffer += decoder.decode(result.value, { stream: true });
        var lines = sseBuffer.split("\n");
        // 最后一条可能不完整，保留到 buffer
        sseBuffer = lines.pop();

        for (var li = 0; li < lines.length; li++) {
          var line = lines[li];
          if (!line) continue;
          // 去掉 \r
          if (line.charAt(line.length - 1) === "\r") line = line.slice(0, -1);
          if (!line.startsWith("data:")) continue;
          var payload = line.substring(5);
          if (payload.charAt(0) === " ") payload = payload.substring(1);
          if (payload === "[DONE]") continue;

          try {
            var data = JSON.parse(payload);
            var delta = data.choices && data.choices[0] && data.choices[0].delta && data.choices[0].delta.content;
            if (!delta) continue;

            fullContent += delta;
            scheduleAppend();
          } catch (e) {
            // 解析失败——跳过，等待下一条完整 data:
          }
        }
      }

      // decoder 收尾
      try {
        var decoderTail = decoder.decode();
        if (decoderTail) sseBuffer += decoderTail;
      } catch (e) {}

      // buffer 残留行兜底
      if (sseBuffer && sseBuffer.charAt(0) !== ":" && sseBuffer.trim().startsWith("data:")) {
        try {
          var tailLine = sseBuffer;
          if (tailLine.charAt(tailLine.length - 1) === "\r") tailLine = tailLine.slice(0, -1);
          var lastPayload = tailLine.substring(5);
          if (lastPayload.charAt(0) === " ") lastPayload = lastPayload.substring(1);
          if (lastPayload !== "[DONE]") {
            var lastData = JSON.parse(lastPayload);
            var lastDelta = lastData.choices && lastData.choices[0] && lastData.choices[0].delta && lastData.choices[0].delta.content;
            if (lastDelta) fullContent += lastDelta;
          }
        } catch (e) { /* ignore */ }
      }

      // ===== 流式收尾：把 pending 定时器立即 flush =====
      if (appendTimeout) {
        clearTimeout(appendTimeout);
        appendTimeout = null;
      }
      // 强制 flush 最后一段新文本 + 残留的未配对 $ 片段
      var remainingNew = fullContent.substring(appendedLen);
      var remainingCombined = pendingTail + remainingNew;
      if (remainingCombined.length > 0) {
        // 最后一段：忽略未配对 $ 尾，当作文本输出
        if (!hasClearedPlaceholder) {
          bubble.innerHTML = "";
          hasClearedPlaceholder = true;
        }
        var lastFrag = document.createDocumentFragment();
        var lastLines = remainingCombined.split("\n");
        for (var lk = 0; lk < lastLines.length; lk++) {
          if (lastLines[lk].length > 0) {
            lastFrag.appendChild(document.createTextNode(lastLines[lk]));
          }
          if (lk < lastLines.length - 1) {
            var lastBr = document.createElement("br");
            lastFrag.appendChild(lastBr);
          }
        }
        bubble.appendChild(lastFrag);
        pendingTail = "";
      }

      if (!fullContent.trim()) {
        throw new Error("未收到有效响应");
      }

      // ===== 最终一次全量渲染（markdown 格式化）——流结束后只做一次 =====
      // 注意：不自动滚动到底部，由用户自行操作
      var aiMsg = addMessageData("assistant", fullContent);
      aiMsgDiv.dataset.msgId = aiMsg.id;

      bubble.innerHTML = renderContent(fullContent);
      appendActions(bubble, aiMsgDiv, fullContent);
      autoScaleKatex(bubble);
      saveChatHistory();

    } catch (err) {
      if (appendTimeout) {
        clearTimeout(appendTimeout);
        appendTimeout = null;
      }

      if (err.name === "AbortError") {
        // 用户主动停止——保存已收到的部分内容
        if (fullContent.trim()) {
          // flush 剩余
          var remainNew = fullContent.substring(appendedLen);
          var remainCombined = pendingTail + remainNew;
          if (remainCombined.length > 0 && !hasClearedPlaceholder) {
            bubble.innerHTML = "";
            hasClearedPlaceholder = true;
          }
          if (remainCombined.length > 0) {
            var rf = document.createDocumentFragment();
            var rl = remainCombined.split("\n");
            for (var rk = 0; rk < rl.length; rk++) {
              if (rl[rk].length > 0) rf.appendChild(document.createTextNode(rl[rk]));
              if (rk < rl.length - 1) {
                var brr = document.createElement("br");
                rf.appendChild(brr);
              }
            }
            bubble.appendChild(rf);
          }
          var partialMsg = addMessageData("assistant", fullContent);
          aiMsgDiv.dataset.msgId = partialMsg.id;

          bubble.innerHTML = renderContent(fullContent);
          appendActions(bubble, aiMsgDiv, fullContent);
          autoScaleKatex(bubble);
          saveChatHistory();
        } else {
          // 没有收到任何内容，移除占位
          aiMsgDiv.remove();
        }
      } else {
        // 其他错误
        bubble.innerHTML = renderContent("❌ 出错了：" + err.message);
        appendActions(bubble, aiMsgDiv, fullContent || "");
        console.error(err);
      }
    } finally {
      toggleSendButton(false);
      abortController = null;
    }
  }

  /** 向 bubble 追加删除 + 复制按钮 */
  function appendActions(bubble, msgDiv, content) {
    // 删除
    var delBtn = document.createElement("button");
    delBtn.type = "button";
    delBtn.className = "msg-delete";
    delBtn.title = "删除";
    delBtn.setAttribute("aria-label", "删除此消息");
    delBtn.textContent = "×";
    delBtn.addEventListener("click", function () { confirmDeleteMessage(msgDiv); });
    bubble.appendChild(delBtn);

    // 绑定长按交互菜单
    attachLongPressToBubble(bubble, msgDiv, content);
  }

  /** 当前弹出的菜单引用，用于统一关闭 */
  var _currentMsgActionMenu = null;
  var _currentMsgActionOverlay = null;

  function hideMsgActionMenu() {
    if (_currentMsgActionMenu) {
      _currentMsgActionMenu.remove();
      _currentMsgActionMenu = null;
    }
    if (_currentMsgActionOverlay) {
      _currentMsgActionOverlay.remove();
      _currentMsgActionOverlay = null;
    }
  }

  /**
   * 在长按位置弹出交互菜单
   * clickX / clickY 必须是 viewport 坐标（clientX/clientY）
   * 菜单显示在手指位置正上方；若上方空间不足则贴手指正下方。
   */
  function showMsgActionMenu(clickX, clickY, bubble, msgDiv, content) {
    // 关闭任何已有菜单
    hideMsgActionMenu();

    // 点击空白处关闭的全屏透明遮罩
    var overlay = document.createElement("div");
    overlay.className = "msg-action-overlay";
    overlay.addEventListener("click", hideMsgActionMenu);
    overlay.addEventListener("touchstart", hideMsgActionMenu, { passive: true });
    document.body.appendChild(overlay);
    _currentMsgActionOverlay = overlay;

    // 菜单本体
    var menu = document.createElement("div");
    menu.className = "msg-action-menu";
    menu.setAttribute("role", "menu");
    menu.addEventListener("click", function (e) { e.stopPropagation(); });
    menu.addEventListener("touchstart", function (e) { e.stopPropagation(); }, { passive: true });

    // 复制
    var copyBtn = document.createElement("button");
    copyBtn.type = "button";
    copyBtn.textContent = "复制";
    copyBtn.addEventListener("click", function () {
      var text = (content || bubble.innerText || "").toString();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(function () { fallbackCopy(text); });
      } else {
        fallbackCopy(text);
      }
      hideMsgActionMenu();
    });
    menu.appendChild(copyBtn);

    // 删除
    var delBtnMenu = document.createElement("button");
    delBtnMenu.type = "button";
    delBtnMenu.className = "is-danger";
    delBtnMenu.textContent = "删除";
    delBtnMenu.addEventListener("click", function () {
      hideMsgActionMenu();
      confirmDeleteMessage(msgDiv);
    });
    menu.appendChild(delBtnMenu);

    document.body.appendChild(menu);
    _currentMsgActionMenu = menu;

    // 以手指位置为锚点摆放菜单
    var vw = window.innerWidth || document.documentElement.clientWidth;
    var vh = window.innerHeight || document.documentElement.clientHeight;
    var menuRect = menu.getBoundingClientRect();
    var menuW = menuRect.width;
    var menuH = menuRect.height;
    var margin = 8;
    var fingerGap = 14; // 菜单与手指之间的距离（避免直接覆盖手指）

    // 水平位置：以手指为中心，再做边界钳制
    var left = clickX - menuW / 2;
    left = Math.max(margin, Math.min(left, vw - menuW - margin));

    // 垂直位置：优先显示在手指上方；上方放不下时放到手指下方
    var top;
    if (clickY - fingerGap - menuH >= margin) {
      top = clickY - fingerGap - menuH;
    } else {
      top = clickY + fingerGap;
    }
    // 垂直边界钳制
    top = Math.max(margin, Math.min(top, vh - menuH - margin));

    menu.style.left = Math.round(left) + "px";
    menu.style.top = Math.round(top) + "px";

    // 滚动、窗口变化时自动关闭，避免错位
    var scrollClose = function () { hideMsgActionMenu(); };
    document.addEventListener("scroll", scrollClose, { capture: true, passive: true, once: true });
    window.addEventListener("resize", scrollClose, { once: true });
  }

  function fallbackCopy(text) {
    try {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.top = "-9999px";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      document.execCommand("copy");
      document.body.removeChild(ta);
    } catch (e) { /* ignore */ }
  }

  /** 统一给气泡绑定长按事件（touch / mouse / contextmenu） */
  function attachLongPressToBubble(bubble, msgDiv, content) {
    bubble.classList.add("has-longpress");

    var LONG_PRESS_MS = 450;
    var MOVE_TOLERANCE = 10;
    var pressTimer = null;
    var startX = 0;
    var startY = 0;
    var triggered = false;

    function clearTimer() {
      if (pressTimer) {
        clearTimeout(pressTimer);
        pressTimer = null;
      }
    }

    function onPressStart(clientX, clientY, e) {
      triggered = false;
      startX = clientX;
      startY = clientY;
      clearTimer();
      pressTimer = setTimeout(function () {
        triggered = true;
        // 长按触发：阻止后续的文本选中/系统菜单
        if (e && e.preventDefault) {
          try { e.preventDefault(); } catch (_) {}
        }
        if (window.getSelection) {
          try { window.getSelection().removeAllRanges(); } catch (_) {}
        }
        showMsgActionMenu(clientX, clientY, bubble, msgDiv, content);
      }, LONG_PRESS_MS);
    }

    function onPressMove(clientX, clientY) {
      if (!pressTimer) return;
      if (Math.abs(clientX - startX) > MOVE_TOLERANCE ||
          Math.abs(clientY - startY) > MOVE_TOLERANCE) {
        clearTimer();
      }
    }

    function onPressEnd() {
      clearTimer();
    }

    // 触摸事件（非 passive，长按触发时需要能调用 preventDefault 阻止系统文本选中）
    bubble.addEventListener("touchstart", function (e) {
      var t = e.touches && e.touches[0];
      if (!t) return;
      onPressStart(t.clientX, t.clientY, e);
    }, { passive: false });

    bubble.addEventListener("touchmove", function (e) {
      var t = e.touches && e.touches[0];
      if (!t) return;
      onPressMove(t.clientX, t.clientY);
    }, { passive: true });

    bubble.addEventListener("touchend", function () {
      onPressEnd();
    });

    bubble.addEventListener("touchcancel", function () {
      onPressEnd();
    });

    // 鼠标右键 / 桌面模拟长按
    bubble.addEventListener("contextmenu", function (e) {
      e.preventDefault();
      showMsgActionMenu(e.clientX, e.clientY, bubble, msgDiv, content);
    });

    // 桌面：按住鼠标左键也视为长按（便于测试）
    var mouseDownActive = false;
    bubble.addEventListener("mousedown", function (e) {
      if (e.button !== 0) return;
      mouseDownActive = true;
      onPressStart(e.clientX, e.clientY, e);
    });
    bubble.addEventListener("mousemove", function (e) {
      if (!mouseDownActive) return;
      onPressMove(e.clientX, e.clientY);
    });
    bubble.addEventListener("mouseup", function () {
      mouseDownActive = false;
      onPressEnd();
    });
    bubble.addEventListener("mouseleave", function () {
      mouseDownActive = false;
      onPressEnd();
    });

    // 长按触发后：阻止接下来这一次 click 冒泡（防止误触发链接/其他元素）
    bubble.addEventListener("click", function (e) {
      if (triggered) {
        e.stopPropagation();
        e.preventDefault();
        triggered = false;
      }
    }, true);
  }

  /** 构造请求——密钥运行时解密，用后不驻留变量 */
  function doFetch(historyMessages) {
    return fetch(CONFIG.API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + _ar(),
      },
      signal: abortController.signal,
      body: JSON.stringify({
        model: CONFIG.MODEL,
        messages: historyMessages,
        temperature: CONFIG.TEMPERATURE,
        max_tokens: CONFIG.MAX_TOKENS,
        stream: true,
      }),
    });
  }

  function delay(ms) {
    return new Promise(function (resolve) { setTimeout(resolve, ms); });
  }

  /* ================================================================
   * 确认弹窗（含焦点陷阱）
   * ================================================================ */

  function confirmDeleteMessage(msgDiv) {
    pendingDeleteMsg = msgDiv;
    chatConfirmTitle.textContent = "确认删除这条消息？";
    chatConfirmWarn.textContent = "删除后无法恢复";
    showConfirm();
  }

  function confirmClearAll() {
    pendingDeleteMsg = null;
    chatConfirmTitle.textContent = "确认清空聊天记录？";
    chatConfirmWarn.textContent = "此操作不可恢复";
    showConfirm();
  }

  function showConfirm() {
    chatConfirmOverlay.classList.add("show");
    // 聚焦到取消按钮（安全默认）
    setTimeout(function () { chatConfirmCancel.focus(); }, 50);
  }

  function hideConfirm() {
    chatConfirmOverlay.classList.remove("show");
    pendingDeleteMsg = null;
    pendingDeleteSessionId = null;
  }

  /** 焦点陷阱——Tab 在弹窗内循环 */
  function trapFocus(e) {
    if (!chatConfirmOverlay.classList.contains("show")) return;
    if (e.key !== "Tab") return;
    var focusable = chatConfirmOverlay.querySelectorAll("button");
    if (!focusable.length) return;
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }

  function onConfirmOk() {
    if (pendingDeleteSessionId) {
      // 删除整个会话
      var sid = pendingDeleteSessionId;
      pendingDeleteSessionId = null;
      hideConfirm();
      deleteSession(sid);
      return;
    }

    if (pendingDeleteMsg) {
      // 删除单条
      var id = parseInt(pendingDeleteMsg.dataset.msgId, 10);
      removeMessageData(id);
      pendingDeleteMsg.remove();
      pendingDeleteMsg = null;
      saveChatHistory();

      if (chatData().length === 0) renderEmptyState();
    } else {
      // 清空当前会话的所有消息
      if (abortController) { abortController.abort(); abortController = null; }
      toggleSendButton(false);
      var s = currentSession();
      if (s) {
        s.messages = [];
        s.title = "新话题";
      }
      saveSessions();
      renderEmptyState();
    }
    hideConfirm();
  }

  /* ================================================================
   * 新话题 & 侧栏
   * ================================================================ */

  /** 开始新话题 */
  function startNewSession() {
    // 如果正在生成，先中止
    if (abortController) { abortController.abort(); abortController = null; }
    toggleSendButton(false);

    // 如果当前会话为空且无消息，直接复用
    var cur = currentSession();
    if (cur && cur.messages.length === 0) {
      closeSidebar();
      renderEmptyState();
      chatInput.focus();
      return;
    }

    createSession();
    closeSidebar();
    renderEmptyState();
    chatInput.focus();
  }

  /** 打开会话列表侧栏 */
  function openSidebar() {
    renderSidebarList();
    chatSidebar.classList.add("open");
    chatSidebarOverlay.classList.add("show");
  }

  /** 关闭会话列表侧栏 */
  function closeSidebar() {
    chatSidebar.classList.remove("open");
    chatSidebarOverlay.classList.remove("show");
  }

  /** 渲染侧栏会话列表 */
  function renderSidebarList() {
    if (!chatSidebarList) return;
    chatSidebarList.innerHTML = "";

    if (sessions.length === 0) {
      chatSidebarList.innerHTML = '<div class="chat-sidebar-empty">暂无聊天记录</div>';
      return;
    }

    sessions.forEach(function (s) {
      var item = document.createElement("div");
      item.className = "chat-sidebar-item" + (s.id === currentSessionId ? " active" : "");

      var icon = document.createElement("span");
      icon.className = "chat-sidebar-item-icon";
      icon.textContent = s.messages.length > 0 ? "💬" : "📝";

      var info = document.createElement("div");
      info.className = "chat-sidebar-item-info";

      var title = document.createElement("div");
      title.className = "chat-sidebar-item-title";
      title.textContent = s.title || "新话题";

      var preview = document.createElement("div");
      preview.className = "chat-sidebar-item-preview";
      var lastMsg = s.messages[s.messages.length - 1];
      preview.textContent = lastMsg
        ? (lastMsg.role === "user" ? "我: " : "AI: ") + lastMsg.content.substring(0, 30)
        : "暂无消息";

      info.appendChild(title);
      info.appendChild(preview);

      item.appendChild(icon);
      item.appendChild(info);

      // 点击切换会话
      item.addEventListener("click", function (e) {
        // 点击删除按钮及其子元素时不切换
        if (e.target.closest(".chat-sidebar-item-delete")) return;
        switchSession(s.id);
      });

      // 删除按钮
      var delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "chat-sidebar-item-delete";
      delBtn.textContent = "×";
      delBtn.setAttribute("aria-label", "删除此会话");
      delBtn.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        confirmDeleteSession(s.id);
      });
      item.appendChild(delBtn);

      chatSidebarList.appendChild(item);
    });
  }

  /* ================================================================
   * 初始化
   * ================================================================ */

  function setupChat() {
    // 获取 DOM
    chatMessages = document.getElementById("chatMessages");
    chatInput = document.getElementById("chatInput");
    chatSendBtn = document.getElementById("chatSendBtn");
    chatClearBtn = document.getElementById("chatClearBtn");
    chatNewBtn = document.getElementById("chatNewBtn");
    chatThemeBtn = document.getElementById("chatThemeBtn");
    chatConfirmOverlay = document.getElementById("chatConfirmOverlay");
    chatConfirmCancel = document.getElementById("chatConfirmCancel");
    chatConfirmOk = document.getElementById("chatConfirmOk");
    chatConfirmTitle = document.getElementById("chatConfirmTitle");
    chatConfirmWarn = document.getElementById("chatConfirmWarn");
    chatSidebar = document.getElementById("chatSidebar");
    chatSidebarOverlay = document.getElementById("chatSidebarOverlay");
    chatSidebarClose = document.getElementById("chatSidebarClose");
    chatSidebarNewBtn = document.getElementById("chatSidebarNewBtn");
    chatSidebarList = document.getElementById("chatSidebarList");

    // ===== 事件绑定 =====

    // 输入框
    chatInput.addEventListener("input", updateInputHeight);
    chatInput.addEventListener("keydown", function (e) {
      // ✅ IME 输入法组合状态不触发发送
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 发送 / 停止按钮
    chatSendBtn.addEventListener("click", sendMessage);

    // 清空记录
    chatClearBtn.addEventListener("click", confirmClearAll);

    // 新话题
    chatNewBtn.addEventListener("click", startNewSession);
    chatSidebarNewBtn.addEventListener("click", startNewSession);

    // ===== 深色模式切换 =====
    var THEME_STORAGE_KEY = "lingzhi_theme"; // "dark" / "light" / 未设置=跟随系统

    function applyTheme(theme) {
      if (theme === "dark") {
        document.body.classList.add("is-dark");
      } else if (theme === "light") {
        document.body.classList.remove("is-dark");
      } else {
        // 未手动设置 → 跟随系统 prefers-color-scheme
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.body.classList.add("is-dark");
        } else {
          document.body.classList.remove("is-dark");
        }
      }
      if (chatThemeBtn) {
        chatThemeBtn.setAttribute(
          "title",
          document.body.classList.contains("is-dark") ? "切换到浅色模式" : "切换到深色模式"
        );
      }
    }

    function toggleTheme() {
      var isDark = document.body.classList.contains("is-dark");
      var next = isDark ? "light" : "dark";
      try { localStorage.setItem(THEME_STORAGE_KEY, next); } catch (e) {}
      applyTheme(next);
    }

    if (chatThemeBtn) chatThemeBtn.addEventListener("click", toggleTheme);

    // 初始化主题（在 DOM 准备好时立即应用，避免闪烁）
    var savedTheme = null;
    try { savedTheme = localStorage.getItem(THEME_STORAGE_KEY); } catch (e) {}
    applyTheme(savedTheme);

    // 点击标题打开侧栏
    var chatHeaderTitle = document.getElementById("chatHeaderTitle");
    if (chatHeaderTitle) {
      chatHeaderTitle.addEventListener("click", openSidebar);
      chatHeaderTitle.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openSidebar();
        }
      });
    }

    // 侧栏关闭
    chatSidebarClose.addEventListener("click", closeSidebar);
    chatSidebarOverlay.addEventListener("click", closeSidebar);

    // 确认弹窗
    chatConfirmCancel.addEventListener("click", hideConfirm);
    chatConfirmOk.addEventListener("click", onConfirmOk);
    chatConfirmOverlay.addEventListener("click", function (e) {
      if (e.target === chatConfirmOverlay) hideConfirm();
    });

    // Esc 关闭弹窗 + 焦点陷阱
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        if (chatConfirmOverlay.classList.contains("show")) {
          hideConfirm();
        } else if (chatSidebar.classList.contains("open")) {
          closeSidebar();
        }
      }
      trapFocus(e);
    });

    // 页面卸载——中止请求
    window.addEventListener("beforeunload", function () {
      if (abortController) abortController.abort();
    });

    // ===== 初始化会话 =====
    loadSessions();
    if (sessions.length === 0) {
      createSession();
    } else {
      currentSessionId = sessions[0].id;
    }
    renderCurrentSession();
    chatInput.focus();
  }

  /** 等待 KaTeX 加载完毕再初始化（解决 defer 竞态） */
  function initWhenReady() {
    var attempts = 0;
    var maxAttempts = CONFIG.KATEX_WAIT_TIMEOUT / 100;

    function check() {
      if (typeof katex !== "undefined" || attempts >= maxAttempts) {
        // KaTeX 已加载，或超时后放弃等待（renderContent 有 fallback）
        setupChat();
      } else {
        attempts++;
        setTimeout(check, 100);
      }
    }
    check();
  }

  // 启动
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initWhenReady);
  } else {
    initWhenReady();
  }
})();
</script>
