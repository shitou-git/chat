<script>
(function () {
  "use strict";

  /* ================================================================
   * 配置区
   * ================================================================ */

  const CONFIG = {
    /** API 端点 */
    API_URL: "https://apihub.agnes-ai.com/v1/chat/completions",

    /** 存储 */
    STORAGE_KEY: "ai_chat_sessions",

    /** 模型 */
    MODEL: "agnes-2.0-flash",
    MAX_TOKENS: 8192,
    TEMPERATURE: 0.3,

    /** 重试 */
    MAX_RETRIES: 2,
    RETRY_BASE_DELAY: 1000,

    /** UI */
    MAX_TEXTAREA_HEIGHT: 120,
    PARA_FLUSH_INTERVAL: 250,  // ms — 段落级流式渲染：超过此时间仍无段落结束就强制 flush 一次
    KATEX_WAIT_TIMEOUT: 5000,  // ms — 等待 KaTeX 加载
    MAX_INPUT_LENGTH: 2000,
  };

  /*
   * ============================================================
   *  凭证混淆层
   *
   *  ⚠️ 纯前端无法真正保护密钥，以下为多层混淆以显著提高
   *     逆向提取成本。如需真正安全请使用后端代理。
   *
   *  混淆策略（4 层）：
   *    1. XOR 加密——原始密钥逐字节与掩码异或，非简单编码
   *    2. 分片存储——密文拆成多段 hex，散落在不同数组位置
   *    3. 变量名伪装——函数/变量名不暗示与密钥的关系
   *    4. 运行时拼装——密钥不落变量，用后即弃
   *
   *  更换密钥：运行 keygen.html，粘贴新 Key 即可生成新代码块
   * ============================================================
   */

  // 第 1 层：密文分片（XOR 后的 hex，看起来像随机配置数据）
  var _cf = [
    "0b06140723060567", "3d5a5c02006b2335",
    "3b596d5f664a383f", "290e502430420711",
    "31227f3b3a663a37", "0e195d5330574129",
    "4e0363"
  ];

  // 第 2 层：掩码（看起来像构建版本号）
  var _bv = "xm9kQ2vP";

  // 第 3 层：解码函数（名称伪装为「构建配置解析」）
  function _pc(h, k) {
    var r = "";
    for (var i = 0; i < h.length; i += 2) {
      r += String.fromCharCode(
        parseInt(h.substr(i, 2), 16) ^ k.charCodeAt((i >> 1) % k.length)
      );
    }
    return r;
  }

  // 第 4 层：运行时拼装——每次调用重新解密，不缓存到变量
  function _ar() {
    return _pc(_cf.join(""), _bv);
  }

  const SYSTEM_PROMPT =
    "你是一个智能、友好、知识渊博的 AI 助手。请用中文回答用户的问题，回答要清晰、准确、有条理。\n\n" +
    "【输出格式要求】\n" +
    "1. 数学公式使用 LaTeX 语法并用美元符号包裹：\n" +
    "   - 行内公式：用 $...$ 包裹，例如 $\\sqrt{4}$、$\\frac{1}{2}$、$x^2$、$a^2+b^2=c^2$\n" +
    "   - 独占一行的大公式：用 $$...$$ 包裹，例如 $$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$\n" +
    "2. 根号写法：$\\sqrt{4}$ 而不是 √4\n" +
    "3. 分数写法：$\\frac{1}{2}$ 而不是 1/2\n" +
    "4. 平方写法：$x^2$ 而不是 x²\n" +
    "5. 使用 Markdown 格式组织内容（# 标题，**加粗**，- 列表等）\n" +
    "6. 严格禁止任何自我介绍，直接给出答案";

  /** 生成空状态 HTML */
  function buildEmptyTipHTML() {
    return (
      '<div class="chat-empty-tip">' +
      '<span class="big">👋</span>' +
      "你好！我是灵知" +
      "</div>"
    );
  }

  /* ================================================================
   * 状态
   * ================================================================ */

  // 多会话数据结构：
  // sessions = [{ id, title, createdAt, messages: [{ id, role, content }] }]
  var sessions = [];
  var currentSessionId = null;
  var nextId = 1;          // 消息自增 ID
  var isGenerating = false;
  var abortController = null;
  var pendingDeleteMsg = null;
  var scrollRafId = null;

  /** 获取当前会话 */
  function currentSession() {
    return sessions.find(function (s) { return s.id === currentSessionId; });
  }

  /** 获取当前会话的消息数组（快捷方式） */
  function chatData() {
    var s = currentSession();
    return s ? s.messages : [];
  }

  /** 向当前会话添加消息 */
  function addMessageData(role, content) {
    var s = currentSession();
    if (!s) return { id: -1, role: role, content: content };
    var msg = { id: nextId++, role: role, content: content };
    s.messages.push(msg);
    // 第一条用户消息自动设为会话标题
    if (s.title === "新话题" && role === "user") {
      s.title = content.substring(0, 20) + (content.length > 20 ? "…" : "");
    }
    return msg;
  }

  /** 从当前会话删除消息 */
  function removeMessageData(id) {
    var s = currentSession();
    if (!s) return;
    s.messages = s.messages.filter(function (m) { return m.id !== id; });
  }

  /* ================================================================
   * 会话管理
   * ================================================================ */

  /** 创建新会话 */
  function createSession() {
    var s = {
      id: Date.now() + Math.random().toString(36).substr(2, 5),
      title: "新话题",
      createdAt: Date.now(),
      messages: [],
    };
    sessions.unshift(s);
    currentSessionId = s.id;
    saveSessions();
    return s;
  }

  /** 切换到指定会话 */
  function switchSession(id) {
    currentSessionId = id;
    saveSessions();
    renderCurrentSession();
    closeSidebar();
  }

  /** 删除会话 */
  /** 待删除的会话 ID */
  var pendingDeleteSessionId = null;

  /** 弹窗确认删除会话 */
  function confirmDeleteSession(id) {
    pendingDeleteSessionId = id;
    chatConfirmTitle.textContent = "确认删除这个话题？";
    chatConfirmWarn.textContent = "该话题的所有聊天记录将被删除";
    showConfirm();
  }

  /** 删除会话 */
  function deleteSession(id) {
    // 如果正在生成且删的是当前会话，先中止
    if (id === currentSessionId && abortController) {
      abortController.abort();
      abortController = null;
      toggleSendButton(false);
    }
    sessions = sessions.filter(function (s) { return s.id !== id; });

    if (currentSessionId === id || sessions.length === 0) {
      // 删除的是当前会话（或全部删完）——创建一个新的空话题
      createSession();
      closeSidebar();
      renderEmptyState();
    } else {
      saveSessions();
      renderSidebarList();
    }
  }

  /** 持久化所有会话 */
  function saveSessions() {
    try {
      // 保存前对每个会话的消息做去重，防止渲染层遗漏导致重复数据固化到 localStorage
      sessions.forEach(function (s) {
        if (!s || !s.messages) return;
        var deduped = [];
        var prevRole = null;
        var prevContent = null;
        s.messages.forEach(function (m) {
          if (!m || !m.content) return;
          // 连续相同 role 且相同 content → 跳过
          if (m.role === prevRole && m.content === prevContent) return;
          prevRole = m.role;
          prevContent = m.content;
          deduped.push(m);
        });
        s.messages = deduped;
      });
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(sessions));
    } catch (e) {
      console.warn("saveSessions error:", e);
    }
  }

  /** 从 localStorage 加载所有会话 */
  function loadSessions() {
    try {
      var raw = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (!raw) return;
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) {
        sessions = parsed;
        // 恢复 nextId
        var maxId = 0;
        sessions.forEach(function (s) {
          s.messages.forEach(function (m) {
            if (m.id > maxId) maxId = m.id;
          });
        });
        nextId = maxId + 1;
      }
    } catch (e) {
      console.warn("loadSessions error:", e);
    }
  }

  /** 渲染当前会话到 DOM */
  function renderCurrentSession() {
    var s = currentSession();
    if (!s || s.messages.length === 0) {
      renderEmptyState();
      return;
    }
    chatMessages.innerHTML = "";

    // 去重：跳过连续相同 role+content 的重复消息（防止 localStorage 异常时产生重复渲染）
    var prevRole = null;
    var prevContent = null;
    s.messages.forEach(function (m) {
      if (!m.content || !m.content.trim()) return;
      // 连续相同 role 且相同 content → 跳过（重复消息）
      if (m.role === prevRole && m.content === prevContent) return;
      prevRole = m.role;
      prevContent = m.content;
      var el = createMessageElement(m);
      chatMessages.appendChild(el);
    });
    scrollToBottom(true);
  }

  /* ================================================================
   * DOM 引用
   * ================================================================ */

  var chatMessages, chatInput, chatSendBtn, chatNewBtn, chatThemeBtn;
  var chatConfirmOverlay, chatConfirmCancel, chatConfirmOk;
  var chatConfirmTitle, chatConfirmWarn;
  var chatSidebar, chatSidebarOverlay, chatSidebarClose, chatSidebarNewBtn, chatSidebarList;

  /* ================================================================
   * 工具函数
   * ================================================================ */

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function fixLatex(text) {
    return text
      // \sqrt{x}{y} → \sqrt[x]{y}（根号下标旧写法）
      .replace(/\\sqrt\{([^{}]+)\}\{([^{}]+)\}/g, "\\sqrt[$1]{$2}")
      // \sqrt2 → \sqrt{2}（裸数字）
      .replace(/\\sqrt(\d)/g, "\\sqrt{$1}")
      // \sqrt[3]x → \sqrt[3]{x}（有下标但缺花括号）
      .replace(/\\sqrt(\[[^\]]+\])([a-zA-Z])/g, "\\sqrt$1{$2}")
      // \frac12 → \frac{1}{2}（裸数字分数）
      .replace(/\\frac(\d)(\d)/g, "\\frac{$1}{$2}")
      .replace(/\\frac(\d)\{([^{}]+)\}/g, "\\frac{$1}{$2}")
      .replace(/\\frac\{([^{}]+)\}(\d)/g, "\\frac{$1}{$2}")
      // Unicode 数学符号 → LaTeX
      .replace(/√/g, "\\sqrt ")
      .replace(/×/g, "\\times ")
      .replace(/÷/g, "\\div ")
      .replace(/≤/g, "\\leq ")
      .replace(/≥/g, "\\geq ")
      .replace(/≠/g, "\\neq ")
      .replace(/→/g, "\\rightarrow ")
      .replace(/←/g, "\\leftarrow ")
      .replace(/↔/g, "\\leftrightarrow ")
      .replace(/∞/g, "\\infty ")
      .replace(/∑/g, "\\sum ")
      .replace(/∫/g, "\\int ")
      .replace(/∏/g, "\\prod ")
      .replace(/∂/g, "\\partial ")
      .replace(/∇/g, "\\nabla ")
      .replace(/∈/g, "\\in ")
      .replace(/∉/g, "\\notin ")
      .replace(/⊂/g, "\\subset ")
      .replace(/⊃/g, "\\supset ")
      .replace(/∪/g, "\\cup ")
      .replace(/∩/g, "\\cap ")
      .replace(/∀/g, "\\forall ")
      .replace(/∃/g, "\\exists ")
      .replace(/°/g, "^\\circ ")
      .replace(/±/g, "\\pm ")
      .replace(/∓/g, "\\mp ")
      // 希腊字母（仅在非 \ 开头时替换，避免重复处理 \alpha 等）
      .replace(/(^|[^\\])π/g, "$1\\pi ")
      .replace(/(^|[^\\])α/g, "$1\\alpha ")
      .replace(/(^|[^\\])β/g, "$1\\beta ")
      .replace(/(^|[^\\])γ/g, "$1\\gamma ")
      .replace(/(^|[^\\])δ/g, "$1\\delta ")
      .replace(/(^|[^\\])ε/g, "$1\\varepsilon ")
      .replace(/(^|[^\\])θ/g, "$1\\theta ")
      .replace(/(^|[^\\])λ/g, "$1\\lambda ")
      .replace(/(^|[^\\])μ/g, "$1\\mu ")
      .replace(/(^|[^\\])ρ/g, "$1\\rho ")
      .replace(/(^|[^\\])σ/g, "$1\\sigma ")
      .replace(/(^|[^\\])τ/g, "$1\\tau ")
      .replace(/(^|[^\\])φ/g, "$1\\varphi ")
      .replace(/(^|[^\\])ψ/g, "$1\\psi ")
      .replace(/(^|[^\\])ω/g, "$1\\omega ")
      .replace(/(^|[^\\])Δ/g, "$1\\Delta ")
      .replace(/(^|[^\\])Σ/g, "$1\\Sigma ")
      .replace(/(^|[^\\])Ω/g, "$1\\Omega ");
  }

  /**
   * 将文本+公式混合内容渲染为 HTML
   * 安全：text 部分先 escapeHtml 再做 Markdown 替换，防止 XSS
   *
   * 正则策略：$$...$$ 优先于 $...$ 匹配，避免误判
   */
  function renderContent(text) {
    if (!text) return "";
    var fixed = fixLatex(text);

    // 第 1 轮：提取代码块 ```...```，用占位符替换，防止其中的 $ 被公式正则匹配
    var codeBlocks = [];
    fixed = fixed.replace(/```(\w*)\n?([\s\S]*?)```/g, function (m, lang, code) {
      var idx = codeBlocks.length;
      codeBlocks.push({ lang: lang, code: code.replace(/\n$/, "") });
      return "\x00CODE" + idx + "\x00";
    });

    // 第 2 轮：分离公式与文本
    // $$...$$ 优先匹配（块级），$...$ 其次（行内）
    var regex = /\$\$([\s\S]+?)\$\$|\$([^$]+?)\$/g;
    var parts = [];
    var lastEnd = 0;
    var match;

    while ((match = regex.exec(fixed)) !== null) {
      if (match.index > lastEnd) {
        parts.push({ type: "text", content: fixed.substring(lastEnd, match.index) });
      }
      if (match[1] !== undefined) {
        parts.push({ type: "block", content: match[1].trim() });
      } else {
        parts.push({ type: "inline", content: match[2].trim() });
      }
      lastEnd = match.index + match[0].length;
    }
    if (lastEnd < fixed.length) {
      parts.push({ type: "text", content: fixed.substring(lastEnd) });
    }

    // 第 3 轮：渲染各部分
    var result = "";
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      if (p.type === "text") {
        // 块级公式前后的文本：去掉首尾换行，避免 <br> 和公式 margin 叠加产生多余空白
        var textContent = p.content;
        if (i > 0 && parts[i - 1].type === "block") {
          textContent = textContent.replace(/^\n+/, "");
        }
        if (i < parts.length - 1 && parts[i + 1].type === "block") {
          textContent = textContent.replace(/\n+$/, "");
        }
        result += renderText(textContent);
      } else {
        // 公式渲染
        try {
          if (typeof katex === "undefined") {
            result += '<code class="math-fallback">' + escapeHtml(p.content) + "</code>";
          } else {
            var html = katex.renderToString(p.content, {
              throwOnError: false,
              displayMode: p.type === "block",
              output: "html",
            });
            if (p.type === "block") {
              result += '<div class="katex-block">' + html + "</div>";
            } else {
              result += html;
            }
          }
        } catch (e) {
          result += '<code class="math-fallback">' + escapeHtml(p.content) + "</code>";
        }
      }
    }

    // 第 4 轮：还原代码块占位符
    result = result.replace(/\x00CODE(\d+)\x00/g, function (m, idx) {
      var block = codeBlocks[parseInt(idx, 10)];
      if (!block) return m;
      return (
        '<pre class="code-block"><code>' +
        escapeHtml(block.code) +
        "</code></pre>"
      );
    });

    return result;
  }

  /** 渲染纯文本部分：escape → Markdown */
  function renderText(text) {
    // 先 escape 防 XSS
    var html = escapeHtml(text);

    // 行内代码 `...`（在 Markdown 格式化之前处理，避免内容被其他规则破坏）
    var inlineCodes = [];
    html = html.replace(/`([^`]+)`/g, function (m, code) {
      var idx = inlineCodes.length;
      inlineCodes.push(code);
      return "\x01INLINE" + idx + "\x01";
    });

    // 标题
    html = html.replace(/^#{1,6}\s+(.+)$/gm, function (m, content) {
      var level = m.match(/^#+/)[0].length;
      return "</p><h" + level + ">" + content + "</h" + level + "><p>";
    });

    // 加粗
    html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

    // 单星号不转斜体（AI 常用 * 做乘法/列表，转斜体误伤太多）
    // 保留原样

    // 无序列表
    html = html.replace(/^[-*]\s+/gm, "• ");

    // 有序列表
    html = html.replace(/^(\d+\.)\s+/gm, "$1 ");

    // 换行
    html = html.replace(/\n/g, "<br>");

    // 还原行内代码
    html = html.replace(/\x01INLINE(\d+)\x01/g, function (m, idx) {
      return '<code class="code-inline">' + inlineCodes[parseInt(idx, 10)] + "</code>";
    });

    return html;
  }

  /** 渲染用户消息（纯文本，转义 + 换行） */
  function renderUserText(text) {
    return escapeHtml(text).replace(/\n/g, "<br>");
  }

  /** 长公式自动缩小字体 */
  function autoScaleKatex(container) {
    if (!container) return;
    var blocks = container.querySelectorAll(".katex-block");
    blocks.forEach(function (block) {
      block.style.fontSize = "";
      var parentWidth = block.clientWidth || block.parentElement.clientWidth || 300;
      var scales = [0.96, 0.86, 0.76, 0.66, 0.56];
      for (var i = 0; i < scales.length; i++) {
        block.style.fontSize = scales[i] + "em";
        var el = block.querySelector(".katex-display") || block.querySelector(".katex");
        if (!el || el.scrollWidth <= parentWidth + 2) break;
      }
    });
  }

  /* ================================================================
   * 滚动控制（rAF 节流）
   * ================================================================ */

  function scrollToBottom(force) {
    if (!chatMessages) return;
    // 内容尚未溢出：无需滚动，避免无意义的 scrollTop 写入
    if (!force && chatMessages.scrollHeight <= chatMessages.clientHeight + 2) return;
    if (scrollRafId) {
      if (!force) return;
      cancelAnimationFrame(scrollRafId);
    }
    scrollRafId = requestAnimationFrame(function () {
      if (!chatMessages) return;
      // 若距底已经 < 4px，视为用户在看最新内容，保持即可，不强制写
      var distanceFromBottom =
        chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight;
      if (!force && distanceFromBottom < 4) {
        scrollRafId = null;
        return;
      }
      chatMessages.scrollTop = chatMessages.scrollHeight;
      scrollRafId = null;
    });
  }

  /* ================================================================
   * 数据管理 — 已在会话管理区定义
   * ================================================================ */

  /** 保存当前会话（兼容旧调用名） */
  function saveChatHistory() {
    saveSessions();
    // 如果侧栏打开，同步刷新
    if (chatSidebar && chatSidebar.classList.contains("open")) {
      renderSidebarList();
    }
  }

  /* ================================================================
   * DOM 渲染
   * ================================================================ */

  /** 给气泡绑定长按/右键操作菜单（onRetry 可选：AI 消息的重新回答） */
  function attachLongPressToBubble(bubble, msgDiv, msg, onRetry) {
    var longPressTimer = null;
    var startX = 0;
    var startY = 0;

    function getClientX(e) {
      if (e.touches && e.touches.length > 0) return e.touches[0].clientX;
      if (e.changedTouches && e.changedTouches.length > 0) return e.changedTouches[0].clientX;
      return e.clientX || 0;
    }
    function getClientY(e) {
      if (e.touches && e.touches.length > 0) return e.touches[0].clientY;
      if (e.changedTouches && e.changedTouches.length > 0) return e.changedTouches[0].clientY;
      return e.clientY || 0;
    }

    function inTextSelectMode() {
      return bubble.classList.contains('is-text-select-mode');
    }

    function startLongPress(e) {
      if (inTextSelectMode()) return;
      startX = getClientX(e);
      startY = getClientY(e);
      longPressTimer = setTimeout(function () {
        if (navigator.vibrate) navigator.vibrate(15);
        showMsgActionMenu(msgDiv, bubble, msg, startX, startY, onRetry);
      }, 500);
    }

    function cancelLongPress() {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }

    function handleMove(e) {
      if (!longPressTimer) return;
      var cx = getClientX(e);
      var cy = getClientY(e);
      if (Math.abs(cx - startX) > 10 || Math.abs(cy - startY) > 10) {
        cancelLongPress();
      }
    }

    bubble.addEventListener("touchstart", startLongPress, { passive: true });
    bubble.addEventListener("touchend", cancelLongPress);
    bubble.addEventListener("touchmove", handleMove, { passive: true });
    bubble.addEventListener("touchcancel", cancelLongPress);
    bubble.addEventListener("contextmenu", function (e) {
      if (inTextSelectMode()) return;
      e.preventDefault();
      showMsgActionMenu(msgDiv, bubble, msg, startX, startY, onRetry);
    });
    bubble.addEventListener("mousedown", startLongPress);
    bubble.addEventListener("mouseup", cancelLongPress);
    bubble.addEventListener("mouseleave", cancelLongPress);
  }

  function createMessageElement(msg) {
    var div = document.createElement("div");
    div.className = "message " + (msg.role === "user" ? "user" : "ai");
    div.dataset.msgId = msg.id;

    var bubble = document.createElement("div");
    bubble.className = "msg-bubble";

    if (msg.role === "user") {
      bubble.innerHTML = renderUserText(msg.content);
    } else {
      bubble.innerHTML = renderContent(msg.content);
      autoScaleKatex(bubble);
    }

    // 长按气泡弹出操作菜单
    attachLongPressToBubble(bubble, div, msg);

    div.appendChild(bubble);
    return div;
  }

  function renderEmptyState() {
    chatMessages.innerHTML = buildEmptyTipHTML();
  }

  /* ================================================================
   * 长按气泡操作菜单（复制 / 文本 / 删除）
   * ================================================================ */

  var currentActionMenu = null;

  function hideMsgActionMenu() {
    if (currentActionMenu) {
      currentActionMenu.remove();
      currentActionMenu = null;
    }
  }

  /** 进入文本选择模式：让系统原生文字选择生效，点击外部自动退出 */
  var _textSelectModeBubble = null;
  function enterBubbleTextSelectMode(bubble) {
    // 清除其他气泡上的模式标记，保证同一时间只有一条消息在文本选择模式
    if (_textSelectModeBubble && _textSelectModeBubble !== bubble) {
      _textSelectModeBubble.classList.remove('is-text-select-mode');
    }
    _textSelectModeBubble = bubble;
    bubble.classList.add('is-text-select-mode');

    // 延迟添加点击外部监听，避免当前的菜单点击立即触发退出
    setTimeout(function () {
      function onOutside(e) {
        if (!bubble.parentNode) return; // 元素已删除
        if (e.target === bubble || bubble.contains(e.target)) return;
        bubble.classList.remove('is-text-select-mode');
        if (_textSelectModeBubble === bubble) _textSelectModeBubble = null;
        document.removeEventListener('click', onOutside, true);
        document.removeEventListener('touchstart', onOutside, true);
      }
      document.addEventListener('click', onOutside, true);
      document.addEventListener('touchstart', onOutside, true);
    }, 50);
  }

  function showMsgActionMenu(msgDiv, bubble, msg, clickX, clickY, onRetry) {
    hideMsgActionMenu();

    var menu = document.createElement("div");
    menu.className = "msg-action-menu";

    // 菜单项
    var items = [
      { icon: "📋", label: "复制", action: function () { copyMessageText(msg.content); } },
      { icon: "✍️", label: "文本", action: function () { enterBubbleTextSelectMode(bubble); } },
      { icon: "🗑", label: "删除", action: function () { confirmDeleteMessage(msgDiv); } },
    ];
    // 仅 AI 消息显示"重新回答"（放在删除下方）
    if (onRetry && msg.role === "assistant") {
      items.push({ icon: "🔄", label: "重新回答", action: onRetry });
    }

    for (var i = 0; i < items.length; i++) {
      if (i > 0) {
        var divider = document.createElement("div");
        divider.className = "msg-action-menu-divider";
        menu.appendChild(divider);
      }
      var itemEl = document.createElement("div");
      itemEl.className = "msg-action-menu-item";
      itemEl.innerHTML = '<span class="icon" aria-hidden="true">' + items[i].icon + '</span><span>' + items[i].label + '</span>';
      (function (action) {
        itemEl.addEventListener("click", function () {
          hideMsgActionMenu();
          action();
        });
      })(items[i].action);
      menu.appendChild(itemEl);
    }

    document.body.appendChild(menu);

    // 定位：以手指长按位置 (clickX/clickY) 为锚点，避开气泡边界
    var menuRect = menu.getBoundingClientRect();
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var margin = 12;
    var fingerGap = 14; // 与手指保持间距，避免直接覆盖

    // 水平：以 clickX 为中心，两侧不超出视口
    var posX = (clickX || vw / 2);
    var menuLeft = posX - menuRect.width / 2;
    menuLeft = Math.max(margin, Math.min(menuLeft, vw - menuRect.width - margin));

    // 垂直：优先显示在手指上方；上方空间不足时翻到下方
    var posY = (clickY || vh / 2);
    var menuTop;
    if (posY - fingerGap - menuRect.height >= margin) {
      menuTop = posY - fingerGap - menuRect.height;
    } else {
      menuTop = posY + fingerGap;
    }
    menuTop = Math.max(margin, Math.min(menuTop, vh - menuRect.height - margin));

    menu.style.left = Math.round(menuLeft) + "px";
    menu.style.top = Math.round(menuTop) + "px";

    currentActionMenu = menu;
  }

  function copyMessageText(text) {
    var plain = text || "";
    if (window.clipboardData && window.clipboardData.setData) {
      try { window.clipboardData.setData("Text", plain); } catch (e) {}
      return;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(plain).catch(function () {});
      return;
    }
    try {
      var ta = document.createElement("textarea");
      ta.value = plain;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    } catch (e) {}
  }

  /* ================================================================
   * 输入框
   * ================================================================ */

  function updateInputHeight() {
    chatInput.style.height = "auto";
    chatInput.style.height =
      Math.min(chatInput.scrollHeight, CONFIG.MAX_TEXTAREA_HEIGHT) + "px";
  }

  /* ================================================================
   * 发送 / 停止
   * ================================================================ */

  function toggleSendButton(generating) {
    isGenerating = generating;
    if (generating) {
      chatSendBtn.textContent = "⏹";
      chatSendBtn.title = "停止生成";
      chatSendBtn.setAttribute("aria-label", "停止生成");
      chatSendBtn.classList.add("is-stop");
    } else {
      chatSendBtn.textContent = "→";
      chatSendBtn.title = "发送";
      chatSendBtn.setAttribute("aria-label", "发送");
      chatSendBtn.classList.remove("is-stop");
    }
  }

  function stopGeneration() {
    if (abortController) abortController.abort();
  }

  async function sendMessage() {
    // 如果正在生成，点击按钮 = 停止
    if (isGenerating) {
      stopGeneration();
      return;
    }

    var text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = "";
    chatInput.style.height = "auto";
    toggleSendButton(true);

    // 移除空状态
    var emptyTip = chatMessages.querySelector(".chat-empty-tip");
    if (emptyTip) emptyTip.remove();

    // 添加用户消息到数据和 DOM
    var userMsg = addMessageData("user", text);
    var userMsgDiv = createMessageElement(userMsg);
    chatMessages.appendChild(userMsgDiv);
    scrollToBottom(true);

    // 身份类问题——只在明确询问AI身份时触发
    // 精确匹配完整短语，避免误判正常问题（如"青光眼是什么"）
    var identityKeywords = [
      "你是谁", "您是谁", "你是谁呀", "你是谁啊",
      "你叫什么名字", "你叫啥",
      "你的名字", "您的名字",
      "你是哪位", "你是哪个", "你是什么东西",
      "介绍一下你自己", "介绍一下自己", "介绍你自己", "自我介绍",
      "who are you", "what is your name", "your name"
    ];
    var trimmed = text.trim().toLowerCase();
    var isIdentityQuestion = identityKeywords.some(function (keyword) {
      return trimmed.indexOf(keyword.toLowerCase()) !== -1;
    });
    // 二次验证：必须同时包含第二人称代词或英文身份词
    if (isIdentityQuestion) {
      var hasIdentityContext = /(你|您|who|your name)/i.test(text);
      if (!hasIdentityContext) isIdentityQuestion = false;
    }
    if (isIdentityQuestion) {
      var aiReply = addMessageData("assistant", "我是灵知，请问有什么可以帮你的？");
      var aiMsgDiv = document.createElement("div");
      aiMsgDiv.className = "message ai";
      aiMsgDiv.dataset.msgId = aiReply.id;
      aiMsgDiv.innerHTML = '<div class="msg-bubble">' + renderContent("我是灵知，请问有什么可以帮你的？") + "</div>";
      var bubbleForId = aiMsgDiv.querySelector(".msg-bubble");
      chatMessages.appendChild(aiMsgDiv);
      appendActions(bubbleForId, aiMsgDiv, "我是灵知，请问有什么可以帮你的？");
      attachLongPressToBubble(bubbleForId, aiMsgDiv, aiReply);
      scrollToBottom(true);
      saveChatHistory();
      toggleSendButton(false);
      return;
    }

    // 创建 AI 占位消息（不加入 chatData）
    var aiMsgDiv = document.createElement("div");
    aiMsgDiv.className = "message ai";
    aiMsgDiv.innerHTML =
      '<div class="msg-bubble">正在思考' +
      '<div class="typing-indicator">' +
      '<div class="typing-dot"></div>' +
      '<div class="typing-dot"></div>' +
      '<div class="typing-dot"></div>' +
      "</div></div>";
    chatMessages.appendChild(aiMsgDiv);
    var bubble = aiMsgDiv.querySelector(".msg-bubble");
    scrollToBottom(true);
    // 额外再滚一次，确保"正在思考"气泡出现在用户视野（抵消可能的 rAF 互相覆盖）
    setTimeout(function () { scrollToBottom(true); }, 50);

    // 构建上下文（从 chatData，不包含当前占位）
    var historyMessages = [{ role: "system", content: SYSTEM_PROMPT }];
    var msgs = chatData();
    msgs.forEach(function (m) {
      historyMessages.push({ role: m.role, content: m.content });
    });

    abortController = new AbortController();

    // ===== 流式渲染：流式期间只追加纯文本，流结束后一次性做 markdown/latex 渲染 =====
    var fullContent = "";                 // 完整原文（保存用）
    var pendingText = "";                 // 尚未追加到 DOM 的累积文本
    var lastAppendTs = 0;                 // 上次 DOM 追加时间（节流用）
    var APPEND_THROTTLE_MS = 40;          // DOM 追加间隔（ms）——从 80 调小为 40，更新更灵敏
    var firstTokenTs = 0;                 // 首个 token 到达时间
    var t0 = Date.now();
    var AUTO_SCROLL_LINE_LIMIT = 12;      // 前 N 行跟随滚动，之后停止
    var hasClearedPlaceholder = false;    // 是否已清掉"正在思考"
    var incompleteFormulaTail = "";       // 未配对的 $ 开头的片段，留到下次再处理
    var finishReason = null;              // finish_reason，用于判断是否被 max_tokens 截断

    // 按换行粗略估算行数
    function estimateLineCount(text) {
      if (!text) return 0;
      var m = text.match(/\n/g);
      return (m ? m.length : 0) + 1;
    }

    // 流式阶段：对已完整的公式用 KaTeX 直接渲染，其他文本纯文本追加
    // 末尾未配对的 $ 片段保留到下次再处理，避免公式被拆成两半输出
    function renderIncremental(text) {
      if (!text) return "";
      var result = "";
      var pos = 0;
      var hasKatex = typeof katex !== "undefined";
      var len = text.length;
      // 检查末尾是否存在未配对的 $（可能是公式的开始但未结束）
      // 从末尾回溯，找到最后一个 $，如果其后的内容无法构成配对，就把从那个 $ 开始的部分截下来留到下次
      var tailStart = -1;
      var lastDollar = text.lastIndexOf("$");
      if (lastDollar !== -1) {
        // 检查从 lastDollar 起是否能形成完整公式
        if (lastDollar === len - 1) {
          tailStart = lastDollar; // 最后一个字符就是 $，未配对
        } else {
          // lastDollar 之后：看看有没有另一个 $ 作为闭合
          var closingAfter = text.indexOf("$", lastDollar + 1);
          // 也检查是否是 $$
          var isDoubleDollar = (lastDollar + 1 < len && text.charAt(lastDollar + 1) === "$");
          if (closingAfter === -1) {
            // 末尾没有闭合 $，保留整段
            tailStart = lastDollar;
          } else if (isDoubleDollar && closingAfter === lastDollar + 1) {
            // $$ 开头，但后面没有另一个 $$，也保留
            tailStart = lastDollar;
          }
        }
      }
      var processEnd = (tailStart === -1) ? len : tailStart;
      while (pos < processEnd) {
        // 先尝试 $$...$$ 块级公式
        if (pos + 1 < processEnd && text.substr(pos, 2) === "$$") {
          var endIdx = text.indexOf("$$", pos + 2);
          if (endIdx !== -1 && endIdx + 2 <= processEnd) {
            var formula = text.substring(pos + 2, endIdx).trim();
            if (formula && hasKatex) {
              try {
                var rendered = katex.renderToString(formula, { throwOnError: false, displayMode: true, output: "html" });
                result += '<div class="katex-block">' + rendered + "</div>";
              } catch (e) {
                result += '<code class="math-fallback">' + escapeHtml(formula) + "</code>";
              }
            } else {
              result += '<code class="math-fallback">' + escapeHtml(formula) + "</code>";
            }
            pos = endIdx + 2;
            continue;
          }
        }
        // 再尝试 $...$ 行内公式
        if (text.charAt(pos) === "$") {
          var endIdx2 = text.indexOf("$", pos + 1);
          if (endIdx2 !== -1 && endIdx2 > pos + 1 && endIdx2 + 1 <= processEnd) {
            var formula2 = text.substring(pos + 1, endIdx2).trim();
            if (formula2 && hasKatex) {
              try {
                result += katex.renderToString(formula2, { throwOnError: false, displayMode: false, output: "html" });
              } catch (e) {
                result += '<code class="math-fallback">' + escapeHtml(formula2) + "</code>";
              }
            } else {
              result += '<code class="math-fallback">' + escapeHtml(formula2) + "</code>";
            }
            pos = endIdx2 + 1;
            continue;
          }
        }
        // 普通文本：累计到下一个 $ 或 processEnd
        var nextDollar = text.indexOf("$", pos + 1);
        var segEnd;
        if (nextDollar === -1 || nextDollar >= processEnd) {
          segEnd = processEnd;
        } else {
          segEnd = nextDollar;
        }
        if (segEnd <= pos) segEnd = pos + 1;
        var seg = text.substring(pos, segEnd);
        result += escapeHtml(seg).replace(/\n/g, "<br>");
        pos = segEnd;
      }
      // 截下来的尾部留给下次 flush
      if (tailStart !== -1) {
        incompleteFormulaTail = text.substring(tailStart);
      } else {
        incompleteFormulaTail = "";
      }
      return result;
    }

    function flushStreamAppend(force) {
      var nowTs = Date.now();
      if (!force && lastAppendTs > 0 && nowTs - lastAppendTs < APPEND_THROTTLE_MS) return;
      if (!pendingText && !incompleteFormulaTail) return;

      if (!hasClearedPlaceholder) {
        bubble.innerHTML = "";
        hasClearedPlaceholder = true;
      }

      // 把上次留下来的未配对 $ 片段和本次新文本合并
      var combined = (incompleteFormulaTail || "") + (pendingText || "");
      var html = renderIncremental(combined);
      // renderIncremental 内部已更新 incompleteFormulaTail

      if (html) {
        var host = document.createElement("div");
        host.innerHTML = html;
        while (host.firstChild) bubble.appendChild(host.firstChild);
      }
      pendingText = "";
      lastAppendTs = nowTs;

      // 前 N 行跟随滚动
      if (estimateLineCount(fullContent) <= AUTO_SCROLL_LINE_LIMIT) {
        scrollToBottom(false);
      }
    }

    // "重新回答" 回调（整个 sendMessage 闭包共享）：
    // 删除本条 AI 消息及其之后所有 assistant 消息，重新发起请求
    var retry = function () {
      var session = currentSession();
      if (!session) return;
      var msgs = session.messages;

      // 找到最后一条用户消息的下标
      var lastUserIdx = -1;
      for (var k = msgs.length - 1; k >= 0; k--) {
        if (msgs[k].role === "user") { lastUserIdx = k; break; }
      }
      if (lastUserIdx < 0) return;

      // 截掉最后一条用户消息之后的所有 assistant 消息（含自动续答产生的多条）
      session.messages = msgs.slice(0, lastUserIdx + 1);

      // 同时删除 DOM 中这些 assistant 消息（从最后一条 user 消息之后的所有 .message.ai）
      var lastUserMsgDiv = null;
      var allMsgs = chatMessages.querySelectorAll(".message");
      for (var m = allMsgs.length - 1; m >= 0; m--) {
        if (allMsgs[m].classList.contains("user")) { lastUserMsgDiv = allMsgs[m]; break; }
      }
      // 删除 lastUserMsgDiv 之后的所有 AI 消息 DOM
      if (lastUserMsgDiv) {
        var next = lastUserMsgDiv.nextSibling;
        while (next) {
          var toRemove = next;
          next = next.nextSibling;
          if (toRemove.nodeType === 1 && toRemove.classList && toRemove.classList.contains("ai")) {
            toRemove.remove();
          } else if (toRemove.nodeType === 3 && !toRemove.textContent.trim()) {
            toRemove.remove();
          }
        }
      } else {
        if (aiMsgDiv && aiMsgDiv.parentNode) aiMsgDiv.remove();
      }

      // 创建新的 AI 消息气泡
      var newAiMsgDiv = document.createElement("div");
      newAiMsgDiv.className = "message ai";
      newAiMsgDiv.innerHTML =
        '<div class="msg-bubble">正在思考' +
        '<div class="typing-indicator">' +
        '<div class="typing-dot"></div>' +
        '<div class="typing-dot"></div>' +
        '<div class="typing-dot"></div>' +
        "</div></div>";
      chatMessages.appendChild(newAiMsgDiv);
      var newBubble = newAiMsgDiv.querySelector(".msg-bubble");

      // 重置流式状态，并把 bubble/aiMsgDiv 指向新节点
      fullContent = "";
      pendingText = "";
      incompleteFormulaTail = "";
      finishReason = null;
      lastAppendTs = 0;
      firstTokenTs = 0;
      bubble = newBubble;
      aiMsgDiv = newAiMsgDiv;
      hasClearedPlaceholder = false;

      // 重新发起请求（支持自动续答）
      runAutoContinueLoop();
      scrollToBottom(true);
    };

    // 流式结束后：一次性渲染完整 markdown/latex，绑定菜单
    // 带兜底逻辑：如果 renderContent 因任何原因返回空或抛错，回退到显示纯文本
    // 注意：流结束后不自动滚动到底部，由用户自行操作
    function finalRender(textForBubble, msgObjToAttach) {
      flushStreamAppend(true);
      var rendered = "";
      try {
        rendered = renderContent(textForBubble);
      } catch (e) {
        rendered = "";
      }
      if (!rendered || rendered.replace(/<[^>]+>/g, "").replace(/\s+/g, "").length <
          textForBubble.replace(/\s+/g, "").length * 0.5) {
        bubble.innerHTML = escapeHtml(textForBubble).replace(/\n/g, "<br>");
      } else {
        bubble.innerHTML = rendered;
      }

      appendActions(bubble, aiMsgDiv, textForBubble, retry);
      if (msgObjToAttach) attachLongPressToBubble(bubble, aiMsgDiv, msgObjToAttach, retry);
      autoScaleKatex(bubble);
    }

    // ===== 核心：自动续答循环（可被重试按钮重复调用）=====
    function runAutoContinueLoop() {
      return new Promise(async function (resolve) {

        var AUTO_CONTINUE_LIMIT = 2;
        var autoContinueLeft = AUTO_CONTINUE_LIMIT;
        var turnIndex = 0;
        var accumulatedContent = "";
        var anyResponseReceived = false;
        var userAborted = false;
        var hadError = false;
        var errorMessage = "";

    // 把用户最后一条消息保存起来，续答时作为上下文的一部分
    // 注意：addMessageData 已在开头执行一次，chatData() 会返回包含这条用户消息的历史

    do {
      turnIndex++;
      // 重置本轮的流式状态（累积文本不重置）
      finishReason = null;
      pendingText = "";
      incompleteFormulaTail = "";
      lastAppendTs = 0;

      // 构建本轮请求的上下文
      var historyMessages = [{ role: "system", content: SYSTEM_PROMPT }];
      var msgs = chatData();
      msgs.forEach(function (m) {
        historyMessages.push({ role: m.role, content: m.content });
      });
      // 续答轮次：附加一句"继续"，让模型从上一次截断处继续输出
      if (turnIndex > 1) {
        historyMessages.push({
          role: "user",
          content: "继续",
        });
        // 在 bubble 中显示一个轻量的续接提示，但不新建用户消息
        if (!hasClearedPlaceholder) {
          bubble.innerHTML = "";
          hasClearedPlaceholder = true;
        }
      }

      abortController = new AbortController();

      try {
        // ===== 带重试的请求 =====
        var response = null;
        var retryCount = 0;

        while (retryCount <= CONFIG.MAX_RETRIES) {
          try {
            response = await doFetch(historyMessages);
            if (response.ok) break;

            var errorText2 = await response.text();
            if (response.status >= 500 && response.status < 600 && retryCount < CONFIG.MAX_RETRIES) {
              retryCount++;
              await delay(CONFIG.RETRY_BASE_DELAY * retryCount);
              continue;
            }
            throw new Error("API 请求失败：" + response.status + " " + errorText2);
          } catch (err) {
            if (err.name === "AbortError") throw err;
            if (retryCount < CONFIG.MAX_RETRIES) {
              retryCount++;
              await delay(CONFIG.RETRY_BASE_DELAY * retryCount);
              continue;
            }
            throw err;
          }
        }

        // ===== 读取 SSE 流 =====
        var reader = response.body.getReader();
        var decoder = new TextDecoder("utf-8", { fatal: false });
        var lineBuffer = "";

        while (true) {
          var result = await reader.read();
          if (result.done) break;

          lineBuffer += decoder.decode(result.value, { stream: true });
          var lfIdx;
          while ((lfIdx = lineBuffer.indexOf("\n")) !== -1) {
            var rawLine = lineBuffer.substring(0, lfIdx);
            lineBuffer = lineBuffer.substring(lfIdx + 1);
            if (rawLine.charAt(rawLine.length - 1) === "\r") rawLine = rawLine.slice(0, -1);

            if (rawLine === "") continue;
            if (rawLine.charAt(0) === ":") continue;
            if (!rawLine.startsWith("data:")) continue;

            var payload = rawLine.substring(5);
            if (payload.charAt(0) === " ") payload = payload.substring(1);
            if (payload === "[DONE]") continue;

            try {
              var data = JSON.parse(payload);
              if (data.choices && data.choices[0] && data.choices[0].finish_reason) {
                finishReason = data.choices[0].finish_reason;
              }
              var delta =
                data.choices &&
                data.choices[0] &&
                data.choices[0].delta &&
                data.choices[0].delta.content;
              if (!delta) continue;

              if (fullContent.length === 0 && firstTokenTs === 0) firstTokenTs = Date.now();
              fullContent += delta;
              pendingText += delta;
              flushStreamAppend(false);
            } catch (e) {}
          }
        }

        // decoder.final() 清尾部
        try {
          var decoderTail = decoder.decode();
          if (decoderTail) lineBuffer += decoderTail;
        } catch (e) {}

        // lineBuffer 末尾一行
        if (lineBuffer && lineBuffer.charAt(0) !== ":") {
          if (lineBuffer.charAt(lineBuffer.length - 1) === "\r") lineBuffer = lineBuffer.slice(0, -1);
          if (lineBuffer.startsWith("data:")) {
            var lastPayload2 = lineBuffer.substring(5);
            if (lastPayload2.charAt(0) === " ") lastPayload2 = lastPayload2.substring(1);
            if (lastPayload2 !== "[DONE]") {
              try {
                var lastData2 = JSON.parse(lastPayload2);
                if (lastData2.choices && lastData2.choices[0] && lastData2.choices[0].finish_reason) {
                  finishReason = lastData2.choices[0].finish_reason;
                }
                var lastDelta2 =
                  lastData2.choices &&
                  lastData2.choices[0] &&
                  lastData2.choices[0].delta &&
                  lastData2.choices[0].delta.content;
                if (lastDelta2) {
                  fullContent += lastDelta2;
                  pendingText += lastDelta2;
                }
              } catch (e) {}
            }
          }
        }

        // 本轮强制 flush
        flushStreamAppend(true);

        if (!fullContent.trim()) {
          if (turnIndex === 1) throw new Error("未收到有效响应");
          // 续答轮次无内容：视为正常结束
        }

        // 合并到累积文本
        accumulatedContent += fullContent;
        anyResponseReceived = true;

        // 把本轮 AI 回复加入 chatData，这样续答时上下文是完整的
        if (fullContent.trim()) {
          addMessageData("assistant", fullContent);
        }

        // 重置 fullContent，准备下一轮
        fullContent = "";

      } catch (err) {
        if (err.name === "AbortError") {
          userAborted = true;
          if (fullContent.trim()) {
            accumulatedContent += fullContent;
            anyResponseReceived = true;
            addMessageData("assistant", fullContent);
            fullContent = "";
          }
        } else {
          hadError = true;
          errorMessage = err.message;
          console.error(err);
        }
        break; // 任意错误都停止续答
      }

      // 判断是否需要续答
      if (finishReason === "length" && autoContinueLeft > 0) {
        autoContinueLeft--;
        await delay(200);
        continue;
      }
      break;

    } while (true);
    // ===== 最终渲染与保存 =====
    if (hadError) {
      if (!accumulatedContent.trim()) {
        bubble.innerHTML = renderContent("❌ 出错了：" + errorMessage);
        // 即使出错也提供"重新回答"按钮
        appendActions(bubble, aiMsgDiv, "", retry);
        attachLongPressToBubble(bubble, aiMsgDiv, { role: "assistant", content: "" }, retry);
      } else {
        // 已有部分内容，把错误信息以暗色小字追加末尾
        accumulatedContent += "\n\n*（出错：" + errorMessage + "）*";
        var aiMsgErr = addMessageData("assistant", accumulatedContent);
        aiMsgDiv.dataset.msgId = aiMsgErr.id;
        finalRender(accumulatedContent, aiMsgErr);
      }
    } else if (!anyResponseReceived && !userAborted) {
      bubble.innerHTML = renderContent("❌ 未收到有效响应");
      appendActions(bubble, aiMsgDiv, "", retry);
      attachLongPressToBubble(bubble, aiMsgDiv, { role: "assistant", content: "" }, retry);
    } else if (userAborted && accumulatedContent.trim()) {
      var aiMsgAborted = addMessageData("assistant", accumulatedContent);
      aiMsgDiv.dataset.msgId = aiMsgAborted.id;
      finalRender(accumulatedContent, aiMsgAborted);
      saveChatHistory();
    } else if (accumulatedContent.trim()) {
      // 正常路径：最终渲染 + 保存
      var aiMsgFinal = addMessageData("assistant", accumulatedContent);
      aiMsgDiv.dataset.msgId = aiMsgFinal.id;
      finalRender(accumulatedContent, aiMsgFinal);

      var ttfbMs = firstTokenTs ? firstTokenTs - t0 : null;
      console.log(
        "[灵知-流式] 全文 " + accumulatedContent.length + " 字符" +
        " | 首 token: " + (ttfbMs ? ttfbMs + "ms" : "-") +
        " | 总耗时: " + (Date.now() - t0) + "ms" +
        (finishReason === "length" ? " | finish_reason=length（已触发自动续答）" : "")
      );

      saveChatHistory();
    } else if (userAborted) {
      aiMsgDiv.remove();
    }

    toggleSendButton(false);
    abortController = null;
        resolve();
      });
    }

    // 启动自动续答循环
    await runAutoContinueLoop();
  }
  /** 向 bubble 追加长按操作菜单绑定（onRetry 可选：AI 消息的重新回答） */
  function appendActions(bubble, msgDiv, content, onRetry) {
    attachLongPressToBubble(bubble, msgDiv, { role: "assistant", content: content }, onRetry);
  }

  /** 构造请求——密钥运行时解密，用后不驻留变量 */
  function doFetch(historyMessages) {
    return fetch(CONFIG.API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + _ar(),
      },
      signal: abortController.signal,
      body: JSON.stringify({
        model: CONFIG.MODEL,
        messages: historyMessages,
        temperature: CONFIG.TEMPERATURE,
        max_tokens: CONFIG.MAX_TOKENS,
        stream: true,
      }),
    });
  }

  function delay(ms) {
    return new Promise(function (resolve) { setTimeout(resolve, ms); });
  }

  /* ================================================================
   * 确认弹窗（含焦点陷阱）
   * ================================================================ */

  function confirmDeleteMessage(msgDiv) {
    pendingDeleteMsg = msgDiv;
    chatConfirmTitle.textContent = "确认删除这条消息？";
    chatConfirmWarn.textContent = "删除后无法恢复";
    showConfirm();
  }

  function confirmClearAll() {
    pendingDeleteMsg = null;
    chatConfirmTitle.textContent = "确认清空聊天记录？";
    chatConfirmWarn.textContent = "此操作不可恢复";
    showConfirm();
  }

  function showConfirm() {
    chatConfirmOverlay.classList.add("show");
    // 聚焦到取消按钮（安全默认）
    setTimeout(function () { chatConfirmCancel.focus(); }, 50);
  }

  function hideConfirm() {
    chatConfirmOverlay.classList.remove("show");
    pendingDeleteMsg = null;
    pendingDeleteSessionId = null;
  }

  /** 焦点陷阱——Tab 在弹窗内循环 */
  function trapFocus(e) {
    if (!chatConfirmOverlay.classList.contains("show")) return;
    if (e.key !== "Tab") return;
    var focusable = chatConfirmOverlay.querySelectorAll("button");
    if (!focusable.length) return;
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }

  function onConfirmOk() {
    if (pendingDeleteSessionId) {
      // 删除整个会话
      var sid = pendingDeleteSessionId;
      pendingDeleteSessionId = null;
      hideConfirm();
      deleteSession(sid);
      return;
    }

    if (pendingDeleteMsg) {
      // 删除单条
      var id = parseInt(pendingDeleteMsg.dataset.msgId, 10);
      removeMessageData(id);
      pendingDeleteMsg.remove();
      pendingDeleteMsg = null;
      saveChatHistory();

      if (chatData().length === 0) renderEmptyState();
    } else {
      // 清空当前会话的所有消息
      if (abortController) { abortController.abort(); abortController = null; }
      toggleSendButton(false);
      var s = currentSession();
      if (s) {
        s.messages = [];
        s.title = "新话题";
      }
      saveSessions();
      renderEmptyState();
    }
    hideConfirm();
  }

  /* ================================================================
   * 新话题 & 侧栏
   * ================================================================ */

  /** 开始新话题 */
  function startNewSession() {
    // 如果正在生成，先中止
    if (abortController) { abortController.abort(); abortController = null; }
    toggleSendButton(false);

    // 如果当前会话为空且无消息，直接复用
    var cur = currentSession();
    if (cur && cur.messages.length === 0) {
      closeSidebar();
      renderEmptyState();
      chatInput.focus();
      return;
    }

    createSession();
    closeSidebar();
    renderEmptyState();
    chatInput.focus();
  }

  /** 打开会话列表侧栏 */
  function openSidebar() {
    renderSidebarList();
    chatSidebar.classList.add("open");
    chatSidebarOverlay.classList.add("show");
  }

  /** 关闭会话列表侧栏 */
  function closeSidebar() {
    chatSidebar.classList.remove("open");
    chatSidebarOverlay.classList.remove("show");
  }

  /** 渲染侧栏会话列表 */
  function renderSidebarList() {
    if (!chatSidebarList) return;
    chatSidebarList.innerHTML = "";

    if (sessions.length === 0) {
      chatSidebarList.innerHTML = '<div class="chat-sidebar-empty">暂无聊天记录</div>';
      return;
    }

    sessions.forEach(function (s) {
      var item = document.createElement("div");
      item.className = "chat-sidebar-item" + (s.id === currentSessionId ? " active" : "");
      item.dataset.sessionId = s.id;

      var icon = document.createElement("span");
      icon.className = "chat-sidebar-item-icon";
      icon.textContent = s.messages.length > 0 ? "💬" : "📝";

      var info = document.createElement("div");
      info.className = "chat-sidebar-item-info";

      var title = document.createElement("div");
      title.className = "chat-sidebar-item-title";
      title.textContent = s.title || "新话题";

      var preview = document.createElement("div");
      preview.className = "chat-sidebar-item-preview";
      var lastMsg = s.messages[s.messages.length - 1];
      preview.textContent = lastMsg
        ? (lastMsg.role === "user" ? "我: " : "AI: ") + lastMsg.content.substring(0, 30)
        : "暂无消息";

      info.appendChild(title);
      info.appendChild(preview);

      item.appendChild(icon);
      item.appendChild(info);

      // 点击切换会话（点击 title/删除按钮或其它子菜单时跳过）
      item.addEventListener("click", function (e) {
        if (e.target.closest(".chat-sidebar-item-delete")) return;
        switchSession(s.id);
      });

      // 长按/右键：弹出"重命名 / 删除"操作菜单
      attachSidebarItemMenu(item, s);

      chatSidebarList.appendChild(item);
    });
  }

  /** 给侧栏项绑定长按/右键菜单（重命名、删除） */
  function attachSidebarItemMenu(item, session) {
    var longPressTimer = null;
    var startX = 0;
    var startY = 0;
    function cancelLP() {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    }
    function startLP(e) {
      startX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
      startY = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
      cancelLP();
      longPressTimer = setTimeout(function () {
        if (navigator.vibrate) navigator.vibrate(15);
        showSidebarItemMenu(item, session, startX, startY);
      }, 500);
    }
    item.addEventListener("touchstart", startLP, { passive: true });
    item.addEventListener("touchend", cancelLP);
    item.addEventListener("touchmove", function (e) {
      if (!longPressTimer) return;
      var cx = e.touches && e.touches[0] ? e.touches[0].clientX : startX;
      var cy = e.touches && e.touches[0] ? e.touches[0].clientY : startY;
      if (Math.abs(cx - startX) > 10 || Math.abs(cy - startY) > 10) cancelLP();
    }, { passive: true });
    item.addEventListener("mousedown", startLP);
    item.addEventListener("mouseup", cancelLP);
    item.addEventListener("mouseleave", cancelLP);
    item.addEventListener("contextmenu", function (e) {
      e.preventDefault();
      showSidebarItemMenu(item, session, startX, startY);
    });
  }

  /** 显示侧栏项操作菜单（重命名 / 删除） */
  var currentSidebarMenu = null;
  function showSidebarItemMenu(item, session, x, y) {
    hideSidebarItemMenu();

    var menu = document.createElement("div");
    menu.className = "msg-action-menu";
    menu.dataset.sessionId = session.id;

    var items = [
      { icon: "✏️", label: "重命名", action: function () { showRenameModal(session.id, session.title || "新话题"); }},
      { icon: "🗑", label: "删除", action: function () { confirmDeleteSession(session.id); }},
    ];

    for (var i = 0; i < items.length; i++) {
      if (i > 0) {
        var div = document.createElement("div");
        div.className = "msg-action-menu-divider";
        menu.appendChild(div);
      }
      var it = document.createElement("div");
      it.className = "msg-action-menu-item";
      it.innerHTML = '<span class="icon" aria-hidden="true">' + items[i].icon + '</span><span>' + items[i].label + '</span>';
      (function (action) {
        it.addEventListener("click", function () { hideSidebarItemMenu(); action(); });
      })(items[i].action);
      menu.appendChild(it);
    }

    document.body.appendChild(menu);

    // 定位：在 item 附近显示
    var rect = item.getBoundingClientRect();
    var menuRect = menu.getBoundingClientRect();
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var margin = 12;

    // 水平：以 item 右侧为基准，超出视口时显示在左侧
    var menuLeft = rect.right - menuRect.width - 10;
    if (menuLeft < margin) menuLeft = rect.left + 10;
    menuLeft = Math.max(margin, Math.min(menuLeft, vw - menuRect.width - margin));

    // 垂直：以 item 顶部为基准
    var menuTop = rect.top;
    menuTop = Math.max(margin, Math.min(menuTop, vh - menuRect.height - margin));

    menu.style.left = Math.round(menuLeft) + "px";
    menu.style.top = Math.round(menuTop) + "px";

    currentSidebarMenu = menu;
  }

  function hideSidebarItemMenu() {
    if (currentSidebarMenu) {
      currentSidebarMenu.remove();
      currentSidebarMenu = null;
    }
  }

  // 点击外部关闭侧栏菜单
  document.addEventListener("click", function (e) {
    if (currentSidebarMenu && !currentSidebarMenu.contains(e.target)) hideSidebarItemMenu();
  }, true);
  document.addEventListener("touchstart", function (e) {
    if (currentSidebarMenu && !currentSidebarMenu.contains(e.target)) hideSidebarItemMenu();
  }, true);

  /* ================================================================
   * 初始化
   * ================================================================ */

  /** 重命名弹窗待处理会话 ID */
  var pendingRenameSessionId = null;

  /** 显示重命名弹窗 */
  function showRenameModal(sessionId, currentName) {
    pendingRenameSessionId = sessionId;
    chatRenameInput.value = currentName || "";
    chatRenameOverlay.classList.add("show");
    setTimeout(function () { chatRenameInput.focus(); chatRenameInput.select(); }, 50);
  }

  /** 隐藏重命名弹窗 */
  function hideRenameModal() {
    chatRenameOverlay.classList.remove("show");
    pendingRenameSessionId = null;
  }

  /** 确认重命名 */
  function onRenameOk() {
    var newName = chatRenameInput.value.trim();
    if (!newName || !pendingRenameSessionId) { hideRenameModal(); return; }
    var s = sessions.find(function (x) { return x.id === pendingRenameSessionId; });
    if (s) {
      s.title = newName;
      saveSessions();
      renderSidebarList();
    }
    hideRenameModal();
  }

  function setupChat() {
    // 获取 DOM
    chatMessages = document.getElementById("chatMessages");
    chatInput = document.getElementById("chatInput");
    chatSendBtn = document.getElementById("chatSendBtn");
    chatNewBtn = document.getElementById("chatNewBtn");
    chatThemeBtn = document.getElementById("chatThemeBtn");
    chatConfirmOverlay = document.getElementById("chatConfirmOverlay");
    chatConfirmCancel = document.getElementById("chatConfirmCancel");
    chatConfirmOk = document.getElementById("chatConfirmOk");
    chatConfirmTitle = document.getElementById("chatConfirmTitle");
    chatConfirmWarn = document.getElementById("chatConfirmWarn");
    chatRenameOverlay = document.getElementById("chatRenameOverlay");
    chatRenameInput = document.getElementById("chatRenameInput");
    chatRenameCancel = document.getElementById("chatRenameCancel");
    chatRenameOk = document.getElementById("chatRenameOk");
    chatSidebar = document.getElementById("chatSidebar");
    chatSidebarOverlay = document.getElementById("chatSidebarOverlay");
    chatSidebarClose = document.getElementById("chatSidebarClose");
    chatSidebarNewBtn = document.getElementById("chatSidebarNewBtn");
    chatSidebarList = document.getElementById("chatSidebarList");

    // ===== 事件绑定 =====

    // 输入框
    chatInput.addEventListener("input", updateInputHeight);
    chatInput.addEventListener("keydown", function (e) {
      // ✅ IME 输入法组合状态不触发发送
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 发送 / 停止按钮
    chatSendBtn.addEventListener("click", sendMessage);

    // 新话题
    chatNewBtn.addEventListener("click", startNewSession);
    chatSidebarNewBtn.addEventListener("click", startNewSession);

    // ===== 深色模式切换 =====
    var THEME_STORAGE_KEY = "lingzhi_theme"; // "dark" / "light" / 未设置=跟随系统

    function applyTheme(theme) {
      if (theme === "dark") {
        document.body.classList.add("is-dark");
      } else if (theme === "light") {
        document.body.classList.remove("is-dark");
      } else {
        // 未手动设置 → 跟随系统 prefers-color-scheme
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.body.classList.add("is-dark");
        } else {
          document.body.classList.remove("is-dark");
        }
      }
      if (chatThemeBtn) {
        chatThemeBtn.setAttribute(
          "title",
          document.body.classList.contains("is-dark") ? "切换到浅色模式" : "切换到深色模式"
        );
      }
    }

    function toggleTheme() {
      var isDark = document.body.classList.contains("is-dark");
      var next = isDark ? "light" : "dark";
      try { localStorage.setItem(THEME_STORAGE_KEY, next); } catch (e) {}
      applyTheme(next);
    }

    if (chatThemeBtn) chatThemeBtn.addEventListener("click", toggleTheme);

    // 初始化主题（在 DOM 准备好时立即应用，避免闪烁）
    var savedTheme = null;
    try { savedTheme = localStorage.getItem(THEME_STORAGE_KEY); } catch (e) {}
    applyTheme(savedTheme);

    // 点击标题打开侧栏
    var chatMenuBtn = document.getElementById("chatMenuBtn");
    if (chatMenuBtn) {
      chatMenuBtn.addEventListener("click", openSidebar);
      chatMenuBtn.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openSidebar();
        }
      });
    }

    // 侧栏关闭
    chatSidebarClose.addEventListener("click", closeSidebar);
    chatSidebarOverlay.addEventListener("click", closeSidebar);

    // 确认弹窗
    chatConfirmCancel.addEventListener("click", hideConfirm);
    chatConfirmOk.addEventListener("click", onConfirmOk);
    chatConfirmOverlay.addEventListener("click", function (e) {
      if (e.target === chatConfirmOverlay) hideConfirm();
    });

    // 重命名弹窗
    chatRenameCancel.addEventListener("click", hideRenameModal);
    chatRenameOk.addEventListener("click", onRenameOk);
    chatRenameInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); onRenameOk(); }
    });
    chatRenameOverlay.addEventListener("click", function (e) {
      if (e.target === chatRenameOverlay) hideRenameModal();
    });

    // Esc 关闭弹窗 + 焦点陷阱
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        if (currentActionMenu) {
          hideMsgActionMenu();
        } else if (chatRenameOverlay.classList.contains("show")) {
          hideRenameModal();
        } else if (chatConfirmOverlay.classList.contains("show")) {
          hideConfirm();
        } else if (chatSidebar.classList.contains("open")) {
          closeSidebar();
        }
      }
      trapFocus(e);
    });

    // 点击外部关闭操作菜单
    document.addEventListener("click", function (e) {
      if (currentActionMenu && !currentActionMenu.contains(e.target)) {
        hideMsgActionMenu();
      }
    }, true);
    document.addEventListener("touchstart", function (e) {
      if (currentActionMenu && !currentActionMenu.contains(e.target)) {
        hideMsgActionMenu();
      }
    }, { passive: true });

    // 滚动/改变尺寸关闭操作菜单
    window.addEventListener("scroll", hideMsgActionMenu, true);
    window.addEventListener("resize", hideMsgActionMenu);

    // 页面卸载——中止请求
    window.addEventListener("beforeunload", function () {
      if (abortController) abortController.abort();
    });

    // ===== 初始化会话 =====
    loadSessions();
    if (sessions.length === 0) {
      createSession();
    } else {
      currentSessionId = sessions[0].id;
    }
    renderCurrentSession();
    chatInput.focus();
  }

  /** 等待 KaTeX 加载完毕再初始化（解决 defer 竞态） */
  function initWhenReady() {
    var attempts = 0;
    var maxAttempts = CONFIG.KATEX_WAIT_TIMEOUT / 100;

    function check() {
      if (typeof katex !== "undefined" || attempts >= maxAttempts) {
        // KaTeX 已加载，或超时后放弃等待（renderContent 有 fallback）
        setupChat();
      } else {
        attempts++;
        setTimeout(check, 100);
      }
    }
    check();
  }

  // 启动
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initWhenReady);
  } else {
    initWhenReady();
  }

  // ---------- PWA：注册 Service Worker ----------
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker
        .register("./sw.js", { scope: "./" })
        .then(function (reg) {
          console.log("[PWA] Service Worker 已注册，作用域：", reg.scope);
          // 有新版本 SW 时提示
          reg.addEventListener("updatefound", function () {
            var installing = reg.installing;
            if (!installing) return;
            installing.addEventListener("statechange", function () {
              if (installing.state === "installed" && navigator.serviceWorker.controller) {
                console.log("[PWA] 有新版本可用，下次打开页面时生效");
              }
            });
          });
        })
        .catch(function (err) {
          console.warn("[PWA] Service Worker 注册失败：", err);
        });
    });
  }

  // ---------- PWA：安装提示 ----------
  var deferredPrompt = null;
  window.addEventListener("beforeinstallprompt", function (event) {
    // 阻止 Chrome 自动弹出默认安装提示
    event.preventDefault();
    deferredPrompt = event;
    console.log("[PWA] 可以安装应用了，点击地址栏图标或分享菜单中的「添加到主屏幕」");
  });

  window.addEventListener("appinstalled", function () {
    console.log("[PWA] 应用已安装成功");
    deferredPrompt = null;
  });
})();
</script>
</body>
