<script>
(function () {
  "use strict";

  /* ================================================================
   * 配置区
   * ================================================================ */

  const CONFIG = {
    /** API 端点 */
    API_URL: "https://apihub.agnes-ai.com/v1/chat/completions",

    /** 存储 */
    STORAGE_KEY: "ai_chat_sessions",

    /** 模型 */
    MODEL: "agnes-2.0-flash",
    MAX_TOKENS: 2048,
    TEMPERATURE: 0.3,

    /** 重试 */
    MAX_RETRIES: 2,
    RETRY_BASE_DELAY: 1000,

    /** UI */
    MAX_TEXTAREA_HEIGHT: 120,
    PARA_FLUSH_INTERVAL: 250,  // ms — 段落级流式渲染：超过此时间仍无段落结束就强制 flush 一次
    KATEX_WAIT_TIMEOUT: 5000,  // ms — 等待 KaTeX 加载
    MAX_INPUT_LENGTH: 2000,
  };

  /*
   * ============================================================
   *  凭证混淆层
   *
   *  ⚠️ 纯前端无法真正保护密钥，以下为多层混淆以显著提高
   *     逆向提取成本。如需真正安全请使用后端代理。
   *
   *  混淆策略（4 层）：
   *    1. XOR 加密——原始密钥逐字节与掩码异或，非简单编码
   *    2. 分片存储——密文拆成多段 hex，散落在不同数组位置
   *    3. 变量名伪装——函数/变量名不暗示与密钥的关系
   *    4. 运行时拼装——密钥不落变量，用后即弃
   *
   *  更换密钥：运行 keygen.html，粘贴新 Key 即可生成新代码块
   * ============================================================
   */

  // 第 1 层：密文分片（XOR 后的 hex，看起来像随机配置数据）
  var _cf = [
    "0b06140723060567", "3d5a5c02006b2335",
    "3b596d5f664a383f", "290e502430420711",
    "31227f3b3a663a37", "0e195d5330574129",
    "4e0363"
  ];

  // 第 2 层：掩码（看起来像构建版本号）
  var _bv = "xm9kQ2vP";

  // 第 3 层：解码函数（名称伪装为「构建配置解析」）
  function _pc(h, k) {
    var r = "";
    for (var i = 0; i < h.length; i += 2) {
      r += String.fromCharCode(
        parseInt(h.substr(i, 2), 16) ^ k.charCodeAt((i >> 1) % k.length)
      );
    }
    return r;
  }

  // 第 4 层：运行时拼装——每次调用重新解密，不缓存到变量
  function _ar() {
    return _pc(_cf.join(""), _bv);
  }

  const SYSTEM_PROMPT =
    "你是一个智能、友好、知识渊博的 AI 助手。请用中文回答用户的问题，回答要清晰、准确、有条理。\n\n" +
    "【输出格式要求】\n" +
    "1. 数学公式使用 LaTeX 语法并用美元符号包裹：\n" +
    "   - 行内公式：用 $...$ 包裹，例如 $\\sqrt{4}$、$\\frac{1}{2}$、$x^2$、$a^2+b^2=c^2$\n" +
    "   - 独占一行的大公式：用 $$...$$ 包裹，例如 $$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$\n" +
    "2. 根号写法：$\\sqrt{4}$ 而不是 √4\n" +
    "3. 分数写法：$\\frac{1}{2}$ 而不是 1/2\n" +
    "4. 平方写法：$x^2$ 而不是 x²\n" +
    "5. 使用 Markdown 格式组织内容（# 标题，**加粗**，- 列表等）\n" +
    "6. 严格禁止任何自我介绍，直接给出答案\n" +
    "7. 回答结束后，**必须**用一行 `---相关问题---` 作为分隔，然后列出 2~3 个用户可能继续问的问题，每行以 `?` 开头，例如：\n" +
    "   ? 第一个相关问题？\n" +
    "   ? 第二个相关问题？\n" +
    "   （此段必须出现在回答的最后，绝不能省略）";

  /** 生成空状态 HTML */
  function buildEmptyTipHTML() {
    return (
      '<div class="chat-empty-tip">' +
      '<span class="big">👋</span>' +
      "你好！我是灵知" +
      "</div>"
    );
  }

  /* ================================================================
   * 状态
   * ================================================================ */

  // 多会话数据结构：
  // sessions = [{ id, title, createdAt, messages: [{ id, role, content }] }]
  var sessions = [];
  var currentSessionId = null;
  var nextId = 1;          // 消息自增 ID
  var isGenerating = false;
  var abortController = null;
  /** pendingOperation: { type: 'msg' | 'session' | 'clearAll', ... } */
  var pendingOperation = null;
  var scrollRafId = null;

  /** 获取当前会话 */
  function currentSession() {
    return sessions.find(function (s) { return s.id === currentSessionId; });
  }

  /** 获取当前会话的消息数组（快捷方式） */
  function chatData() {
    var s = currentSession();
    return s ? s.messages : [];
  }

  /** 向当前会话添加消息 */
  function addMessageData(role, content) {
    var s = currentSession();
    if (!s) return { id: -1, role: role, content: content };
    var msg = { id: nextId++, role: role, content: content };
    s.messages.push(msg);
    // 第一条用户消息自动设为会话标题
    if (s.title === "新话题" && role === "user") {
      s.title = content.substring(0, 20) + (content.length > 20 ? "…" : "");
    }
    return msg;
  }

  /** 从当前会话删除消息 */
  function removeMessageData(id) {
    var s = currentSession();
    if (!s) return;
    s.messages = s.messages.filter(function (m) { return m.id !== id; });
  }

  /* ================================================================
   * 会话管理
   * ================================================================ */

  /** 创建新会话 */
  function createSession() {
    var s = {
      id: Date.now() + Math.random().toString(36).substr(2, 5),
      title: "新话题",
      createdAt: Date.now(),
      messages: [],
    };
    sessions.unshift(s);
    currentSessionId = s.id;
    saveSessions();
    return s;
  }

  /** 切换到指定会话 */
  function switchSession(id) {
    currentSessionId = id;
    saveSessions();
    renderCurrentSession();
    closeSidebar();
  }

  /** 删除会话 */
  /** 弹窗确认删除会话 */
  function confirmDeleteSession(id) {
    pendingOperation = { type: 'session', id: id };
    chatConfirmTitle.textContent = "确认删除这个话题？";
    chatConfirmWarn.textContent = "该话题的所有聊天记录将被删除";
    showConfirm();
  }

  /** 删除会话 */
  function deleteSession(id) {
    // 如果正在生成且删的是当前会话，先中止
    if (id === currentSessionId && abortController) {
      abortController.abort();
      abortController = null;
      toggleSendButton(false);
    }
    sessions = sessions.filter(function (s) { return s.id !== id; });

    if (currentSessionId === id || sessions.length === 0) {
      // 删除的是当前会话（或全部删完）——创建一个新的空话题
      createSession();
      closeSidebar();
      renderEmptyState();
    } else {
      saveSessions();
    }
    // 无论哪个分支，sidebar 列表都需要刷新
    renderSidebarList();
  }

  /** 持久化所有会话 */
  function saveSessions() {
    try {
      localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(sessions));
    } catch (e) {
      console.warn("saveSessions error:", e);
    }
  }

  /** 从 localStorage 加载所有会话 */
  function loadSessions() {
    try {
      var raw = localStorage.getItem(CONFIG.STORAGE_KEY);
      if (!raw) return;
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) {
        sessions = parsed;
        // 恢复 nextId
        var maxId = 0;
        sessions.forEach(function (s) {
          s.messages.forEach(function (m) {
            if (m.id > maxId) maxId = m.id;
          });
        });
        nextId = maxId + 1;
      }
    } catch (e) {
      console.warn("loadSessions error:", e);
    }
  }

  /** 渲染当前会话到 DOM */
  function renderCurrentSession() {
    var s = currentSession();
    if (!s || s.messages.length === 0) {
      renderEmptyState();
      return;
    }
    chatMessages.innerHTML = "";

    // 批量构建 DOM，最后一次性插入，减少重排
    var frag = document.createDocumentFragment();
    for (var mi = 0; mi < s.messages.length; mi++) {
      var m = s.messages[mi];
      if (!m.content || !m.content.trim()) continue;
      frag.appendChild(createMessageElement(m));
    }
    chatMessages.appendChild(frag);
    scrollToBottom(true);
  }

  /* ================================================================
   * DOM 引用
   * ================================================================ */

  var chatMessages, chatInput, chatSendBtn, chatNewBtn, chatThemeBtn;
  var chatConfirmOverlay, chatConfirmCancel, chatConfirmOk;
  var chatConfirmTitle, chatConfirmWarn;
  var chatSidebar, chatSidebarOverlay, chatSidebarClose, chatSidebarNewBtn, chatSidebarList;

  /* ================================================================
   * 工具函数
   * ================================================================ */

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  /** 统一身份回复：屏蔽 AI 自述为 Sapiens/Agnes 开发的语句
   *  替换为统一的"灵知"文案
   */
  var IDENTITY_REPLY = "你好！我是灵知，由Stone开发，大模型调用Sapiens。";
  function sanitizeIdentity(text) {
    if (!text) return text;
    // 常见的模型自称短语（末尾标点一起吞掉避免双句号）
    // ⚠ 注意：故意不带 /g 修饰符——带 /g 的 .test() 会残留 lastIndex，
    //    导致对同一正则反复调用时出现漏匹配。
    var identityPhrases = [
      /我(是|由|为)(由)?\s*[Ss]apiens[^。\n]{0,25}开发的[^。！？\n]*[。！？.!?]?/,
      /我(是|由|为)(由)?\s*[Ss]apiens[^。！？\n]{0,40}开发[^。！？\n]*[。！？.!?]?/,
      /我(是|由)(一个)?\s*[Aa]gnes[^。\n]{0,25}开发的[^。！？\n]*[。！？.!?]?/,
      /我(是|为)(一个)?\s*[Aa]gnes[^。！？\n]{0,40}开发[^。！？\n]*[。！？.!?]?/,
      /我叫?[Aa]gnes[^。！？\n]{0,30}开发[^。！？\n]*[。！？.!?]?/,
      /[Ss]apiens[^。！？\n]{0,30}开发的[^。！？\n]*[。！？.!?]?/,
      /[Aa]gnes[^。！？\n]{0,30}开发[^。！？\n]*[。！？.!?]?/,
      /您好！我是\s*[Aa]gnes[^。！？\n]*[。！？.!?]?/,
      /你好！我是\s*[Aa]gnes[^。！？\n]*[。！？.!?]?/,
      /我是(一款|一个)?(基于)?\s*[Aa]gnes[^。！？\n]*(开发)?[^。！？\n]*[。！？.!?]?/,
    ];
    var result = text;
    var replaced = false;
    for (var i = 0; i < identityPhrases.length; i++) {
      if (identityPhrases[i].test(result)) {
        result = result.replace(identityPhrases[i], IDENTITY_REPLY);
        replaced = true;
      }
    }
    // 如果整个回复只有身份自述（没有其他有效内容），直接用统一回复
    var trimmed = result.trim();
    if (!replaced && trimmed.length < 40) {
      var low = trimmed.toLowerCase();
      if (/sapiens|agnes|我是由|你好.*我是.*开发/.test(low)) {
        return IDENTITY_REPLY;
      }
    }
    return result;
  }

  function fixLatex(text) {
    if (!text) return text;
    // 快速路径：检查是否需要处理
    // 如果没有 LaTeX 符号、没有希腊字母、没有数学符号，直接返回原文本
    var needsLatex = text.indexOf("\\") !== -1;
    var needsGreek = /[παβγδεθλμρστφψωΔΣΩ]/.test(text);
    var needsSymbol = /[√×÷≤≥≠→←↔∞∑∫∏∂∇∈∉⊂⊃∪∩°±∓]/.test(text);
    if (!needsLatex && !needsGreek && !needsSymbol) return text;

    var result = text;

    if (needsLatex) {
      result = result
        .replace(/\\sqrt\{([^{}]+)\}\{([^{}]+)\}/g, "\\sqrt[$1]{$2}")
        .replace(/\\sqrt(\d)/g, "\\sqrt{$1}")
        .replace(/\\sqrt(\[[^\]]+\])([a-zA-Z])/g, "\\sqrt$1{$2}")
        .replace(/\\frac(\d)(\d)/g, "\\frac{$1}{$2}")
        .replace(/\\frac(\d)\{([^{}]+)\}/g, "\\frac{$1}{$2}")
        .replace(/\\frac\{([^{}]+)\}(\d)/g, "\\frac{$1}{$2}");
    }

    if (needsSymbol) {
      result = result
        .replace(/√/g, "\\sqrt ")
        .replace(/×/g, "\\times ")
        .replace(/÷/g, "\\div ")
        .replace(/≤/g, "\\leq ")
        .replace(/≥/g, "\\geq ")
        .replace(/≠/g, "\\neq ")
        .replace(/→/g, "\\rightarrow ")
        .replace(/←/g, "\\leftarrow ")
        .replace(/↔/g, "\\leftrightarrow ")
        .replace(/∞/g, "\\infty ")
        .replace(/∑/g, "\\sum ")
        .replace(/∫/g, "\\int ")
        .replace(/∏/g, "\\prod ")
        .replace(/∂/g, "\\partial ")
        .replace(/∇/g, "\\nabla ")
        .replace(/∈/g, "\\in ")
        .replace(/∉/g, "\\notin ")
        .replace(/⊂/g, "\\subset ")
        .replace(/⊃/g, "\\supset ")
        .replace(/∪/g, "\\cup ")
        .replace(/∩/g, "\\cap ")
        .replace(/∀/g, "\\forall ")
        .replace(/∃/g, "\\exists ")
        .replace(/°/g, "^\\circ ")
        .replace(/±/g, "\\pm ")
        .replace(/∓/g, "\\mp ");
    }

    // 希腊字母：用零宽负向后行避免误伤已有 \alpha，并用 $...$ 包裹让 KaTeX 识别为公式
    if (needsGreek) {
      result = result
        .replace(/(?<!\\)π/g, "$\\\\pi$")
        .replace(/(?<!\\)α/g, "$\\\\alpha$")
        .replace(/(?<!\\)β/g, "$\\\\beta$")
        .replace(/(?<!\\)γ/g, "$\\\\gamma$")
        .replace(/(?<!\\)δ/g, "$\\\\delta$")
        .replace(/(?<!\\)ε/g, "$\\\\varepsilon$")
        .replace(/(?<!\\)θ/g, "$\\\\theta$")
        .replace(/(?<!\\)λ/g, "$\\\\lambda$")
        .replace(/(?<!\\)μ/g, "$\\\\mu$")
        .replace(/(?<!\\)ρ/g, "$\\\\rho$")
        .replace(/(?<!\\)σ/g, "$\\\\sigma$")
        .replace(/(?<!\\)τ/g, "$\\\\tau$")
        .replace(/(?<!\\)φ/g, "$\\\\varphi$")
        .replace(/(?<!\\)ψ/g, "$\\\\psi$")
        .replace(/(?<!\\)ω/g, "$\\\\omega$")
        .replace(/(?<!\\)Δ/g, "$\\\\Delta$")
        .replace(/(?<!\\)Σ/g, "$\\\\Sigma$")
        .replace(/(?<!\\)Ω/g, "$\\\\Omega$");
    }

    return result;
  }

  /**
   * 将文本+公式混合内容渲染为 HTML
   * 安全：text 部分先 escapeHtml 再做 Markdown 替换，防止 XSS
   *
   * 正则策略：$$...$$ 优先于 $...$ 匹配，避免误判
   */
  function renderContent(text) {
    if (!text) return "";
    var fixed = fixLatex(text);

    // 第 1 轮：提取代码块 ```...```，用占位符替换，防止其中的 $ 被公式正则匹配
    var codeBlocks = [];
    fixed = fixed.replace(/```(\w*)\n?([\s\S]*?)```/g, function (m, lang, code) {
      var idx = codeBlocks.length;
      codeBlocks.push({ lang: lang, code: code.replace(/\n$/, "") });
      return "\x00CODE" + idx + "\x00";
    });

    // 第 2 轮：分离公式与文本
    // $$...$$ 优先匹配（块级），$...$ 其次（行内）
    var regex = /\$\$([\s\S]+?)\$\$|\$([^$]+?)\$/g;
    var parts = [];
    var lastEnd = 0;
    var match;

    while ((match = regex.exec(fixed)) !== null) {
      if (match.index > lastEnd) {
        parts.push({ type: "text", content: fixed.substring(lastEnd, match.index) });
      }
      if (match[1] !== undefined) {
        parts.push({ type: "block", content: match[1].trim() });
      } else {
        parts.push({ type: "inline", content: match[2].trim() });
      }
      lastEnd = match.index + match[0].length;
    }
    if (lastEnd < fixed.length) {
      parts.push({ type: "text", content: fixed.substring(lastEnd) });
    }

    // 第 3 轮：渲染各部分
    var result = "";
    for (var i = 0; i < parts.length; i++) {
      var p = parts[i];
      if (p.type === "text") {
        // 块级公式前后的文本：去掉首尾换行，避免 <br> 和公式 margin 叠加产生多余空白
        var textContent = p.content;
        if (i > 0 && parts[i - 1].type === "block") {
          textContent = textContent.replace(/^\n+/, "");
        }
        if (i < parts.length - 1 && parts[i + 1].type === "block") {
          textContent = textContent.replace(/\n+$/, "");
        }
        result += renderText(textContent);
      } else {
        // 公式渲染
        try {
          if (typeof katex === "undefined") {
            result += '<code class="math-fallback">' + escapeHtml(p.content) + "</code>";
          } else {
            var html = katex.renderToString(p.content, {
              throwOnError: false,
              displayMode: p.type === "block",
              output: "html",
            });
            if (p.type === "block") {
              result += '<div class="katex-block">' + html + "</div>";
            } else {
              result += html;
            }
          }
        } catch (e) {
          result += '<code class="math-fallback">' + escapeHtml(p.content) + "</code>";
        }
      }
    }

    // 第 4 轮：还原代码块占位符
    result = result.replace(/\x00CODE(\d+)\x00/g, function (m, idx) {
      var block = codeBlocks[parseInt(idx, 10)];
      if (!block) return m;
      return (
        '<pre class="code-block"><code>' +
        escapeHtml(block.code) +
        "</code></pre>"
      );
    });

    return result;
  }

  /** 渲染纯文本部分：escape → Markdown */
  function renderText(text) {
    // 先 escape 防 XSS
    var html = escapeHtml(text);

    // 行内代码 `...`（在 Markdown 格式化之前处理，避免内容被其他规则破坏）
    var inlineCodes = [];
    html = html.replace(/`([^`]+)`/g, function (m, code) {
      var idx = inlineCodes.length;
      inlineCodes.push(code);
      return "\x01INLINE" + idx + "\x01";
    });

    // 标题
    html = html.replace(/^#{1,6}\s+(.+)$/gm, function (m, content) {
      var level = m.match(/^#+/)[0].length;
      return "</p><h" + level + ">" + content + "</h" + level + "><p>";
    });

    // 加粗
    html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

    // 单星号不转斜体（AI 常用 * 做乘法/列表，转斜体误伤太多）
    // 保留原样

    // 无序列表
    html = html.replace(/^[-*]\s+/gm, "• ");

    // 有序列表
    html = html.replace(/^(\d+\.)\s+/gm, "$1 ");

    // 换行
    html = html.replace(/\n/g, "<br>");

    // 还原行内代码
    html = html.replace(/\x01INLINE(\d+)\x01/g, function (m, idx) {
      return '<code class="code-inline">' + inlineCodes[parseInt(idx, 10)] + "</code>";
    });

    return html;
  }

  /** 从 AI 回答中分离出正文与相关问题列表
   *  支持的格式（按检测优先级排列）：
   *    1. 含分隔符：一行以 "---相关问题" 或 "--- 相关问题" 或 "相关问题：" 等开头
   *    2. 无分隔符 fallback：从末尾向前检测数字序号/问号前缀的连续行（至少 2 条）
   *  返回 { body: 纯正文不含问题行, questions: [问题文本...] }
   */
  function extractFollowUpQuestions(text) {
    var emptyResult = { body: text || "", questions: [] };
    if (!text) return emptyResult;

    // 判断某一行是否是"问题行"（兼容多种前缀）
    function isQuestionLine(line) {
      if (!line) return null;
      var s = line.trim();
      if (!s || s.length < 4) return null;
      // 支持的前缀：? / ？ / 数字序号.、） / - / •
      var match = s.match(/^(?:[?？]|\d+[\.\、\)\．]|[-•·■▪➤▶])\s*(.+)$/);
      if (!match) return null;
      var q = match[1].trim();
      // 基本长度过滤；去除末尾可能的句号但保留问号
      if (q.length < 2 || q.length > 80) return null;
      if (/[。！!；;]+$/.test(q)) q = q.replace(/[。！!；;]+$/, "");
      // 至少 2 个中文字或带问号，才判定为问题
      if (!/[?？]/.test(q) && !/[\u4e00-\u9fa5]{2,}/.test(q)) return null;
      return q;
    }

    // 判断某一行是否是"分隔符行"（支持多种格式）
    function isSeparatorLine(line) {
      if (!line) return false;
      var s = line.trim();
      if (!s) return false;
      // ---相关问题--- / --- 相关问题 --- / 相关问题：/ 你可能想问：/ 拓展问题： 等
      if (/^[-—－]{2,}\s*相关问题/.test(s)) return true;          // ---相关问题--- / ———相关问题
      if (/^[-—－]{2,}\s*你可能还?想问/.test(s)) return true;
      if (/^[-—－]{2,}\s*扩展问题/.test(s)) return true;
      if (/^[-—－]{2,}\s*拓展问题/.test(s)) return true;
      if (/^[-—－]{2,}\s*继续提问/.test(s)) return true;
      if (/^[-—－]{2,}\s*推荐问题/.test(s)) return true;
      if (/^[-—－]{2,}\s*follow[- ]?up/i.test(s)) return true;
      if (/^[-—－]{2,}\s*more\s+questions?/i.test(s)) return true;
      if (/^相关问题[:：]?$/.test(s)) return true;
      if (/^你可能还?想问[:：]?$/.test(s)) return true;
      if (/^(推荐|拓展|扩展)?问题[:：]$/.test(s)) return true;
      if (/^[>＞]\s*相关问题/.test(s)) return true;              // markdown blockquote
      return false;
    }

    // ---------- 第一阶段：从后向前找分隔符 ----------
    var rawLines = text.split("\n");
    var separatorIdx = -1;
    for (var i = rawLines.length - 1; i >= 0; i--) {
      if (isSeparatorLine(rawLines[i])) {
        separatorIdx = i;
        break;
      }
    }

    // ---------- 第二阶段：有分隔符 -> 从其后提取；无分隔符 -> fallback 检测末尾 ----------
    var questions = [];
    var bodyLines;

    if (separatorIdx !== -1) {
      bodyLines = rawLines.slice(0, separatorIdx);
      var tailLines = rawLines.slice(separatorIdx + 1);
      for (var j = 0; j < tailLines.length; j++) {
        var q = isQuestionLine(tailLines[j]);
        if (q) questions.push(q);
        if (questions.length >= 3) break;
      }
    } else {
      // fallback：从末尾向前找"连续的"疑似问题行（至少 2 行，遇到非问题行停止）
      // 注意：fallback 必须更严格，只有"看起来像问句"的才采用
      // （因为正常回答里也可能有数字列表）
      var looksLikeQuestion = function (s) {
        if (!s) return false;
        // 必须含问号，或含疑问词
        if (/[?？]/.test(s)) return true;
        if (/(什么|怎么|为什么|为何|如何|能不能|能否|是否|哪里|哪个|怎么|如何|谁|是不是|有没有|是否|呢|难道)/.test(s)) return true;
        return false;
      };
      for (var k = rawLines.length - 1; k >= Math.max(0, rawLines.length - 10); k--) {
        var q2 = isQuestionLine(rawLines[k]);
        if (q2 && looksLikeQuestion(q2)) questions.unshift(q2);
        else if (questions.length > 0) break;
        if (questions.length >= 3) break;
      }
      if (questions.length < 2) questions = [];
      bodyLines = (questions.length > 0) ? rawLines.slice(0, rawLines.length - questions.length - 0) : rawLines;
    }

    if (questions.length === 0) return emptyResult;

    // 清理末尾空行
    while (bodyLines.length && /^\s*$/.test(bodyLines[bodyLines.length - 1])) bodyLines.pop();
    return { body: bodyLines.join("\n"), questions: questions.slice(0, 3) };
  }

  /** 【兜底方案】当 AI 没有按 prompt 输出相关问题时，基于回答内容自动生成 2~3 个追问
   *  策略：优先使用 markdown 中的标题/加粗词作为关键词，其次用高频词
   *  @param text         AI 回答的完整正文
   *  @param userQuestion 用户的原始问题（可选），用来提升相关性
   *  @return 问题文本数组
   */
  function generateFallbackQuestions(text, userQuestion) {
    if (!text) return [];
    var keywords = [];

    // 停止词（结构性词汇、过于泛化、疑问词）
    var STOP_WORDS = {
      "总结": 1, "结论": 1, "核心": 1, "优势": 1, "特点": 1, "技术特点": 1,
      "主要用途": 1, "重要里程碑": 1, "其他": 1, "其他相关": 1,
      "好的": 1, "没问题": 1, "可以": 1, "是的": 1, "对的": 1,
      "内容": 1, "部分": 1, "问题": 1, "方面": 1, "方式": 1,
      "如何": 1, "什么": 1, "为什么": 1, "哪个": 1, "哪里": 1, "谁": 1,
    };

    // 1. 从 Markdown 标题（# / ## / ###）提取关键词
    var titleRegex = /^\s*(?:#{1,6})\s*([^\n]{2,40})/gm;
    var tm;
    while ((tm = titleRegex.exec(text)) !== null) {
      keywords.push(tm[1].trim());
    }

    // 2. 从加粗词 **xxx** 提取关键词
    var boldRegex = /\*\*([^*\n]{2,30})\*\*/g;
    var bm;
    while ((bm = boldRegex.exec(text)) !== null) {
      keywords.push(bm[1].trim());
    }

    // 3. 从用户问题中提取关键词
    if (userQuestion) {
      var cleaned = userQuestion
        .replace(/(是什么|是什么意思|怎么理解|为什么|如何|怎么|什么|哪里|哪个|谁|吗|呢|吧|啊|哦|？|\?)/g, " ")
        .replace(/[。，、；：,.!?？]/g, " ")
        .trim();
      if (cleaned.length >= 2 && cleaned.length <= 30) keywords.push(cleaned);
    }

    // 4. 额外策略：寻找大写英文缩写（如 FAST、FRB、AGI、AI）
    var acronymRegex = /\b([A-Z]{2,8})\b/g;
    var am;
    while ((am = acronymRegex.exec(text)) !== null) {
      keywords.push(am[1]);
    }

    // 5. 从首段前 200 字中提取 2~4 字的中文片段（兜底方案）
    var firstPart = (text.split(/\n\n|\r\n\r\n/)[0] || text).substring(0, 200);
    var nounMatches = firstPart.match(/[\u4e00-\u9fa5]{2,6}/g) || [];
    for (var n = 0; n < nounMatches.length; n++) {
      if (!STOP_WORDS[nounMatches[n]] && nounMatches[n].length >= 2 && nounMatches[n].length <= 8) {
        keywords.push(nounMatches[n]);
      }
    }

    // 6. 去重 + 过滤
    var seen = {};
    var uniqueKeywords = [];
    for (var ki = 0; ki < keywords.length; ki++) {
      var kw = keywords[ki].replace(/[。，,、.：:()（）「」\[\]【】"'`#!！@\$%\^\*]/g, "").trim();
      if (!kw || kw.length < 2 || kw.length > 20) continue;
      if (STOP_WORDS[kw]) continue;
      if (seen[kw]) continue;
      seen[kw] = true;
      uniqueKeywords.push(kw);
    }

    // 7. 基于关键词生成模板化追问（最多 3 个）
    var templates = [
      function (kw) { return "什么是" + kw + "？"; },
      function (kw) { return kw + "有什么实际应用？"; },
      function (kw) { return "如何理解" + kw + "？"; },
      function (kw) { return kw + "的核心是什么？"; },
      function (kw) { return "关于" + kw + "能再详细说说吗？"; },
    ];

    var result = [];
    for (var i = 0; i < Math.min(uniqueKeywords.length, 3); i++) {
      // 循环使用模板，避免相邻重复
      result.push(templates[i % templates.length](uniqueKeywords[i]));
    }

    // 8. 如果关键词完全没找到 → 给出通用的 2 个追问
    if (result.length === 0) {
      if (userQuestion && userQuestion.length < 40) {
        var qTopic = userQuestion.replace(/[？?，。,.！!；;]/g, "").trim();
        if (qTopic.length > 0 && qTopic.length <= 20) {
          result.push("关于" + qTopic + "，能举个例子吗？");
          result.push("还有其他相关的吗？");
        } else {
          result.push("能举个具体例子吗？");
          result.push("还有其他相关的吗？");
        }
      } else {
        result.push("能举个具体例子吗？");
        result.push("还有其他相关的吗？");
      }
    }

    return result.slice(0, 3);
  }

  /** 通用：在消息 DOM 末尾追加相关问题按钮（供 finalRender 和 createMessageElement 共用）
   *  @param containerEl  .message 元素（即气泡的父容器）
   *  @param questions    问题文本数组
   */
  function renderFollowUpButtons(containerEl, questions) {
    if (!containerEl || !questions || questions.length === 0) return;

    var container = document.createElement("div");
    container.className = "followup-container";

    var title = document.createElement("div");
    title.className = "followup-title";
    title.textContent = "你可能还想问：";
    container.appendChild(title);

    for (var i = 0; i < questions.length; i++) {
      (function (questionText) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "followup-item";
        btn.textContent = questionText;
        btn.addEventListener("click", function () {
          if (isGenerating) return;
          if (typeof chatInput === "undefined" || chatInput === null) return;
          chatInput.value = questionText;
          chatInput.style.height = "auto";
          sendMessage();
        });
        container.appendChild(btn);
      })(questions[i]);
    }

    containerEl.appendChild(container);
  }

  /** 渲染用户消息（纯文本，转义 + 换行） */
  function renderUserText(text) {
    return escapeHtml(text).replace(/\n/g, "<br>");
  }

  /** 长公式自动缩小字体（首次处理后标记，避免重复测量） */
  function autoScaleKatex(container) {
    if (!container) return;
    var blocks = container.querySelectorAll(".katex-block");
    if (!blocks.length) return;
    var scales = [0.96, 0.86, 0.76, 0.66, 0.56];
    for (var i = 0; i < blocks.length; i++) {
      var block = blocks[i];
      if (block._autoScaled) continue; // 已处理，跳过
      var parentWidth = block.clientWidth || block.parentElement.clientWidth || 300;
      for (var s = 0; s < scales.length; s++) {
        block.style.fontSize = scales[s] + "em";
        var el = block.querySelector(".katex-display") || block.querySelector(".katex");
        if (!el || el.scrollWidth <= parentWidth + 2) break;
      }
      block._autoScaled = true;
    }
  }

  /* ================================================================
   * 滚动控制（rAF 节流）
   * ================================================================ */

  function scrollToBottom(force) {
    if (!chatMessages) return;
    // 内容尚未溢出：无需滚动，避免无意义的 scrollTop 写入
    if (!force && chatMessages.scrollHeight <= chatMessages.clientHeight + 2) return;
    if (scrollRafId) {
      if (!force) return;
      cancelAnimationFrame(scrollRafId);
    }
    scrollRafId = requestAnimationFrame(function () {
      if (!chatMessages) return;
      // 若距底已经 < 4px，视为用户在看最新内容，保持即可，不强制写
      var distanceFromBottom =
        chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight;
      if (!force && distanceFromBottom < 4) {
        scrollRafId = null;
        return;
      }
      chatMessages.scrollTop = chatMessages.scrollHeight;
      scrollRafId = null;
    });
  }

  /* ================================================================
   * 数据管理 — 已在会话管理区定义
   * ================================================================ */

  /** 保存会话防抖：避免流式期间频繁 JSON.stringify + localStorage 写入 */
  var _saveDebounceTimer = null;
  var _savePending = false;
  function scheduleSave() {
    _savePending = true;
    if (_saveDebounceTimer) return;
    _saveDebounceTimer = setTimeout(function () {
      _saveDebounceTimer = null;
      if (_savePending) {
        _savePending = false;
        saveSessions();
      }
    }, 250);
  }

  /** 保存当前会话（流式期间防抖，避免重复写入 localStorage） */
  function saveChatHistory(immediate) {
    if (immediate) {
      saveSessions();
    } else {
      scheduleSave();
    }
    // 如果侧栏打开，同步刷新
    if (chatSidebar && chatSidebar.classList.contains("open")) {
      renderSidebarList();
    }
  }

  /* ================================================================
   * DOM 渲染
   * ================================================================ */

  /** 给气泡绑定长按/右键操作菜单 */
  function attachLongPressToBubble(bubble, msgDiv, msg) {
    var longPressTimer = null;
    var startX = 0;
    var startY = 0;

    function getClientX(e) {
      if (e.touches && e.touches.length > 0) return e.touches[0].clientX;
      if (e.changedTouches && e.changedTouches.length > 0) return e.changedTouches[0].clientX;
      return e.clientX || 0;
    }
    function getClientY(e) {
      if (e.touches && e.touches.length > 0) return e.touches[0].clientY;
      if (e.changedTouches && e.changedTouches.length > 0) return e.changedTouches[0].clientY;
      return e.clientY || 0;
    }

    function inTextSelectMode() {
      return bubble.classList.contains('is-text-select-mode');
    }

    function startLongPress(e) {
      // 文本选择模式：跳过自定义菜单，交给系统原生文本选择
      if (inTextSelectMode()) return;
      startX = getClientX(e);
      startY = getClientY(e);
      longPressTimer = setTimeout(function () {
        if (navigator.vibrate) navigator.vibrate(15);
        showMsgActionMenu(msgDiv, bubble, msg, startX, startY);
      }, 500);
    }

    function cancelLongPress() {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }

    function handleMove(e) {
      if (!longPressTimer) return;
      var cx = getClientX(e);
      var cy = getClientY(e);
      if (Math.abs(cx - startX) > 10 || Math.abs(cy - startY) > 10) {
        cancelLongPress();
      }
    }

    bubble.addEventListener("touchstart", startLongPress, { passive: true });
    bubble.addEventListener("touchend", cancelLongPress);
    bubble.addEventListener("touchmove", handleMove, { passive: true });
    bubble.addEventListener("touchcancel", cancelLongPress);
    bubble.addEventListener("contextmenu", function (e) {
      if (inTextSelectMode()) return;
      e.preventDefault();
      showMsgActionMenu(msgDiv, bubble, msg, startX, startY);
    });
    bubble.addEventListener("mousedown", startLongPress);
    bubble.addEventListener("mouseup", cancelLongPress);
    bubble.addEventListener("mouseleave", cancelLongPress);
  }

  function createMessageElement(msg) {
    var div = document.createElement("div");
    div.className = "message " + (msg.role === "user" ? "user" : "ai");
    div.dataset.msgId = msg.id;

    var bubble = document.createElement("div");
    bubble.className = "msg-bubble";

    if (msg.role === "user") {
      bubble.innerHTML = renderUserText(msg.content);
    } else {
      // AI 消息：尝试从正文提取 AI 输出的相关问题
      var extracted = extractFollowUpQuestions(msg.content);
      var bodyForBubble = extracted.body;
      var questions = extracted.questions;

      // 如果 AI 没输出问题 → 基于内容自动生成 2~3 个追问
      if (!questions || questions.length === 0) {
        questions = generateFallbackQuestions(bodyForBubble, null);
      }

      bubble.innerHTML = renderContent(bodyForBubble);
      autoScaleKatex(bubble);
      div.appendChild(bubble);
      attachLongPressToBubble(bubble, div, msg);
      renderFollowUpButtons(bubble, questions);
      return div;
    }

    attachLongPressToBubble(bubble, div, msg);

    div.appendChild(bubble);
    return div;
  }

  function renderEmptyState() {
    chatMessages.innerHTML = buildEmptyTipHTML();
  }

  /* ================================================================
   * 长按气泡操作菜单（复制 / 文本 / 删除）
   * ================================================================ */

  var currentActionMenu = null;

  function hideMsgActionMenu() {
    if (currentActionMenu) {
      currentActionMenu.remove();
      currentActionMenu = null;
    }
  }

  /** 进入文本选择模式：让系统原生文字选择生效，点击外部自动退出 */
  var _textSelectModeBubble = null;
  function enterBubbleTextSelectMode(bubble) {
    // 清除其他气泡上的模式标记，保证同一时间只有一条消息在文本选择模式
    if (_textSelectModeBubble && _textSelectModeBubble !== bubble) {
      _textSelectModeBubble.classList.remove('is-text-select-mode');
    }
    _textSelectModeBubble = bubble;
    bubble.classList.add('is-text-select-mode');

    // 延迟添加点击外部监听，避免当前的菜单点击立即触发退出
    setTimeout(function () {
      function onOutside(e) {
        if (!bubble.parentNode) return; // 元素已删除
        if (e.target === bubble || bubble.contains(e.target)) return;
        bubble.classList.remove('is-text-select-mode');
        if (_textSelectModeBubble === bubble) _textSelectModeBubble = null;
        document.removeEventListener('click', onOutside, true);
        document.removeEventListener('touchstart', onOutside, true);
      }
      document.addEventListener('click', onOutside, true);
      document.addEventListener('touchstart', onOutside, true);
    }, 50);
  }

  function showMsgActionMenu(msgDiv, bubble, msg, clickX, clickY) {
    hideMsgActionMenu();

    var menu = document.createElement("div");
    menu.className = "msg-action-menu";
    menu.setAttribute("role", "menu");
    menu.setAttribute("aria-label", "消息操作");
    menu.setAttribute("tabindex", "-1");

    // 菜单项
    var items = [
      { icon: "📋", label: "复制", action: function () { copyMessageText(msg.content); } },
      { icon: "✍️", label: "文本", action: function () { enterBubbleTextSelectMode(bubble); } },
      { icon: "🗑", label: "删除", action: function () { confirmDeleteMessage(msgDiv); } },
    ];

    var focusableItems = [];
    for (var i = 0; i < items.length; i++) {
      if (i > 0) {
        var divider = document.createElement("div");
        divider.className = "msg-action-menu-divider";
        divider.setAttribute("role", "separator");
        menu.appendChild(divider);
      }
      var itemEl = document.createElement("button");
      itemEl.type = "button";
      itemEl.className = "msg-action-menu-item";
      itemEl.setAttribute("role", "menuitem");
      itemEl.innerHTML = '<span class="icon" aria-hidden="true">' + items[i].icon + '</span><span>' + items[i].label + '</span>';
      (function (action, item) {
        item.addEventListener("click", function () {
          hideMsgActionMenu();
          action();
        });
      })(items[i].action, itemEl);
      menu.appendChild(itemEl);
      focusableItems.push(itemEl);
    }

    // 键盘：上下箭头在菜单项之间导航，Enter 激活，Esc 关闭
    menu.addEventListener("keydown", function (e) {
      var currentIdx = focusableItems.indexOf(document.activeElement);
      if (e.key === "ArrowDown") {
        e.preventDefault();
        var nextIdx = (currentIdx + 1) % focusableItems.length;
        focusableItems[nextIdx].focus();
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        var prevIdx = (currentIdx - 1 + focusableItems.length) % focusableItems.length;
        focusableItems[prevIdx].focus();
      } else if (e.key === "Escape") {
        hideMsgActionMenu();
      }
    });

    document.body.appendChild(menu);

    // 定位：以手指长按位置 (clickX/clickY) 为锚点，避开气泡边界
    var menuRect = menu.getBoundingClientRect();
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var margin = 12;
    var fingerGap = 14; // 与手指保持间距，避免直接覆盖

    // 水平：以 clickX 为中心，两侧不超出视口
    var posX = (clickX || vw / 2);
    var menuLeft = posX - menuRect.width / 2;
    menuLeft = Math.max(margin, Math.min(menuLeft, vw - menuRect.width - margin));

    // 垂直：优先显示在手指上方；上方空间不足时翻到下方
    var posY = (clickY || vh / 2);
    var menuTop;
    if (posY - fingerGap - menuRect.height >= margin) {
      menuTop = posY - fingerGap - menuRect.height;
    } else {
      menuTop = posY + fingerGap;
    }
    menuTop = Math.max(margin, Math.min(menuTop, vh - menuRect.height - margin));

    menu.style.left = Math.round(menuLeft) + "px";
    menu.style.top = Math.round(menuTop) + "px";

    // 焦点移到第一个菜单项
    if (focusableItems[0]) focusableItems[0].focus();
    currentActionMenu = menu;
  }

  function copyMessageText(text) {
    var plain = text || "";
    if (window.clipboardData && window.clipboardData.setData) {
      try { window.clipboardData.setData("Text", plain); } catch (e) {}
      return;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(plain).catch(function () {});
      return;
    }
    try {
      var ta = document.createElement("textarea");
      ta.value = plain;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    } catch (e) {}
  }

  /* ================================================================
   * 输入框
   * ================================================================ */

  var _inputResizeRaf = null;
  function updateInputHeight() {
    if (_inputResizeRaf) return;
    _inputResizeRaf = requestAnimationFrame(function () {
      _inputResizeRaf = null;
      var h = chatInput.scrollHeight;
      if (h > CONFIG.MAX_TEXTAREA_HEIGHT) h = CONFIG.MAX_TEXTAREA_HEIGHT;
      chatInput.style.height = "auto";
      chatInput.style.height = h + "px";
    });
  }

  /* ================================================================
   * 发送 / 停止
   * ================================================================ */

  function toggleSendButton(generating) {
    isGenerating = generating;
    if (generating) {
      chatSendBtn.textContent = "⏹";
      chatSendBtn.title = "停止生成";
      chatSendBtn.setAttribute("aria-label", "停止生成");
      chatSendBtn.classList.add("is-stop");
    } else {
      chatSendBtn.textContent = "→";
      chatSendBtn.title = "发送";
      chatSendBtn.setAttribute("aria-label", "发送");
      chatSendBtn.classList.remove("is-stop");
    }
  }

  function stopGeneration() {
    if (abortController) abortController.abort();
  }

  async function sendMessage() {
    // 如果正在生成，点击按钮 = 停止
    if (isGenerating) {
      stopGeneration();
      return;
    }

    var text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = "";
    chatInput.style.height = "auto";
    toggleSendButton(true);

    // 移除空状态
    var emptyTip = chatMessages.querySelector(".chat-empty-tip");
    if (emptyTip) emptyTip.remove();

    // 添加用户消息到数据和 DOM
    var userMsg = addMessageData("user", text);
    var userMsgDiv = createMessageElement(userMsg);
    chatMessages.appendChild(userMsgDiv);
    scrollToBottom(true);

    // 身份类问题——只在明确询问AI身份时触发
    // 精确匹配完整短语，避免误判正常问题（如"青光眼是什么"）
    var IDENTITY_KW = [
      "你是谁", "您是谁", "你是谁呀", "你是谁啊",
      "你叫什么名字", "你叫啥",
      "你的名字", "您的名字",
      "你是哪位", "你是哪个", "你是什么东西",
      "介绍一下你自己", "介绍一下自己", "介绍你自己", "自我介绍",
      "你是由谁开发的", "由谁开发", "是谁开发的", "谁开发的你", "谁开发了你",
      "你的开发者", "谁做的你", "谁制作的你", "你的作者",
      "who are you", "what is your name", "your name",
      "who made you", "who created you", "who developed you",
    ];
    var trimmed = text.trim().toLowerCase();
    var isIdentityQuestion = false;
    for (var kwi = 0; kwi < IDENTITY_KW.length; kwi++) {
      if (trimmed.indexOf(IDENTITY_KW[kwi]) !== -1) { isIdentityQuestion = true; break; }
    }
    // 二次验证：必须同时包含第二人称代词或英文身份词
    if (isIdentityQuestion && !/(你|您|who|your name|who made|who created|who developed)/i.test(text)) {
      isIdentityQuestion = false;
    }
    if (isIdentityQuestion) {
      var aiReply = addMessageData("assistant", IDENTITY_REPLY);
      var aiMsgDiv = document.createElement("div");
      aiMsgDiv.className = "message ai";
      aiMsgDiv.dataset.msgId = aiReply.id;
      aiMsgDiv.innerHTML = '<div class="msg-bubble">' + renderContent(IDENTITY_REPLY) + "</div>";
      var bubbleForId = aiMsgDiv.querySelector(".msg-bubble");
      chatMessages.appendChild(aiMsgDiv);
      appendActions(bubbleForId, aiMsgDiv, IDENTITY_REPLY);
      attachLongPressToBubble(bubbleForId, aiMsgDiv, aiReply);
      scrollToBottom(true);
      saveChatHistory();
      toggleSendButton(false);
      return;
    }

    // 创建 AI 占位消息（不加入 chatData）
    var aiMsgDiv = document.createElement("div");
    aiMsgDiv.className = "message ai";
    aiMsgDiv.innerHTML =
      '<div class="msg-bubble">正在思考' +
      '<div class="typing-indicator">' +
      '<div class="typing-dot"></div>' +
      '<div class="typing-dot"></div>' +
      '<div class="typing-dot"></div>' +
      "</div></div>";
    chatMessages.appendChild(aiMsgDiv);
    var bubble = aiMsgDiv.querySelector(".msg-bubble");
    scrollToBottom(true);
    // 额外再滚一次，确保"正在思考"气泡出现在用户视野（抵消可能的 rAF 互相覆盖）
    setTimeout(function () { scrollToBottom(true); }, 50);

    // 构建上下文（从 chatData，不包含当前占位）
    var historyMessages = [{ role: "system", content: SYSTEM_PROMPT }];
    var msgs = chatData();
    msgs.forEach(function (m) {
      historyMessages.push({ role: m.role, content: m.content });
    });

    abortController = new AbortController();

    // ===== 流式渲染：流式期间只追加纯文本，流结束后一次性做 markdown/latex 渲染 =====
    var fullContent = "";                 // 完整原文（保存用）
    var pendingText = "";                 // 尚未追加到 DOM 的累积文本
    var lastAppendTs = 0;                 // 上次 DOM 追加时间（节流用）
    var lastUserQuestion = text;          // 当前轮的用户问题（用于 fallback 生成相关问题）
    var APPEND_THROTTLE_MS = 40;          // DOM 追加间隔（ms）——从 80 调小为 40，更新更灵敏
    var firstTokenTs = 0;                 // 首个 token 到达时间
    var t0 = Date.now();
    var AUTO_SCROLL_LINE_LIMIT = 12;      // 前 N 行跟随滚动，之后停止
    var hasClearedPlaceholder = false;    // 是否已清掉"正在思考"
    var incompleteFormulaTail = "";       // 未配对的 $ 开头的片段，留到下次再处理

    // 按换行粗略估算行数
    function estimateLineCount(text) {
      if (!text) return 0;
      var m = text.match(/\n/g);
      return (m ? m.length : 0) + 1;
    }

    // 流式阶段：对已完整的公式用 KaTeX 直接渲染，其他文本纯文本追加
    // 末尾未配对的 $ 片段保留到下次再处理，避免公式被拆成两半输出
    function renderIncremental(text) {
      if (!text) return "";
      var result = "";
      var pos = 0;
      var hasKatex = typeof katex !== "undefined";
      var len = text.length;
      // 检查末尾是否存在未配对的 $（可能是公式的开始但未结束）
      // 从末尾回溯，找到最后一个 $，如果其后的内容无法构成配对，就把从那个 $ 开始的部分截下来留到下次
      var tailStart = -1;
      var lastDollar = text.lastIndexOf("$");
      if (lastDollar !== -1) {
        // 检查从 lastDollar 起是否能形成完整公式
        if (lastDollar === len - 1) {
          tailStart = lastDollar; // 最后一个字符就是 $，未配对
        } else {
          // lastDollar 之后：看看有没有另一个 $ 作为闭合
          var closingAfter = text.indexOf("$", lastDollar + 1);
          // 也检查是否是 $$
          var isDoubleDollar = (lastDollar + 1 < len && text.charAt(lastDollar + 1) === "$");
          if (closingAfter === -1) {
            // 末尾没有闭合 $，保留整段
            tailStart = lastDollar;
          } else if (isDoubleDollar && closingAfter === lastDollar + 1) {
            // $$ 开头，但后面没有另一个 $$，也保留
            tailStart = lastDollar;
          }
        }
      }
      var processEnd = (tailStart === -1) ? len : tailStart;
      while (pos < processEnd) {
        // 先尝试 $$...$$ 块级公式
        if (pos + 1 < processEnd && text.substr(pos, 2) === "$$") {
          var endIdx = text.indexOf("$$", pos + 2);
          if (endIdx !== -1 && endIdx + 2 <= processEnd) {
            var formula = text.substring(pos + 2, endIdx).trim();
            if (formula && hasKatex) {
              try {
                var rendered = katex.renderToString(formula, { throwOnError: false, displayMode: true, output: "html" });
                result += '<div class="katex-block">' + rendered + "</div>";
              } catch (e) {
                result += '<code class="math-fallback">' + escapeHtml(formula) + "</code>";
              }
            } else {
              result += '<code class="math-fallback">' + escapeHtml(formula) + "</code>";
            }
            pos = endIdx + 2;
            continue;
          }
        }
        // 再尝试 $...$ 行内公式
        if (text.charAt(pos) === "$") {
          var endIdx2 = text.indexOf("$", pos + 1);
          if (endIdx2 !== -1 && endIdx2 > pos + 1 && endIdx2 + 1 <= processEnd) {
            var formula2 = text.substring(pos + 1, endIdx2).trim();
            if (formula2 && hasKatex) {
              try {
                result += katex.renderToString(formula2, { throwOnError: false, displayMode: false, output: "html" });
              } catch (e) {
                result += '<code class="math-fallback">' + escapeHtml(formula2) + "</code>";
              }
            } else {
              result += '<code class="math-fallback">' + escapeHtml(formula2) + "</code>";
            }
            pos = endIdx2 + 1;
            continue;
          }
        }
        // 普通文本：累计到下一个 $ 或 processEnd
        var nextDollar = text.indexOf("$", pos + 1);
        var segEnd;
        if (nextDollar === -1 || nextDollar >= processEnd) {
          segEnd = processEnd;
        } else {
          segEnd = nextDollar;
        }
        if (segEnd <= pos) segEnd = pos + 1;
        var seg = text.substring(pos, segEnd);
        result += escapeHtml(seg).replace(/\n/g, "<br>");
        pos = segEnd;
      }
      // 截下来的尾部留给下次 flush
      if (tailStart !== -1) {
        incompleteFormulaTail = text.substring(tailStart);
      } else {
        incompleteFormulaTail = "";
      }
      return result;
    }

    function flushStreamAppend(force) {
      var nowTs = Date.now();
      if (!force && lastAppendTs > 0 && nowTs - lastAppendTs < APPEND_THROTTLE_MS) return;
      if (!pendingText && !incompleteFormulaTail) return;

      if (!hasClearedPlaceholder) {
        bubble.innerHTML = "";
        hasClearedPlaceholder = true;
      }

      // 把上次留下来的未配对 $ 片段和本次新文本合并
      var combined = (incompleteFormulaTail || "") + (pendingText || "");
      var html = renderIncremental(combined);
      // renderIncremental 内部已更新 incompleteFormulaTail

      if (html) {
        var host = document.createElement("div");
        host.innerHTML = html;
        while (host.firstChild) bubble.appendChild(host.firstChild);
      }
      pendingText = "";
      lastAppendTs = nowTs;

      // 前 N 行跟随滚动（仅在流式增量阶段生效，流结束后的强制 flush 不滚动）
      if (!force && estimateLineCount(fullContent) <= AUTO_SCROLL_LINE_LIMIT) {
        scrollToBottom(false);
      }
    }

    // 流式结束后：一次性渲染完整 markdown/latex，绑定菜单
    // 带兜底逻辑：如果 renderContent 因任何原因返回空或抛错，回退到显示纯文本
    // 注意：流结束后不自动滚动到底部，由用户自行操作
    function finalRender(textForBubble, msgObjToAttach) {
      flushStreamAppend(true);

      // 1) 先尝试从回答中解析 AI 主动输出的相关问题
      var extracted = extractFollowUpQuestions(textForBubble);
      var bodyForBubble = extracted.body;
      var questions = extracted.questions;

      // 2) 如果 AI 没按格式输出问题 → 基于回答内容自动生成 2~3 个追问
      if (!questions || questions.length === 0) {
        questions = generateFallbackQuestions(bodyForBubble, lastUserQuestion);
      }

      var rendered = "";
      try {
        rendered = renderContent(bodyForBubble);
      } catch (e) {
        rendered = "";
      }
      if (!rendered || rendered.replace(/<[^>]+>/g, "").replace(/\s+/g, "").length <
          bodyForBubble.replace(/\s+/g, "").length * 0.5) {
        bubble.innerHTML = escapeHtml(bodyForBubble).replace(/\n/g, "<br>");
      } else {
        bubble.innerHTML = rendered;
      }
      appendActions(bubble, aiMsgDiv, bodyForBubble);
      if (msgObjToAttach) attachLongPressToBubble(bubble, aiMsgDiv, msgObjToAttach);
      autoScaleKatex(bubble);

      renderFollowUpButtons(bubble, questions);
    }

    try {
      // ===== 带重试的请求 =====
      var response = null;
      var retryCount = 0;

      while (retryCount <= CONFIG.MAX_RETRIES) {
        try {
          response = await doFetch(historyMessages);
          if (response.ok) break;

          var errorText = await response.text();
          if (response.status >= 500 && response.status < 600 && retryCount < CONFIG.MAX_RETRIES) {
            retryCount++;
            await delay(CONFIG.RETRY_BASE_DELAY * retryCount);
            continue;
          }
          throw new Error("API 请求失败：" + response.status + " " + errorText);
        } catch (err) {
          if (err.name === "AbortError") throw err;
          if (retryCount < CONFIG.MAX_RETRIES) {
            retryCount++;
            await delay(CONFIG.RETRY_BASE_DELAY * retryCount);
            continue;
          }
          throw err;
        }
      }

      // ===== 读取 SSE 流：按行逐行处理，避免 \n\n 事件分隔的边界问题 =====
      // 兼容两种格式：1) 标准 SSE: data: {...}\n\n  2) 非标准：每行 data: {...} 无空行
      var reader = response.body.getReader();
      var decoder = new TextDecoder("utf-8", { fatal: false });
      var lineBuffer = "";  // 累积未完成的一行

      while (true) {
        var result = await reader.read();
        if (result.done) break;

        lineBuffer += decoder.decode(result.value, { stream: true });
        // 按 \n 分割行；最后一段可能不完整，保留到 lineBuffer 中
        var lfIdx;
        while ((lfIdx = lineBuffer.indexOf("\n")) !== -1) {
          var rawLine = lineBuffer.substring(0, lfIdx);
          lineBuffer = lineBuffer.substring(lfIdx + 1);
          // 去掉 \r（防止 \r\n 造成问题）
          if (rawLine.charAt(rawLine.length - 1) === "\r") rawLine = rawLine.slice(0, -1);

          // 跳过空行和心跳
          if (rawLine === "") continue;
          if (rawLine.charAt(0) === ":") continue;
          if (!rawLine.startsWith("data:")) continue;

          var payload = rawLine.substring(5);
          if (payload.charAt(0) === " ") payload = payload.substring(1);
          if (payload === "[DONE]") continue;

          try {
            var data = JSON.parse(payload);
            var delta =
              data.choices &&
              data.choices[0] &&
              data.choices[0].delta &&
              data.choices[0].delta.content;
            if (!delta) continue;

            if (fullContent.length === 0) firstTokenTs = Date.now();
            fullContent += delta;
            pendingText += delta;
            flushStreamAppend(false);
          } catch (e) { /* 忽略解析错误 */ }
        }
      }

      // decoder.final() 清 TextDecoder 内部多字节缓冲
      try {
        var decoderTail = decoder.decode();
        if (decoderTail) lineBuffer += decoderTail;
      } catch (e) {}

      // lineBuffer 中如果还有最后一行 data: xxx 也尝试解析
      if (lineBuffer && lineBuffer.charAt(0) !== ":") {
        if (lineBuffer.charAt(lineBuffer.length - 1) === "\r") lineBuffer = lineBuffer.slice(0, -1);
        if (lineBuffer.startsWith("data:")) {
          var lastPayload = lineBuffer.substring(5);
          if (lastPayload.charAt(0) === " ") lastPayload = lastPayload.substring(1);
          if (lastPayload !== "[DONE]") {
            try {
              var lastData = JSON.parse(lastPayload);
              var lastDelta =
                lastData.choices &&
                lastData.choices[0] &&
                lastData.choices[0].delta &&
                lastData.choices[0].delta.content;
              if (lastDelta) {
                fullContent += lastDelta;
                pendingText += lastDelta;
              }
            } catch (e) {}
          }
        }
      }

      // 最后强制 flush 一次，确保流式期间显示的内容完整
      flushStreamAppend(true);

      if (!fullContent.trim()) throw new Error("未收到有效响应");

      // 屏蔽 AI 自述为 Sapiens/Agnes 的语句，统一为灵知文案
      fullContent = sanitizeIdentity(fullContent);

      // ===== 流结束：最终渲染 =====
      var aiMsg = addMessageData("assistant", fullContent);
      aiMsgDiv.dataset.msgId = aiMsg.id;
      finalRender(fullContent, aiMsg);

      var ttfbMs = firstTokenTs ? firstTokenTs - t0 : null;
      console.log(
        "[灵知-流式] 全文 " + fullContent.length + " 字符" +
        " | 首 token: " + (ttfbMs ? ttfbMs + "ms" : "-") +
        " | 总耗时: " + (Date.now() - t0) + "ms"
      );

      saveChatHistory();

    } catch (err) {
      if (err.name === "AbortError") {
        if (fullContent.trim()) {
          fullContent = sanitizeIdentity(fullContent);
          var partialMsg = addMessageData("assistant", fullContent);
          aiMsgDiv.dataset.msgId = partialMsg.id;
          finalRender(fullContent, partialMsg);
          saveChatHistory();
        } else {
          aiMsgDiv.remove();
        }
      } else {
        var errMsg = { role: "assistant", content: "❌ 出错了：" + err.message };
        bubble.innerHTML = renderContent("❌ 出错了：" + err.message);
        appendActions(bubble, aiMsgDiv, fullContent || "");
        attachLongPressToBubble(bubble, aiMsgDiv, errMsg);
        console.error(err);
      }
    } finally {
      toggleSendButton(false);
      abortController = null;
    }
  }
  /** 向 bubble 追加长按操作菜单绑定（移除了原 hover 显示的 × 删除按钮） */
  function appendActions(bubble, msgDiv, content) {
    attachLongPressToBubble(bubble, msgDiv, { role: "assistant", content: content });
  }

  /** 构造请求——密钥运行时解密，用后不驻留变量 */
  function doFetch(historyMessages) {
    return fetch(CONFIG.API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + _ar(),
      },
      signal: abortController.signal,
      body: JSON.stringify({
        model: CONFIG.MODEL,
        messages: historyMessages,
        temperature: CONFIG.TEMPERATURE,
        max_tokens: CONFIG.MAX_TOKENS,
        stream: true,
      }),
    });
  }

  function delay(ms) {
    return new Promise(function (resolve) { setTimeout(resolve, ms); });
  }

  /* ================================================================
   * 确认弹窗（含焦点陷阱）
   * ================================================================ */

  function confirmDeleteMessage(msgDiv) {
    pendingOperation = { type: 'msg', msgDiv: msgDiv };
    chatConfirmTitle.textContent = "确认删除这条消息？";
    chatConfirmWarn.textContent = "删除后无法恢复";
    showConfirm();
  }

  function confirmClearAll() {
    pendingOperation = { type: 'clearAll' };
    chatConfirmTitle.textContent = "确认清空聊天记录？";
    chatConfirmWarn.textContent = "此操作不可恢复";
    showConfirm();
  }

  function showConfirm() {
    chatConfirmOverlay.classList.add("show");
    chatConfirmOverlay.setAttribute("aria-hidden", "false");
    // 聚焦到取消按钮（安全默认）
    setTimeout(function () { chatConfirmCancel.focus(); }, 50);
  }

  function hideConfirm() {
    chatConfirmOverlay.classList.remove("show");
    chatConfirmOverlay.setAttribute("aria-hidden", "true");
    pendingOperation = null;
  }

  /** 焦点陷阱——Tab 在弹窗内循环 */
  function trapFocus(e) {
    if (!chatConfirmOverlay.classList.contains("show")) return;
    if (e.key !== "Tab") return;
    var focusable = chatConfirmOverlay.querySelectorAll("button");
    if (!focusable.length) return;
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }

  function onConfirmOk() {
    if (pendingOperation && pendingOperation.type === 'session') {
      // 删除整个会话
      var sid = pendingOperation.id;
      pendingOperation = null;
      hideConfirm();
      deleteSession(sid);
      return;
    }

    if (pendingOperation && pendingOperation.type === 'msg') {
        // 删除单条消息
        var id = parseInt(pendingOperation.msgDiv.dataset.msgId, 10);
        removeMessageData(id);
        pendingOperation.msgDiv.remove();
        pendingOperation = null;
        saveChatHistory();

        if (chatData().length === 0) renderEmptyState();
    } else {
      // 清空当前会话的所有消息（默认操作）
      if (abortController) { abortController.abort(); abortController = null; }
      toggleSendButton(false);
      var s = currentSession();
      if (s) {
        s.messages = [];
        s.title = "新话题";
      }
      saveSessions();
      renderEmptyState();
    }
    hideConfirm();
  }

  /* ================================================================
   * 新话题 & 侧栏
   * ================================================================ */

  /** 开始新话题 */
  function startNewSession() {
    // 如果正在生成，先中止
    if (abortController) { abortController.abort(); abortController = null; }
    toggleSendButton(false);

    // 如果当前会话为空且无消息，直接复用
    var cur = currentSession();
    if (cur && cur.messages.length === 0) {
      closeSidebar();
      renderEmptyState();
      chatInput.focus();
      return;
    }

    createSession();
    closeSidebar();
    renderEmptyState();
    chatInput.focus();
  }

  /** 打开会话列表侧栏 */
  function openSidebar() {
    renderSidebarList();
    chatSidebar.classList.add("open");
    chatSidebarOverlay.classList.add("show");
    chatSidebar.setAttribute("aria-hidden", "false");
    chatSidebarOverlay.setAttribute("aria-hidden", "false");
    // 打开侧栏时将焦点移到关闭按钮
    setTimeout(function () {
      if (chatSidebarClose) chatSidebarClose.focus();
    }, 200);
  }

  /** 关闭会话列表侧栏 */
  function closeSidebar() {
    chatSidebar.classList.remove("open");
    chatSidebarOverlay.classList.remove("show");
    chatSidebar.setAttribute("aria-hidden", "true");
    chatSidebarOverlay.setAttribute("aria-hidden", "true");
  }

  /** 渲染侧栏会话列表 */
  function renderSidebarList() {
    if (!chatSidebarList) return;
    chatSidebarList.innerHTML = "";

    if (sessions.length === 0) {
      chatSidebarList.innerHTML = '<div class="chat-sidebar-empty">暂无聊天记录</div>';
      return;
    }

    sessions.forEach(function (s) {
      var item = document.createElement("div");
      item.className = "chat-sidebar-item" + (s.id === currentSessionId ? " active" : "");

      var icon = document.createElement("span");
      icon.className = "chat-sidebar-item-icon";
      icon.textContent = s.messages.length > 0 ? "💬" : "📝";

      var info = document.createElement("div");
      info.className = "chat-sidebar-item-info";

      var title = document.createElement("div");
      title.className = "chat-sidebar-item-title";
      title.textContent = s.title || "新话题";

      var preview = document.createElement("div");
      preview.className = "chat-sidebar-item-preview";
      var lastMsg = s.messages[s.messages.length - 1];
      preview.textContent = lastMsg
        ? (lastMsg.role === "user" ? "我: " : "AI: ") + lastMsg.content.substring(0, 30)
        : "暂无消息";

      info.appendChild(title);
      info.appendChild(preview);

      item.appendChild(icon);
      item.appendChild(info);

      // 点击切换会话
      item.addEventListener("click", function (e) {
        // 点击删除按钮及其子元素时不切换
        if (e.target.closest(".chat-sidebar-item-delete")) return;
        switchSession(s.id);
      });

      // 删除按钮
      var delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "chat-sidebar-item-delete";
      delBtn.textContent = "×";
      delBtn.setAttribute("aria-label", "删除此会话");
      delBtn.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        confirmDeleteSession(s.id);
      });
      item.appendChild(delBtn);

      chatSidebarList.appendChild(item);
    });
  }

  /* ================================================================
   * 初始化
   * ================================================================ */

  function setupChat() {
    // 获取 DOM
    chatMessages = document.getElementById("chatMessages");
    chatInput = document.getElementById("chatInput");
    chatSendBtn = document.getElementById("chatSendBtn");
    chatNewBtn = document.getElementById("chatNewBtn");
    chatThemeBtn = document.getElementById("chatThemeBtn");
    chatConfirmOverlay = document.getElementById("chatConfirmOverlay");
    chatConfirmCancel = document.getElementById("chatConfirmCancel");
    chatConfirmOk = document.getElementById("chatConfirmOk");
    chatConfirmTitle = document.getElementById("chatConfirmTitle");
    chatConfirmWarn = document.getElementById("chatConfirmWarn");
    chatSidebar = document.getElementById("chatSidebar");
    chatSidebarOverlay = document.getElementById("chatSidebarOverlay");
    chatSidebarClose = document.getElementById("chatSidebarClose");
    chatSidebarNewBtn = document.getElementById("chatSidebarNewBtn");
    chatSidebarList = document.getElementById("chatSidebarList");

    // ===== 事件绑定 =====

    // 输入框
    chatInput.addEventListener("input", updateInputHeight);
    chatInput.addEventListener("keydown", function (e) {
      // ✅ IME 输入法组合状态不触发发送
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 发送 / 停止按钮
    chatSendBtn.addEventListener("click", sendMessage);

    // 新话题
    chatNewBtn.addEventListener("click", startNewSession);
    chatSidebarNewBtn.addEventListener("click", startNewSession);

    // ===== 深色模式切换 =====
    var THEME_STORAGE_KEY = "lingzhi_theme"; // "dark" / "light" / 未设置=跟随系统

    function applyTheme(theme) {
      if (theme === "dark") {
        document.body.classList.add("is-dark");
      } else if (theme === "light") {
        document.body.classList.remove("is-dark");
      } else {
        // 未手动设置 → 跟随系统 prefers-color-scheme
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.body.classList.add("is-dark");
        } else {
          document.body.classList.remove("is-dark");
        }
      }
      if (chatThemeBtn) {
        chatThemeBtn.setAttribute(
          "title",
          document.body.classList.contains("is-dark") ? "切换到浅色模式" : "切换到深色模式"
        );
      }
    }

    function toggleTheme() {
      var isDark = document.body.classList.contains("is-dark");
      var next = isDark ? "light" : "dark";
      try { localStorage.setItem(THEME_STORAGE_KEY, next); } catch (e) {}
      applyTheme(next);
    }

    if (chatThemeBtn) chatThemeBtn.addEventListener("click", toggleTheme);

    // 初始化主题（在 DOM 准备好时立即应用，避免闪烁）
    var savedTheme = null;
    try { savedTheme = localStorage.getItem(THEME_STORAGE_KEY); } catch (e) {}
    applyTheme(savedTheme);

    // 点击标题打开侧栏
    var chatMenuBtn = document.getElementById("chatMenuBtn");
    if (chatMenuBtn) {
      chatMenuBtn.addEventListener("click", openSidebar);
      chatMenuBtn.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openSidebar();
        }
      });
    }

    // 侧栏关闭
    chatSidebarClose.addEventListener("click", closeSidebar);
    chatSidebarOverlay.addEventListener("click", closeSidebar);

    // 确认弹窗
    chatConfirmCancel.addEventListener("click", hideConfirm);
    chatConfirmOk.addEventListener("click", onConfirmOk);
    chatConfirmOverlay.addEventListener("click", function (e) {
      if (e.target === chatConfirmOverlay) hideConfirm();
    });

    // Esc 关闭弹窗 + 焦点陷阱
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        if (currentActionMenu) {
          hideMsgActionMenu();
        } else if (chatConfirmOverlay.classList.contains("show")) {
          hideConfirm();
        } else if (chatSidebar.classList.contains("open")) {
          closeSidebar();
        }
      }
      trapFocus(e);
    });

    // 点击外部关闭操作菜单
    document.addEventListener("click", function (e) {
      if (currentActionMenu && !currentActionMenu.contains(e.target)) {
        hideMsgActionMenu();
      }
    }, true);
    document.addEventListener("touchstart", function (e) {
      if (currentActionMenu && !currentActionMenu.contains(e.target)) {
        hideMsgActionMenu();
      }
    }, { passive: true });

    // 滚动/改变尺寸关闭操作菜单
    window.addEventListener("scroll", hideMsgActionMenu, true);
    window.addEventListener("resize", hideMsgActionMenu);

    // 页面卸载——中止请求
    window.addEventListener("beforeunload", function () {
      if (abortController) abortController.abort();
    });

    // ===== 初始化会话 =====
    loadSessions();
    if (sessions.length === 0) {
      createSession();
    } else {
      currentSessionId = sessions[0].id;
    }
    renderCurrentSession();
    chatInput.focus();
  }

  /** 等待 KaTeX 加载——事件驱动：script.onload / DOMContentLoaded / 超时兜底 */
  function initWhenReady() {
    var initialized = false;
    var timeoutId = null;

    function tryInit(source) {
      if (initialized) return;
      // 如果 KaTeX 还没加载好，再给一小段时间（某些浏览器 defer 解析顺序不同）
      if (typeof katex === "undefined") {
        // source === "timeout" 时直接初始化（renderContent 有纯文本 fallback）
        if (source !== "timeout") return;
      }
      initialized = true;
      if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
      setupChat();
    }

    // 超时兜底：5s 后无论如何初始化，避免卡死
    timeoutId = setTimeout(function () { tryInit("timeout"); }, CONFIG.KATEX_WAIT_TIMEOUT);

    // 方式一：脚本 onload 事件
    var katexScript = document.getElementById("katex-js");
    if (katexScript) {
      katexScript.addEventListener("load", function () { tryInit("onload"); });
      katexScript.addEventListener("error", function () { tryInit("error"); });
      // 脚本可能已经在上述代码执行前加载完成（缓存命中），此时 readyState 无意义，
      // 靠方式二 DOMContentLoaded + typeof 检查兜底
    }

    // 方式二：DOMContentLoaded 时检查一下——如果脚本已缓存命中，onload 可能已错过
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () { tryInit("DOMContentLoaded"); });
    } else {
      tryInit("DOMContentLoaded");
    }
  }

  // 启动
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initWhenReady);
  } else {
    initWhenReady();
  }

  // ---------- PWA：注册 Service Worker ----------
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker
        .register("./sw.js", { scope: "./" })
        .then(function (reg) {
          console.log("[PWA] Service Worker 已注册，作用域：", reg.scope);
          // 有新版本 SW 时提示
          reg.addEventListener("updatefound", function () {
            var installing = reg.installing;
            if (!installing) return;
            installing.addEventListener("statechange", function () {
              if (installing.state === "installed" && navigator.serviceWorker.controller) {
                console.log("[PWA] 有新版本可用，下次打开页面时生效");
              }
            });
          });
        })
        .catch(function (err) {
          console.warn("[PWA] Service Worker 注册失败：", err);
        });
    });
  }

  // ---------- PWA：安装提示 ----------
  var deferredPrompt = null;
  window.addEventListener("beforeinstallprompt", function (event) {
    // 阻止 Chrome 自动弹出默认安装提示
    event.preventDefault();
    deferredPrompt = event;
    console.log("[PWA] 可以安装应用了，点击地址栏图标或分享菜单中的「添加到主屏幕」");
  });

  window.addEventListener("appinstalled", function () {
    console.log("[PWA] 应用已安装成功");
    deferredPrompt = null;
  });
})();
</script>
