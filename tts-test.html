<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge TTS 测试工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1a1a25;
    --border-color: #2a2a3a;
    --text-primary: #f0f0f5;
    --text-secondary: #a0a0b0;
    --text-tertiary: #6a6a7a;
    --accent-primary: #6366f1;
    --accent-secondary: #8b5cf6;
    --accent-glow: rgba(99, 102, 241, 0.4);
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(139, 92, 246, 0.1), transparent),
      radial-gradient(ellipse 60% 40% at 0% 100%, rgba(59, 130, 246, 0.08), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    opacity: 0.03;
    pointer-events: none;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  }

  .container {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeInDown 0.8s ease-out;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent-primary);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  .badge::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 0%, #a0a0b0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--text-secondary);
    font-size: 16px;
    font-weight: 400;
  }

  .subtitle code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg-tertiary);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--accent-primary);
    border: 1px solid var(--border-color);
  }

  .card {
    background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeInUp 0.8s ease-out;
    animation-fill-mode: both;
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }
  .card:nth-child(4) { animation-delay: 0.3s; }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
  }

  .card-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-title .icon {
    width: 32px;
    height: 32px;
    background: rgba(99, 102, 241, 0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px;
    color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    resize: vertical;
    transition: all 0.3s ease;
    outline: none;
  }

  textarea:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  textarea::placeholder {
    color: var(--text-tertiary);
  }

  .char-count {
    text-align: right;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 640px) {
    .grid-2, .grid-3 {
      grid-template-columns: 1fr;
    }
    h1 { font-size: 32px; }
    .card { padding: 24px; }
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  label .value {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-primary);
    font-weight: 600;
  }

  select, input[type="text"] {
    width: 100%;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    transition: all 0.3s ease;
    outline: none;
    appearance: none;
    cursor: pointer;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  select {
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%236a6a7a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
  }

  .slider-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--bg-primary);
    border-radius: 100px;
    outline: none;
    position: relative;
  }

  input[type="range"]::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 50%;
    background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
    border-radius: 100px;
    pointer-events: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px var(--accent-glow);
    position: relative;
    z-index: 2;
    transition: transform 0.2s ease;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }

  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .btn-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 140px;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px var(--accent-glow);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
  }

  .btn-secondary:hover {
    border-color: var(--accent-primary);
    background: rgba(99, 102, 241, 0.1);
  }

  .btn .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .btn.loading .spinner {
    display: block;
  }

  .btn.loading .btn-text {
    opacity: 0.7;
  }

  .audio-player {
    width: 100%;
    margin-top: 16px;
    padding: 16px;
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    display: none;
    animation: fadeIn 0.3s ease-out;
  }

  .audio-player.visible {
    display: block;
  }

  audio {
    width: 100%;
    border-radius: 8px;
  }

  audio::-webkit-media-controls-panel {
    background: var(--bg-tertiary);
  }

  .status {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
  }

  .status.visible {
    display: flex;
  }

  .status-error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--error);
  }

  .status-success {
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.3);
    color: var(--success);
  }

  .status-loading {
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid rgba(99, 102, 241, 0.3);
    color: var(--accent-primary);
  }

  .status .status-icon {
    font-size: 18px;
  }

  .voice-filter {
    margin-bottom: 16px;
    position: relative;
  }

  .voice-filter input {
    padding-left: 40px;
  }

  .voice-filter::before {
    content: '🔍';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.5;
  }

  .footer {
    text-align: center;
    margin-top: 48px;
    color: var(--text-tertiary);
    font-size: 13px;
    animation: fadeIn 1s ease-out 0.5s both;
  }

  .footer a {
    color: var(--accent-primary);
    text-decoration: none;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeInDown {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .loading-voices {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--text-tertiary);
    font-size: 14px;
    gap: 10px;
  }

  .loading-voices .mini-spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border-color);
    border-top-color: var(--accent-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .quick-texts {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .quick-text {
    padding: 6px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: 100px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .quick-text:hover {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
    background: rgba(99, 102, 241, 0.1);
  }
</style>
</head>
<body>
<div class="noise"></div>

<div class="container">
  <header class="header">
    <h1>语音合成测试工具</h1>
    <p class="subtitle">基于 Microsoft Edge 在线语音服务</p>
  </header>

  <div class="card">
    <div class="card-title">
      <span class="icon">📝</span>
      输入文本
    </div>
    <textarea id="textInput" placeholder="请输入要转换为语音的文本内容...">你好，欢迎使用 Edge TTS 语音合成服务。这是一个基于 Microsoft Edge 在线语音的测试工具。</textarea>
    <div class="char-count"><span id="charCount">0</span> 字符</div>
    <div class="quick-texts">
      <span class="quick-text" data-text="你好世界，这是一段测试语音。">中文测试</span>
      <span class="quick-text" data-text="Hello world, this is a test voice.">英文测试</span>
      <span class="quick-text" data-text="今日の天気はとても良いです。">日文测试</span>
      <span class="quick-text" data-text="春风又绿江南岸，明月何时照我还。">古诗词</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span class="icon">🎙️</span>
      语音设置
    </div>
    
    <div class="voice-filter">
      <input type="text" id="voiceSearch" placeholder="搜索语音（如 zh-CN、en-US、日文 等）...">
    </div>

    <div class="field">
      <label>选择语音</label>
      <div id="voiceSelectContainer">
        <div class="loading-voices">
          <div class="mini-spinner"></div>
          <span>正在加载语音列表...</span>
        </div>
      </div>
    </div>

    <div class="grid-2" style="margin-top: 16px;">
      <div class="slider-container">
        <label>语速 <span class="value" id="rateValue">0%</span></label>
        <input type="range" id="rateSlider" min="-50" max="50" value="0">
      </div>
      <div class="slider-container">
        <label>音调 <span class="value" id="pitchValue">0Hz</span></label>
        <input type="range" id="pitchSlider" min="-50" max="50" value="0">
      </div>
    </div>

    <div class="field" style="margin-top: 16px;">
      <label>音频格式</label>
      <select id="formatSelect">
        <option value="audio-24khz-48kbitrate-mono-mp3">MP3 · 24kHz · 48kbps（推荐）</option>
        <option value="audio-24khz-96kbitrate-mono-mp3">MP3 · 24kHz · 96kbps</option>
        <option value="audio-24khz-160kbitrate-mono-mp3">MP3 · 24kHz · 160kbps（高质量）</option>
        <option value="audio-16khz-128kbitrate-mono-mp3">MP3 · 16kHz · 128kbps</option>
        <option value="riff-24khz-16bit-mono-pcm">WAV · 24kHz · 16bit</option>
        <option value="riff-16khz-16bit-mono-pcm">WAV · 16kHz · 16bit</option>
        <option value="ogg-24khz-16bit-mono-opus">OGG Opus · 24kHz</option>
        <option value="ogg-48khz-16bit-mono-opus">OGG Opus · 48kHz</option>
        <option value="webm-24khz-16bit-mono-opus">WebM Opus · 24kHz</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span class="icon">▶️</span>
      生成与播放
    </div>
    
    <div class="btn-group">
      <button class="btn btn-primary" id="playBtn">
        <span class="spinner"></span>
        <span class="btn-text">🔊 生成并播放</span>
      </button>
      <button class="btn btn-secondary" id="downloadBtn">
        💾 下载音频
      </button>
    </div>

    <div class="audio-player" id="audioPlayer">
      <audio id="audio" controls></audio>
    </div>

    <div class="status status-loading" id="statusLoading">
      <span class="status-icon">⏳</span>
      <span id="loadingText">正在生成语音...</span>
    </div>

    <div class="status status-error" id="statusError">
      <span class="status-icon">❌</span>
      <span id="errorText">生成失败</span>
    </div>

    <div class="status status-success" id="statusSuccess">
      <span class="status-icon">✅</span>
      <span id="successText">生成成功</span>
    </div>
  </div>

  <div class="footer">
    <p>Powered by Microsoft Edge TTS</p>
  </div>
</div>

<script>
  const API_BASE = 'https://tts.chatlz.dpdns.org';
  
  const textInput = document.getElementById('textInput');
  const charCount = document.getElementById('charCount');
  const voiceSearch = document.getElementById('voiceSearch');
  const voiceSelectContainer = document.getElementById('voiceSelectContainer');
  const rateSlider = document.getElementById('rateSlider');
  const rateValue = document.getElementById('rateValue');
  const pitchSlider = document.getElementById('pitchSlider');
  const pitchValue = document.getElementById('pitchValue');
  const formatSelect = document.getElementById('formatSelect');
  const playBtn = document.getElementById('playBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const audioPlayer = document.getElementById('audioPlayer');
  const audio = document.getElementById('audio');
  const statusLoading = document.getElementById('statusLoading');
  const statusError = document.getElementById('statusError');
  const statusSuccess = document.getElementById('statusSuccess');
  const loadingText = document.getElementById('loadingText');
  const errorText = document.getElementById('errorText');
  const successText = document.getElementById('successText');

  let voices = [];
  let currentAudioUrl = null;

  function updateCharCount() {
    charCount.textContent = textInput.value.length;
  }

  textInput.addEventListener('input', updateCharCount);
  updateCharCount();

  document.querySelectorAll('.quick-text').forEach(btn => {
    btn.addEventListener('click', () => {
      textInput.value = btn.dataset.text;
      updateCharCount();
    });
  });

  rateSlider.addEventListener('input', () => {
    const val = rateSlider.value;
    rateValue.textContent = (val > 0 ? '+' : '') + val + '%';
    updateSliderFill(rateSlider);
  });

  pitchSlider.addEventListener('input', () => {
    const val = pitchSlider.value;
    pitchValue.textContent = (val > 0 ? '+' : '') + val + 'Hz';
    updateSliderFill(pitchSlider);
  });

  function updateSliderFill(slider) {
    const min = parseInt(slider.min);
    const max = parseInt(slider.max);
    const val = parseInt(slider.value);
    const percent = ((val - min) / (max - min)) * 100;
    slider.style.setProperty('--fill', percent + '%');
  }

  const style = document.createElement('style');
  style.textContent = `
    input[type="range"]::before {
      width: var(--fill, 50%) !important;
    }
  `;
  document.head.appendChild(style);

  updateSliderFill(rateSlider);
  updateSliderFill(pitchSlider);

  async function loadVoices() {
    try {
      const response = await fetch(`${API_BASE}/voices`);
      if (!response.ok) throw new Error('加载语音列表失败');
      voices = await response.json();
      renderVoiceSelect(voices);
    } catch (error) {
      voiceSelectContainer.innerHTML = `
        <div class="status status-error visible">
          <span class="status-icon">❌</span>
          <span>${error.message}。请检查网络连接或稍后重试。</span>
        </div>
      `;
    }
  }

  function renderVoiceSelect(voiceList) {
    if (voiceList.length === 0) {
      voiceSelectContainer.innerHTML = `
        <div class="status" style="display:flex; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-secondary);">
          <span class="status-icon">🔍</span>
          <span>没有找到匹配的语音</span>
        </div>
      `;
      return;
    }

    const select = document.createElement('select');
    select.id = 'voiceSelect';

    const locales = {};
    voiceList.forEach(voice => {
      const locale = voice.Locale || 'unknown';
      if (!locales[locale]) locales[locale] = [];
      locales[locale].push(voice);
    });

    const sortedLocales = Object.keys(locales).sort();
    
    sortedLocales.forEach(locale => {
      const optgroup = document.createElement('optgroup');
      optgroup.label = locale;
      
      locales[locale].sort((a, b) => a.FriendlyName.localeCompare(b.FriendlyName)).forEach(voice => {
        const option = document.createElement('option');
        option.value = voice.ShortName;
        option.textContent = `${voice.FriendlyName} (${voice.Gender === 'Female' ? '女' : voice.Gender === 'Male' ? '男' : '?'})`;
        optgroup.appendChild(option);
      });
      
      select.appendChild(optgroup);
    });

    const zhVoice = voiceList.find(v => v.ShortName === 'zh-CN-XiaoxiaoNeural');
    if (zhVoice) {
      select.value = 'zh-CN-XiaoxiaoNeural';
    }

    voiceSelectContainer.innerHTML = '';
    voiceSelectContainer.appendChild(select);
  }

  voiceSearch.addEventListener('input', () => {
    const query = voiceSearch.value.toLowerCase().trim();
    if (!query) {
      renderVoiceSelect(voices);
      return;
    }
    const filtered = voices.filter(v => 
      v.ShortName.toLowerCase().includes(query) ||
      v.FriendlyName.toLowerCase().includes(query) ||
      (v.Locale && v.Locale.toLowerCase().includes(query))
    );
    renderVoiceSelect(filtered);
  });

  function hideAllStatus() {
    statusLoading.classList.remove('visible');
    statusError.classList.remove('visible');
    statusSuccess.classList.remove('visible');
  }

  function showLoading(text = '正在生成语音...') {
    hideAllStatus();
    loadingText.textContent = text;
    statusLoading.classList.add('visible');
  }

  function showError(text) {
    hideAllStatus();
    errorText.textContent = text;
    statusError.classList.add('visible');
  }

  function showSuccess(text) {
    hideAllStatus();
    successText.textContent = text;
    statusSuccess.classList.add('visible');
  }

  function buildUrl(params) {
    const url = new URL(`${API_BASE}/tts`);
    Object.entries(params).forEach(([key, value]) => {
      if (value !== undefined && value !== null && value !== '') {
        url.searchParams.set(key, value);
      }
    });
    return url.toString();
  }

  function getVoice() {
    const select = document.getElementById('voiceSelect');
    return select ? select.value : 'zh-CN-XiaoxiaoNeural';
  }

  async function generateAudio() {
    const text = textInput.value.trim();
    if (!text) {
      showError('请输入要转换的文本');
      return null;
    }

    const params = {
      text: text,
      voice: getVoice(),
      format: formatSelect.value,
      rate: rateSlider.value,
      pitch: pitchSlider.value
    };

    return buildUrl(params);
  }

  playBtn.addEventListener('click', async () => {
    try {
      playBtn.classList.add('loading');
      playBtn.disabled = true;
      showLoading('正在生成语音，请稍候...');
      audioPlayer.classList.remove('visible');

      if (currentAudioUrl) {
        URL.revokeObjectURL(currentAudioUrl);
        currentAudioUrl = null;
      }

      const url = await generateAudio();
      if (!url) return;

      const response = await fetch(url);
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error || `HTTP ${response.status}`);
      }

      const blob = await response.blob();
      currentAudioUrl = URL.createObjectURL(blob);
      audio.src = currentAudioUrl;
      audioPlayer.classList.add('visible');
      
      showSuccess('语音生成成功！');
      
      audio.play().catch(() => {});

    } catch (error) {
      showError('生成失败：' + error.message);
    } finally {
      playBtn.classList.remove('loading');
      playBtn.disabled = false;
    }
  });

  downloadBtn.addEventListener('click', async () => {
    try {
      downloadBtn.classList.add('loading');
      showLoading('正在准备下载...');

      const url = await generateAudio();
      if (!url) return;

      const response = await fetch(url);
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error || `HTTP ${response.status}`);
      }

      const blob = await response.blob();
      const downloadUrl = URL.createObjectURL(blob);
      
      const format = formatSelect.value;
      let ext = 'mp3';
      if (format.includes('wav') || format.includes('riff') || format.includes('pcm')) ext = 'wav';
      else if (format.includes('ogg')) ext = 'ogg';
      else if (format.includes('webm')) ext = 'webm';

      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = `tts_${Date.now()}.${ext}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      
      setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);
      
      showSuccess('下载已开始！');

    } catch (error) {
      showError('下载失败：' + error.message);
    } finally {
      downloadBtn.classList.remove('loading');
    }
  });

  loadVoices();
</script>
</body>
</html>
